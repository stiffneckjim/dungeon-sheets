name: Docker

on:
  workflow_run:
    workflows: ["Python package"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test_image:
    name: Build and test Docker image
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          target: dungeon-sheets
          load: true
          tags: dungeon-sheets:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests (default)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/examples:/build" dungeon-sheets:ci --debug

      - name: Run tests (fancy with spells-by-level)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/examples:/build" dungeon-sheets:ci --debug --fancy --spells-by-level

      - name: Run tests (epub output)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/examples:/build" dungeon-sheets:ci --debug --output-format=epub

      - name: Run tests (LuaLaTeX template validation)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/examples:/build" dungeon-sheets:ci --debug --tex-template wizard1.py

      - name: Run tests (LuaLaTeX template with fancy A4 options)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/examples:/build" dungeon-sheets:ci --fancy --paper-size a4 --output-format pdf --tex-template

      - name: Print generated LaTeX logs on failure
        if: failure()
        run: |
          shopt -s globstar nullglob
          logs=("$GITHUB_WORKSPACE"/examples/**/*_char.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo "No generated *_char.log files found under examples/."
            exit 0
          fi

          for log in "${logs[@]}"; do
            echo "::group::$(realpath --relative-to="$GITHUB_WORKSPACE" "$log")"
            cat "$log"
            echo "::endgroup::"
          done

      - name: Upload generated LaTeX artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-latex-debug-artifacts
          if-no-files-found: ignore
          path: |
            examples/**/*_char.log
            examples/**/*_char.tex
            examples/**/*_char.aux
  publish_image:
    name: Publish Docker image
    needs: [test_image]
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
