name: Docker

on:
  workflow_run:
    workflows: ["Python package"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test_image:
    name: Build and test Docker image
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        build-command:
          - ""
          - "--fancy --spells-by-level"
          - "--output-format=epub"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build local test image
        run: docker build --target dungeon-sheets -t dungeon-sheets:ci .

      - name: Run container tests (${{ matrix.build-command || 'default' }})
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/examples:/build" dungeon-sheets:ci --debug ${{ matrix.build-command }}

      - name: Validate LuaLaTeX template path
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE/examples:/build" dungeon-sheets:ci --debug --tex-template wizard1.py

  publish_image:
    name: Publish Docker image
    needs: [test_image]
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
