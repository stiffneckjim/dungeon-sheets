- class_name: ScrollOfShield
  name: Scroll of Shield
  description: |
    A spell scroll granting access to the Shield spell.

    This is a consumable spell scroll that gives the reader temporary access
    to the Shield spell.
  rarity: Common
  item_type: Scroll
  linked_spells:
    - shield

- class_name: PotionOfHealing
  name: Potion of Healing
  description: |
    You regain hit points when you drink this potion. The number of hit
    points depends on the potion's rarity. Whatever its potency, the
    potion's red liquid glimmers when agitated.

    Healing: Common — 2d4 + 2 HP regained.
  rarity: Common
  item_type: Potion
  passive_effect_description: Regain 2d4 + 2 hit points when consumed
  passive_effect_value: 10

- class_name: StaffOfSpells
  name: Staff of Spells
  description: |
    This staff has 50 charges for the following properties. It regains
    4d6 + 2 expended charges daily at dawn. Expended charges below 5 do not
    count against the staff.

    Spells. While holding the staff, you can use an action to expend 1 or more
    of its charges to cast one of the following spells from the staff: Magic
    Missile (1 charge), a 2nd-level spell (2 charges), a 3rd-level spell (3
    charges), or a 4th-level spell (4 charges).

    Requires attunement by a wizard or sorcerer.
  rarity: Very Rare
  item_type: Staff
  requires_attunement: true
  linked_spells:
    - magic missile
    - fireball
    - lightning bolt
    - polymorph
  charge_pool_max: 50
  charge_recharge_rule: 4d6 + 2 at dawn

- class_name: JavelinOfLightning
  name: Javelin of Lightning
  description: |
    Each time you make an attack roll with this magic weapon and hit, you can
    have it deal Lightning damage instead of Piercing damage.

    Lightning Bolt. When you throw this weapon at a target no farther than 120
    feet from you, you can forgo making a ranged attack roll and instead turn
    the weapon into a bolt of lightning. This bolt forms a 5-foot-wide line
    between you and the target. The target and each other creature in the line
    (excluding you) must make a DC 13 Dexterity saving throw, taking 4d6
    Lightning damage on a failed save or half as much damage on a successful
    one. Immediately after dealing this damage, the weapon reappears in your
    hand. This property can't be used again until the next dawn.
  rarity: Uncommon
  item_type: Weapon
  requires_attunement: true
  weapon_attack_bonus: 1
  weapon_damage_bonus: 1

- class_name: CloakOfProtection
  name: Cloak of Protection
  description: |
    You gain a +1 bonus to AC and Saving Throws while wearing this cloak.
  rarity: Uncommon
  requires_attunement: true
  ac_bonus: 1
  st_bonus_all: 1

- class_name: DeckOfIllusions
  name: Deck of Illusions
  description: |
    This box contains a set of Parchment cards. A full deck has 34
    cards. A deck found as Treasure is usually missing 1d20 - 1 cards.

    The magic of the deck functions only if cards are drawn at random.
    You can use an action to draw a card at random from the deck and throw
    it to the ground at a point within 30 feet of you.

    An Illusion of one or more Creatures forms over the Thrown card and
    remains until dispelled. An illusory creature appears real, of the
    appropriate size, and behaves as if it were a real creature, except that
    it can do no harm. While you are within 120 feet of the illusory creature
    and can see it, you can use an action to move it magically anywhere within
    30 feet of its card. Any physical interaction with the illusory creature
    reveals it to be an Illusion, because Objects pass through it.

    The Illusion lasts until its card is moved or the Illusion is dispelled.
    When the Illusion ends, the image on its card disappears, and that card
    can't be used again.
  rarity: Uncommon
  item_type: Adventuring gear (wondrous item)

- class_name: RingOfProtection
  name: Ring of Protection
  description: |
    You gain a +1 bonus to AC and Saving Throws while wearing this ring.
  rarity: Rare
  item_type: Ring
  requires_attunement: true
  ac_bonus: 1
  st_bonus_all: 1

- class_name: CloakOfTheBat
  name: Cloak of the Bat
  description: |
    While wearing this cloak, you have advantage on Dexterity (Stealth)
    checks. In an area of dim light or darkness, you can grip the edges of
    the cloak with both hands and use it to fly at a speed of 40 feet. If you
    ever fail to grip the cloak's edges while flying in this way, or if you
    are no longer in dim light or darkness, you lose this flying speed.

    While wearing the cloak in an area of dim light or darkness, you can use
    your action to cast polymorph on yourself, transforming into a bat. While
    you are in the form of the bat, you retain your Intelligence, Wisdom, and
    Charisma scores. The cloak can't be used this way again until the next dawn.
  item_type: Cloak
  requires_attunement: true

- class_name: DustOfSneezingAndChoking
  name: Dust of Sneezing and Choking
  description: |
    Found in a small container, this powder resembles very fine sand. It
    appears to be dust of disappearance, and an identify spell reveals it to
    be such. There is enough of it for one use.

    When you use an action to throw a handful of the dust into the air, you
    and each creature that needs to breathe within 30 feet of you must succeed
    on a DC 15 Constitution saving throw or become unable to breathe, while
    sneezing uncontrollably. A creature affected in this way is incapacitated
    and suffocating. As long as it is conscious, a creature can repeat the
    saving throw at the end of each of its turns, ending the effect on it on
    a success. The lesser restoration spell can also end the effect on a
    creature.
  rarity: Uncommon
  item_type: Consumable

- class_name: BracersOfArchery
  name: Bracers of Archery
  description: |
    While wearing these bracers, you have proficiency with the longbow and
    shortbow, and you gain a +2 bonus to damage rolls on ranged attacks made
    with such weapons.
  rarity: Uncommon
  requires_attunement: true

- class_name: GauntletsOfOgrePower
  name: Gauntlets of Ogre Power
  description: |
    Your Strength score is 19 while you wear these gauntlets. They have no
    effect on you if your Strength is already 19 or higher.
  rarity: Uncommon
  item_type: Wondrous item
  requires_attunement: true

- class_name: NaturesMantle
  name: Nature's Mantle
  description: |
    This cloak shifts color and texture to blend with the terrain surrounding
    you. While wearing the cloak, you can use it as a spellcasting focus for
    your druid and ranger spells.

    While you are in an area that is lightly obscured, you can Hide as a bonus
    action even if you are being directly observed.
  rarity: Uncommon
  requires_attunement: true

- class_name: EagleWhistle
  name: Eagle Whistle
  description: |
    While you blow an Eagle Whistle continuously, you can fly twice as fast as
    your walking speed. You can blow the whistle continuously for a number of
    rounds equal to 5 + five times your Constitution modifier (minimum of 1
    round) or until you talk, hold your breath, or start suffocating. A use of
    the whistle also ends if you land. If you are aloft when you stop blowing
    the whistle, you fall. The whistle has three uses. It regains expended uses
    daily at dawn.
  rarity: Rare

- class_name: DecanterOfEndlessWater
  name: Decanter of Endless Water
  description: |
    This stoppered flask sloshes when shaken, as if it contains water. The
    decanter weighs 2 pounds.

    You can use an action to remove the stopper and speak one of three command
    words, whereupon an amount of fresh water or salt water (your choice) pours
    out of the flask. The water stops pouring out at the start of your next turn.
    "Stream" produces 1 gallon of water. "Fountain" produces 5 gallons of water.
    "Geyser" produces 30 gallons of water that gushes forth in a geyser 30 feet
    long and 1 foot wide. As a bonus action while holding the decanter, you can
    aim the geyser at a creature you can see within 30 feet of you. The target
    must succeed on a DC 13 Strength saving throw or take 1d4 bludgeoning damage
    and fall prone.
  rarity: Uncommon
  item_type: Wondrous item

- class_name: ToothOfAnimalFriendship
  name: Tooth of Animal Friendship
  description: |
    While holding this wolf's tooth, you can expend its one charge to cast
    Animal Friendship (DC 13) or Speak With Animals.

    The charge resets at the next Dawn.
  rarity: Uncommon

- class_name: CloakOfBillowing
  name: Cloak of Billowing
  description: |
    While wearing this cloak, you can use a bonus action to make it billow
    dramatically.
  rarity: Common
  item_type: Cloak

- class_name: CloakOfDisplacement
  name: Cloak of Displacement
  description: |
    While you wear this cloak, it projects an illusion that makes you appear
    to be standing in a place near your actual location, causing any creature
    to have disadvantage on attack rolls against you. If you take damage, the
    property ceases to function until the start of your next turn. This
    property is suppressed while you are incapacitated, restrained, or
    otherwise unable to move.
  rarity: Rare
  item_type: Cloak

- class_name: CapeOfTheMountebank
  name: Cape of the Mountebank
  description: |
    This cape smells faintly of brimstone. While wearing it, you can use it
    to cast the Dimension Door spell as an action. This property of the cape
    can't be used again until the next dawn.

    When you disappear, you leave behind a cloud of smoke, and you appear in
    a similar cloud of smoke at your destination. The smoke lightly obscures
    the space you left and the space you appear in, and it dissipates at the
    end of your next turn. A light or stronger wind disperses the smoke.
  rarity: Rare
  requires_attunement: true

- class_name: EyesOfCharming
  name: Eyes of Charming
  description: |
    These Crystal lenses fit over the eyes. They have 3 Charges. While
    wearing them, you can expend 1 charge as an action to cast the Charm
    Person spell (save DC 13) on a humanoid within 30 feet of you, provided
    that you and the target can see each other. The lenses regain all expended
    Charges daily at dawn.
  rarity: Uncommon
  requires_attunement: true

- class_name: CharlatansDie
  name: Charlatan's Die
  description: |
    Whenever you roll this six-sided die, you can control which number it rolls.
  rarity: Common

- class_name: PipeOfSmokeMonsters
  name: Pipe of Smoke Monsters
  description: |
    While smoking this pipe, you can use an action to exhale a puff of smoke
    that takes the form of a single creature, such as a dragon, a flumph, or
    a froghemoth. The form must be small enough to fit in a 1-foot cube and
    loses its shape after a few seconds, becoming an ordinary puff of smoke.
  rarity: Common

- class_name: CoinsOfCommunication
  name: Coins of Communication
  description: |
    This set of multiple coins are virtually indistinguishable from regular
    Gold Pieces, but are connected by magic. Once per day, a holder of any
    coin can whisper a single word into it, after which all coins will
    immediately vibrate and the word will replace a word in the traditional
    King's Message imprinted on the coin. This ability cannot be used again
    by the holder of any of the coins until the following dawn.
  rarity: Uncommon

- class_name: FlameTongue
  name: Flame Tongue
  description: |
    You can use a Bonus Action to speak this magic sword's Command Word,
    causing flames to erupt from the blade. These flames shed bright light in
    a 40-foot radius and dim light for an additional 40 feet. While the sword
    is ablaze, it deals an extra 2d6 fire damage to any target it hits. The
    flames last until you use a Bonus Action to speak the Command Word again
    or until you drop or sheathe the sword.
  rarity: Rare
  item_type: Weapon
  requires_attunement: true

- class_name: StaffOfTheAdder
  name: Staff of the Adder
  description: |
    You can use a bonus action to speak this staff's command word and make
    the head of the staff become that of an animate poisonous snake for 1
    minute. By using another bonus action to speak the command word again,
    you return the staff to its normal inanimate form.

    You can make a melee attack using the snake head, which has a reach of 5
    feet. Your proficiency bonus applies to the attack roll. On a hit, the
    target takes 1d6 piercing damage and must succeed on a DC 15 Constitution
    saving throw or take 3d6 poison damage.

    The snake head can be attacked while it is animate. It has an Armor Class
    of 15 and 20 hit points. If the head drops to 0 hit points, the staff is
    destroyed. As long as it's not destroyed, the staff regains all lost hit
    points when it reverts to its inanimate form.

    While in its normal form, the staff functions as a magic quarterstaff.

    Requires attunement by a cleric, druid, or warlock.
  rarity: Uncommon
  item_type: Staff
  requires_attunement: true

- class_name: AmuletOfTheEel
  name: Amulet of the Eel
  description: |
    While holding this amulet, you can breathe water and air, and have a
    swimming speed of 20 feet.

- class_name: BracersOfMagnetism
  name: Bracers of Magnetism
  description: |
    When wearing these bracers, you can use a bonus action to speak their
    command word, causing them to become magnetically attractive to each other.

    While active, the wearer's arms are secured together, requiring a
    successful DC 25 STR (Athletics) check to separate them by six inches.
    The wearer has advantage on all STR (Athletics) checks made to grapple,
    but disadvantage on all weapon attacks and DEX (Sleight of Hand) checks.

    The wearer can use another bonus action to speak the command word and
    deactivate the magnetic effect. The magnetic effect fails if the bracers
    are more than 10 feet apart.
  requires_attunement: true

- class_name: ShieldOfFaces
  name: Shield of Faces
  description: |
    This +1 metallic shield has a detailed face chiseled into its front
    surface. As a bonus action, the wielder can mentally command the shield
    to adopt a new emotional state (such as "smiling", "laughing", "crying",
    etc.)
  item_type: Shield
  requires_attunement: true

- class_name: GlovesOfThievery
  name: Gloves of Thievery
  description: |
    These gloves are invisible while worn. While wearing them, you gain a +5
    bonus to Dexterity (Sleight of Hand) checks and Dexterity checks made to
    pick locks.
  rarity: Uncommon
  item_type: Wondrous item

- class_name: GlowingSword
  name: Glowing Sword
  description: |
    This strange longsword glows at odd times.

- class_name: PearlOfPower
  name: Pearl of Power
  description: |
    While this pearl is on your person, you can use an action to speak its
    Command Word and regain one expended spell slot. If the expended slot is
    of 4th Level or higher, the new slot is 3rd Level. Once you have used the
    pearl, it can't be used again until the next dawn.
  requires_attunement: true

- class_name: PotionOfGreaterHealing
  name: Potion of Greater Healing
  description: |
    You regain hit points when you drink this potion. The potion's red liquid
    glimmers when agitated.

    Greater healing: Uncommon — 4d4 + 4 HP regained.
  rarity: Uncommon
  item_type: Potion
  passive_effect_description: Regain 4d4 + 4 hit points when consumed
  passive_effect_value: 14

- class_name: PotionOfSuperiorHealing
  name: Potion of Superior Healing
  description: |
    You regain hit points when you drink this potion. The potion's red liquid
    glimmers when agitated.

    Superior healing: Rare — 8d4 + 8 HP regained.
  rarity: Rare
  item_type: Potion
  passive_effect_description: Regain 8d4 + 8 hit points when consumed
  passive_effect_value: 28

- class_name: PotionOfSupremeHealing
  name: Potion of Supreme Healing
  description: |
    You regain hit points when you drink this potion. The potion's red liquid
    glimmers when agitated.

    Supreme healing: Very Rare — 10d4 + 20 HP regained.
  rarity: Very Rare
  item_type: Potion
  passive_effect_description: Regain 10d4 + 20 hit points when consumed
  passive_effect_value: 45

- class_name: PotionOfResistance
  name: Potion of Resistance
  description: |
    When you drink this potion, you gain resistance to one type of damage for
    1 hour. The DM chooses the type or determines it randomly from: Acid,
    Cold, Fire, Force, Lightning, Necrotic, Poison, Psychic, Radiant, or
    Thunder.
  rarity: Uncommon
  item_type: Potion

- class_name: PotionOfInvisibility
  name: Potion of Invisibility
  description: |
    This potion's container looks empty but feels as though it holds liquid.
    When you drink it, you become invisible for 1 hour. Anything you wear or
    carry is invisible with you. The effect ends early if you attack or cast
    a spell.
  rarity: Very Rare
  item_type: Potion
