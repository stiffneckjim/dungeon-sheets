- class_name: Aboleth
  name: Aboleth
  creature_type: Large aberration, lawful evil
  challenge_rating: 10
  armor_class: 17
  hp_max: 135
  speed: 10 ft.
  strength: 21
  dexterity: 9
  constitution: 15
  intelligence: 18
  wisdom: 15
  charisma: 18
  skill_str: History +12, Perception +10
  senses: Darkvision 120 ft., Passive Perception 20
  languages: Deep Speech, telepathy 120 ft.
  description: |
    Amphibious.
      The aboleth can breathe air and water.
    Mucous Cloud.
      While underwater, the aboleth is surrounded by transformative mucus. A
      creature that touches the aboleth or that hits it with a melee attack
      while within 5 ft. of it must make a DC 14 Constitution saving throw.
      On a failure, the creature is diseased for 1d4 hours. The diseased
      creature can breathe only underwater.
    Probing Telepathy.
      If a creature communicates telepathically with the aboleth, the
      aboleth learns the creature's greatest desires if the aboleth can see
      the creature.

    # Actions

    Multiattack.
      The aboleth makes three tentacle attacks.
    Tentacle.
      Melee Weapon Attack: +9 to hit, reach 10 ft., one target. Hit: 12 (2d6
      + 5) bludgeoning damage. If the target is a creature, it must succeed
      on a DC 14 Constitution saving throw or become diseased. The disease
      has no effect for 1 minute and can be removed by any magic that cures
      disease. After 1 minute, the diseased creature's skin becomes
      translucent and slimy, the creature can't regain hit points unless it
      is underwater, and the disease can be removed only by heal or another
      disease-curing spell of 6th level or higher. When the creature is
      outside a body of water, it takes 6 (1d12) acid damage every 10
      minutes unless moisture is applied to the skin before 10 minutes have
      passed.
    Tail.
      Melee Weapon Attack: +9 to hit, reach 10 ft. one target. Hit: 15 (3d6
      + 5) bludgeoning damage.
    Enslave.
      The aboleth targets one creature it can see within 30 ft. of it. The
      target must succeed on a DC 14 Wisdom saving throw or be magically
      charmed by the aboleth until the aboleth dies or until it is on a
      different plane of existence from the target. The charmed target is
      under the aboleth's control and can't take reactions, and the aboleth
      and the target can communicate telepathically with each other over any
      distance.

      Whenever the charmed target takes damage, the target can repeat the
      saving throw. On a success, the effect ends. No more than once every
      24 hours, the target can also repeat the saving throw when it is at
      least 1 mile away from the aboleth.

    # Legendary Actions

    Detect.
      The aboleth makes a Wisdom (Perception) check.
    Tail Swipe.
      The aboleth makes one tail attack.
    Psychic Drain (Costs 2 Actions).
      One creature charmed by the aboleth takes 10 (3d6) psychic damage, and
      the aboleth regains hit points equal to the damage the creature takes.

    # Lair Actions

    Finally, aboleths have lair actions they can take on initiative
    count 20 when they are in their lair. These actions can take one
    of three forms.

    The aboleth can cast Phantasmal Force without components on any
    number of creatures it can see within 60 feet. This is a powerful
    ability but one that requires concentration; the aboleth can’t use
    other lair actions while concentrating on it. Also, targets that
    make their save against the aboleth’s spell are immune to it for
    the next 24 hours.

    The aboleth can also make pools of water within 90 feet flood
    outwards, forcing a DC 14 Strength save on any creature within 20
    feet of such pool. Failing the save means being pulled 20 feet
    into the water and knocked prone.

    Lastly, the aboleth can make water in its lair become a conduit
    for 2d6 (7 avg) psychic damage. Creatures take this damage if the
    aboleth can see them and if they fail a DC 14 Wisdom saving throw.

    These are pretty rough, but at least the aboleth needs to mix it
    up; it can’t use either of the last two lair actions twice in a
    row.
  traits: 
  - name: Amphibious
    description: The aboleth can breathe air and water.
  - name: Mucous Cloud
    description: While underwater, the aboleth is surrounded by transformative mucus. A creature that touches the aboleth or that hits it with a melee attack while within 5 ft. of it must make a DC 14 Constitution saving throw. On a failure, the creature is diseased for 1d4 hours. The diseased creature can breathe only underwater.
  - name: Probing Telepathy
    description: If a creature communicates telepathically with the aboleth, the aboleth learns the creature's greatest desires if the aboleth can see the creature.
  actions: 
  - name: Multiattack
    description: The aboleth makes three tentacle attacks.
  - name: Tentacle
    description: "Melee Weapon Attack: +9 to hit, reach 10 ft., one target. Hit: 12 (2d6 + 5) bludgeoning damage. If the target is a creature, it must succeed on a DC 14 Constitution saving throw or become diseased. The disease has no effect for 1 minute and can be removed by any magic that cures disease. After 1 minute, the diseased creature's skin becomes translucent and slimy, the creature can't regain hit points unless it is underwater, and the disease can be removed only by heal or another disease-curing spell of 6th level or higher. When the creature is outside a body of water, it takes 6 (1d12) acid damage every 10 minutes unless moisture is applied to the skin before 10 minutes have passed."
  - name: Tail
    description: "Melee Weapon Attack: +9 to hit, reach 10 ft. one target. Hit: 15 (3d6 + 5) bludgeoning damage."
  - name: Enslave
    description: The aboleth targets one creature it can see within 30 ft. of it. The target must succeed on a DC 14 Wisdom saving throw or be magically charmed by the aboleth until the aboleth dies or until it is on a different plane of existence from the target. The charmed target is under the aboleth's control and can't take reactions, and the aboleth and the target can communicate telepathically with each other over any distance. Whenever the charmed target takes damage, the target can repeat the saving throw. On a success, the effect ends. No more than once every 24 hours, the target can also repeat the saving throw when it is at least 1 mile away from the aboleth.
  legendary_actions: 
  - name: Detect
    description: The aboleth makes a Wisdom (Perception) check.
  - name: Tail Swipe
    description: The aboleth makes one tail attack.
  - name: Psychic Drain (Costs 2 Actions)
    description: One creature charmed by the aboleth takes 10 (3d6) psychic damage, and the aboleth regains hit points equal to the damage the creature takes.

- class_name: Acolyte
  name: Acolyte
  creature_type: Medium humanoid, any alignment
  challenge_rating: 0.25
  armor_class: 10
  hp_max: 9
  speed: 30 ft.
  strength: 10
  dexterity: 10
  constitution: 10
  intelligence: 10
  wisdom: 14
  charisma: 11
  skill_str: Medicine +4, Religion +2
  senses: Passive Perception 12
  languages: any one language (usually Common)
  description: |
    Spellcasting.
      The acolyte is a 1st-level spellcaster. Its spellcasting ability is Wisdom (spell save DC 12, +4 to hit with spell attacks). The acolyte has following cleric spells prepared:

      - Cantrips (at will): light, sacred flame, thaumaturgy
      - 1st level (3 slots): bless, cure wounds, sanctuary

    # Actions

    Club.
      Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: 2 (1d4)
      bludgeoning damage.
