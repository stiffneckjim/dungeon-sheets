- class_name: Basilisk
  name: Basilisk
  creature_type: Medium monstrosity, unaligned
  challenge_rating: 3
  armor_class: 12
  hp_max: 52
  speed: 20 ft.
  strength: 16
  dexterity: 8
  constitution: 15
  intelligence: 2
  wisdom: 8
  charisma: 7
  senses: Darkvision 60 ft., Passive Perception 9
  description: |
    Petrifying Gaze.
      If a creature starts its turn within 30 ft. of the basilisk and the
      two of them can see each other, the basilisk can force the creature to
      make a DC 12 Constitution saving throw if the basilisk isn't
      incapacitated. On a failed save, the creature magically begins to turn
      to stone and is restrained. It must repeat the saving throw at the end
      of its next turn. On a success, the effect ends. On a failure, the
      creature is petrified until freed by the greater restoration spell or
      other magic.

      A creature that isn't surprised can avert its eyes to avoid the saving
      throw at the start of its turn. If it does so, it can't see the
      basilisk until the start of its next turn, when it can avert its eyes
      again. If it looks at the basilisk in the meantime, it must
      immediately make the save.

      If the basilisk sees its reflection within 30 ft. of it in bright
      light, it mistakes itself for a rival and targets itself with its
      gaze.

    # Actions

    Bite.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6
      + 3) piercing damage plus 7 (2d6) poison damage.
  traits: 
  - name: Petrifying Gaze
    description: If a creature starts its turn within 30 ft. of the basilisk and the two of them can see each other, the basilisk can force the creature to make a DC 12 Constitution saving throw if the basilisk isn't incapacitated. On a failed save, the creature magically begins to turn to stone and is restrained. It must repeat the saving throw at the end of its next turn. On a success, the effect ends. On a failure, the creature is petrified until freed by the greater restoration spell or other magic. A creature that isn't surprised can avert its eyes to avoid the saving throw at the start of its turn. If it does so, it can't see the basilisk until the start of its next turn, when it can avert its eyes again. If it looks at the basilisk in the meantime, it must immediately make the save. If the basilisk sees its reflection within 30 ft. of it in bright light, it mistakes itself for a rival and targets itself with its gaze.
  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6 + 3) piercing damage plus 7 (2d6) poison damage."

