  - name: Longbow
    description: "Ranged Weapon Attack: +4 to hit, range 150/600 ft., one target. Hit: 6 (1d8 + 2) piercing damage."

- class_name: ChainDevil
  name: Chain Devil
  creature_type: Medium fiend, lawful evil
  challenge_rating: 8
  armor_class: 16
  hp_max: 85
  speed: 30 ft.
  strength: 18
  dexterity: 15
  constitution: 18
  intelligence: 11
  wisdom: 12
  charisma: 14
  senses: Darkvision 120 ft., Passive Perception 11
  languages: Infernal, telepathy 120 ft.
  damage_immunities: fire, poison
  damage_resistances: cold
  condition_immunities: poisoned
  description: |
    Devil's Sight.
      Magical darkness doesn't impede the devil's darkvision.
    Magic Resistance.
      The devil has advantage on saving throws against spells and other
      magical effects.

    # Actions

    Multiattack.
      The devil makes two attacks with its chains.
    Chain.
      Melee Weapon Attack: +8 to hit, reach 10 ft., one target. Hit: 11 (2d6
      + 4) slashing damage. The target is grappled (escape DC 14) if the
      devil isn't already grappling a creature. Until this grapple ends, the
      target is restrained and takes 7 (2d6) piercing damage at the start of
      each of its turns.
    Animate Chains.
      Up to four chains the devil can see within 60 feet of it magically
      sprout razor-edged barbs and animate under the devil's control,
      provided that the chains aren't being worn or carried.

      Each animated chain is an object with AC 20, 20 hit points, resistance
      to piercing damage, and immunity to psychic and thunder damage. When
      the devil uses Multiattack on its turn, it can use each animated chain
      to make one additional chain attack. An animated chain can grapple one
      creature of its own but can't make attacks while grappling. An
      animated chain reverts to its inanimate state if reduced to 0 hit
      points or if the devil is incapacitated or dies.

    # Reactions

    Unnerving Mask.
      When a creature the devil can see starts its turn within 30 feet of
      the devil, the devil can create the illusion that it looks like one of
      the creature's departed loved ones or bitter enemies. If the creature
      can see the devil, it must succeed on a DC 14 Wisdom saving throw or
      be frightened until the end of its turn.
  traits: 
  - name: Devil's Sight
    description: Magical darkness doesn't impede the devil's darkvision.
  - name: Magic Resistance
    description: The devil has advantage on saving throws against spells and other magical effects.
  actions: 
  - name: Multiattack
    description: The devil makes two attacks with its chains.
  - name: Chain
    description: "Melee Weapon Attack: +8 to hit, reach 10 ft., one target. Hit: 11 (2d6 + 4) slashing damage. The target is grappled (escape DC 14) if the devil isn't already grappling a creature. Until this grapple ends, the target is restrained and takes 7 (2d6) piercing damage at the start of each of its turns."
  - name: Animate Chains
    description: Up to four chains the devil can see within 60 feet of it magically sprout razor-edged barbs and animate under the devil's control, provided that the chains aren't being worn or carried. Each animated chain is an object with AC 20, 20 hit points, resistance to piercing damage, and immunity to psychic and thunder damage. When the devil uses Multiattack on its turn, it can use each animated chain to make one additional chain attack. An animated chain can grapple one creature of its own but can't make attacks while grappling. An animated chain reverts to its inanimate state if reduced to 0 hit points or if the devil is incapacitated or dies.
  reactions: 
  - name: Unnerving Mask
    description: When a creature the devil can see starts its turn within 30 feet of the devil, the devil can create the illusion that it looks like one of the creature's departed loved ones or bitter enemies. If the creature can see the devil, it must succeed on a DC 14 Wisdom saving throw or be frightened until the end of its turn.

