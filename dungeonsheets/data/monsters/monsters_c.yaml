- class_name: ClayGolem
  name: Clay Golem
  creature_type: Large construct, unaligned
  challenge_rating: 9
  armor_class: 14
  hp_max: 133
  speed: 20 ft.
  strength: 20
  dexterity: 9
  constitution: 18
  intelligence: 3
  wisdom: 8
  charisma: 1
  senses: Darkvision 60 ft., Passive Perception 9
  languages: understands the languages of its creator but can't speak
  damage_immunities: acid, poison, psychic, bludgeoning, piercing, and slashing from nonmagical weapons that aren't adamantine
  condition_immunities: charmed, exhaustion, frightened, paralyzed, petrified, poisoned
  description: |
    Acid Absorption.
      Whenever the golem is subjected to acid damage, it takes no damage and
      instead regains a number of hit points equal to the acid damage dealt.
    Berserk.
      Whenever the golem starts its turn with 60 hit points or fewer, roll a
      d6. On a 6, the golem goes berserk. On each of its turns while
      berserk, the golem attacks the nearest creature it can see. If no
      creature is near enough to move to and attack, the golem attacks an
      object, with preference for an object smaller than itself. Once the
      golem goes berserk, it continues to do so until it is destroyed or
      regains all its hit points.
    Immutable Form.
      The golem is immune to any spell or effect that would alter its form.
    Magic Resistance.
      The golem has advantage on saving throws against spells and other
      magical effects.
    Magic Weapons.
      The golem's weapon attacks are magical.

    # Actions

    Multiattack.
      The golem makes two slam attacks.
    Slam.
      Melee Weapon Attack: +8 to hit, reach 5 ft., one target. Hit: 16 (2d10
      + 5) bludgeoning damage. If the target is a creature, it must succeed
      on a DC 15 Constitution saving throw or have its hit point maximum
      reduced by an amount equal to the damage taken. The target dies if
      this attack reduces its hit point maximum to 0. The reduction lasts
      until removed by the greater restoration spell or other magic.
    Haste.
      Until the end of its next turn, the golem magically gains a +2 bonus
      to its AC, has advantage on Dexterity saving throws, and can use its
      slam attack as a bonus action.
  traits: 
  - name: Acid Absorption
    description: Whenever the golem is subjected to acid damage, it takes no damage and instead regains a number of hit points equal to the acid damage dealt.
  - name: Berserk
    description: Whenever the golem starts its turn with 60 hit points or fewer, roll a d6. On a 6, the golem goes berserk. On each of its turns while berserk, the golem attacks the nearest creature it can see. If no creature is near enough to move to and attack, the golem attacks an object, with preference for an object smaller than itself. Once the golem goes berserk, it continues to do so until it is destroyed or regains all its hit points.
  - name: Immutable Form
    description: The golem is immune to any spell or effect that would alter its form.
  - name: Magic Resistance
    description: The golem has advantage on saving throws against spells and other magical effects.
  - name: Magic Weapons
    description: The golem's weapon attacks are magical.
  actions: 
  - name: Multiattack
    description: The golem makes two slam attacks.
  - name: Slam
    description: "Melee Weapon Attack: +8 to hit, reach 5 ft., one target. Hit: 16 (2d10 + 5) bludgeoning damage. If the target is a creature, it must succeed on a DC 15 Constitution saving throw or have its hit point maximum reduced by an amount equal to the damage taken. The target dies if this attack reduces its hit point maximum to 0. The reduction lasts until removed by the greater restoration spell or other magic."
  - name: Haste
    description: Until the end of its next turn, the golem magically gains a +2 bonus to its AC, has advantage on Dexterity saving throws, and can use its slam attack as a bonus action.

- class_name: Cloaker
  name: Cloaker
  creature_type: Large aberration, chaotic neutral
  challenge_rating: 8
  armor_class: 14
  hp_max: 78
  speed: 10 ft.
  strength: 17
  dexterity: 15
  constitution: 12
  intelligence: 13
  wisdom: 12
  charisma: 14
  skill_str: Stealth +5
  senses: Darkvision 60 ft., Passive Perception 11
  languages: Deep Speech, Undercommon
  description: |
    Damage Transfer.
      While attached to a creature, the cloaker takes only half the damage
      dealt to it (rounded down). and that creature takes the other half.
    False Appearance.
      While the cloaker remains motionless without its underside exposed, it
      is indistinguishable from a dark leather cloak.
    Light Sensitivity.
      While in bright light, the cloaker has disadvantage on attack rolls
      and Wisdom (Perception) checks that rely on sight.

    # Actions

    Multiattack.
      The cloaker makes two attacks: one with its bite and one with its
      tail.
    Bite.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one creature. Hit: 10
      (2d6 + 3) piercing damage, and if the target is Large or smaller, the
      cloaker attaches to it. If the cloaker has advantage against the
      target, the cloaker attaches to the target's head, and the target is
      blinded and unable to breathe while the cloaker is attached. While
      attached, the cloaker can make this attack only against the target and
      has advantage on the attack roll. The cloaker can detach itself by
      spending 5 feet of its movement. A creature, including the target, can
      take its action to detach the cloaker by succeeding on a DC 16
      Strength check.
    Tail.
      Melee Weapon Attack: +6 to hit, reach 10 ft., one creature. Hit: 7
      (1d8 + 3) slashing damage.
    Moan.
      Each creature within 60 feet of the cloaker that can hear its moan and
      that isn't an aberration must succeed on a DC 13 Wisdom saving throw
      or become frightened until the end of the cloaker's next turn. If a
      creature's saving throw is successful, the creature is immune to the
      cloaker's moan for the next 24 hours.
    Phantasms.
      The cloaker magically creates three illusory duplicates of itself if
      it isn't in bright light. The duplicates move with it and mimic its
      actions, shifting position so as to make it impossible to track which
      cloaker is the real one. If the cloaker is ever in an area of bright
      light, the duplicates disappear.

      Whenever any creature targets the cloaker with an attack or a harmful
      spell while a duplicate remains, that creature rolls randomly to
      determine whether it targets the cloaker or one of the duplicates. A
      creature is unaffected by this magical effect if it can't see or if it
      relies on senses other than sight.

      A duplicate has the cloaker's AC and uses its saving throws. If an
      attack hits a duplicate, or if a duplicate fails a saving throw
      against an effect that deals damage, the duplicate disappears.
  traits: 
  - name: Damage Transfer
    description: While attached to a creature, the cloaker takes only half the damage dealt to it (rounded down). and that creature takes the other half.
  - name: False Appearance
    description: While the cloaker remains motionless without its underside exposed, it is indistinguishable from a dark leather cloak.
  - name: Light Sensitivity
    description: While in bright light, the cloaker has disadvantage on attack rolls and Wisdom (Perception) checks that rely on sight.
  actions: 
  - name: Multiattack
    description: "The cloaker makes two attacks: one with its bite and one with its tail."
  - name: Bite
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one creature. Hit: 10 (2d6 + 3) piercing damage, and if the target is Large or smaller, the cloaker attaches to it. If the cloaker has advantage against the target, the cloaker attaches to the target's head, and the target is blinded and unable to breathe while the cloaker is attached. While attached, the cloaker can make this attack only against the target and has advantage on the attack roll. The cloaker can detach itself by spending 5 feet of its movement. A creature, including the target, can take its action to detach the cloaker by succeeding on a DC 16 Strength check."
  - name: Tail
    description: "Melee Weapon Attack: +6 to hit, reach 10 ft., one creature. Hit: 7 (1d8 + 3) slashing damage."
  - name: Moan
    description: Each creature within 60 feet of the cloaker that can hear its moan and that isn't an aberration must succeed on a DC 13 Wisdom saving throw or become frightened until the end of the cloaker's next turn. If a creature's saving throw is successful, the creature is immune to the cloaker's moan for the next 24 hours.
  - name: Phantasms
    description: The cloaker magically creates three illusory duplicates of itself if it isn't in bright light. The duplicates move with it and mimic its actions, shifting position so as to make it impossible to track which cloaker is the real one. If the cloaker is ever in an area of bright light, the duplicates disappear. Whenever any creature targets the cloaker with an attack or a harmful spell while a duplicate remains, that creature rolls randomly to determine whether it targets the cloaker or one of the duplicates. A creature is unaffected by this magical effect if it can't see or if it relies on senses other than sight. A duplicate has the cloaker's AC and uses its saving throws. If an attack hits a duplicate, or if a duplicate fails a saving throw against an effect that deals damage, the duplicate disappears.

