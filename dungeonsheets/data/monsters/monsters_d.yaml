- class_name: Dao
  name: Dao
  creature_type: Large elemental, neutral evil
  challenge_rating: 11
  armor_class: 18
  hp_max: 187
  speed: 30 ft.
  strength: 23
  dexterity: 12
  constitution: 24
  intelligence: 12
  wisdom: 13
  charisma: 14
  saving_throws: Int +5, Wis +5, Cha +6
  senses: darkvision 120ft., passive Perception 11
  languages: Terran
  condition_immunities: petrified
  description: |
    Earth Glide.
      The dao can burrow through nonmagical unworked earth and
      stone. While doing so, the dao doesn't distrub the material it
      moves through.
    Elemental Demise.
      If the dao dies, its body disintegrates into crystalline powder,
      leaving behind only equipment the dao was wearing or carrying.
    Innate Spellcasting.
      The dao's innate spellcasting ability is Charisma (spell save DC
      14, +6 to hit with spell attacks). It can innately cast the
      following spells, requiring no material components:

      - At will: detect evil and good, detect magic, stone shape.
      - 3/day each: passwall, move earth, tongues.
      - 1/day each: conjure elemental (earth elemental only), gaseous
        form, invisibility, phantasmal killer, plane shift, wall of
        stone.

    Sure-Footed.
      The dao has advantage on Strength and Dexterity saving throws
      made against effects that would knock it prone.

    # Actions

    Multiattack.
      The dao makes two fist attacks or two maul attacks.
    Fist.
      Melee weapon attack: +10 to hit, reach 5ft., one
      target. Hit: 15 (2d8 + 6) bludgeoning damage.
    Maul.
      Melee weapon attack: +10 to hit, reach 5ft., one
      target. Hit: 20 (4d6 + 6) bludgeoning damage. If the target is
      a Huge or smaller creature, it must succeed on a DC 18 Strength
      check or be knocked prone.
  traits: 
  - name: Earth Glide
    description: The dao can burrow through nonmagical unworked earth and stone. While doing so, the dao doesn't distrub the material it moves through.
  - name: Elemental Demise
    description: If the dao dies, its body disintegrates into crystalline powder, leaving behind only equipment the dao was wearing or carrying.
  - name: Innate Spellcasting
    description: "The dao's innate spellcasting ability is Charisma (spell save DC 14, +6 to hit with spell attacks). It can innately cast the following spells, requiring no material components: - At will: detect evil and good, detect magic, stone shape. - 3/day each: passwall, move earth, tongues. - 1/day each: conjure elemental (earth elemental only), gaseous form, invisibility, phantasmal killer, plane shift, wall of stone."
  - name: Sure-Footed
    description: The dao has advantage on Strength and Dexterity saving throws made against effects that would knock it prone.
  actions: 
  - name: Multiattack
    description: The dao makes two fist attacks or two maul attacks.
  - name: Fist
    description: "Melee weapon attack: +10 to hit, reach 5ft., one target. Hit: 15 (2d8 + 6) bludgeoning damage."
  - name: Maul
    description: "Melee weapon attack: +10 to hit, reach 5ft., one target. Hit: 20 (4d6 + 6) bludgeoning damage. If the target is a Huge or smaller creature, it must succeed on a DC 18 Strength check or be knocked prone."

- class_name: Darkmantle
  name: Darkmantle
  creature_type: Small monstrosity, unaligned
  challenge_rating: 0.5
  armor_class: 11
  hp_max: 22
  speed: 10 ft.
  strength: 16
  dexterity: 12
  constitution: 13
  intelligence: 2
  wisdom: 10
  charisma: 5
  skill_str: Stealth +3
  senses: Blindsight 60 ft., Passive Perception 10
  description: |
    Echolocation.
      The darkmantle can't use its blindsight while deafened.
    False Appearance.
      While the darkmantle remains motionless, it is indistinguishable from
      a cave formation such as a stalactite or stalagmite.

    # Actions

    Crush.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one creature. Hit: 6 (1d6
      + 3) bludgeoning damage, and the darkmantle attaches to the target. If
      the target is Medium or smaller and the darkmantle has advantage on
      the attack roll, it attaches by engulfing the target's head, and the
      target is also blinded and unable to breathe while the darkmantle is
      attached in this way.

      While attached to the target, the darkmantle can attack no other
      creature except the target but has advantage on its attack rolls. The
      darkmantle's speed also becomes 0, it can't benefit from any bonus to
      its speed, and it moves with the target.

      A creature can detach the darkmantle by making a successful DC 13
      Strength check as an action. On its turn, the darkmantle can detach
      itself from the target by using 5 feet of movement.
    Darkness Aura.
      A 15-foot radius of magical darkness extends out from the darkmantle,
      moves with it, and spreads around corners. The darkness lasts as long
      as the darkmantle maintains concentration, up to 10 minutes (as if
      concentrating on a spell). Darkvision can't penetrate this darkness,
      and no natural light can illuminate it. If any of the darkness
      overlaps with an area of light created by a spell of 2nd level or
      lower, the spell creating the light is dispelled.
  traits: 
  - name: Echolocation
    description: The darkmantle can't use its blindsight while deafened.
  - name: False Appearance
    description: While the darkmantle remains motionless, it is indistinguishable from a cave formation such as a stalactite or stalagmite.
  actions: 
  - name: Crush
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one creature. Hit: 6 (1d6 + 3) bludgeoning damage, and the darkmantle attaches to the target. If the target is Medium or smaller and the darkmantle has advantage on the attack roll, it attaches by engulfing the target's head, and the target is also blinded and unable to breathe while the darkmantle is attached in this way. While attached to the target, the darkmantle can attack no other creature except the target but has advantage on its attack rolls. The darkmantle's speed also becomes 0, it can't benefit from any bonus to its speed, and it moves with the target. A creature can detach the darkmantle by making a successful DC 13 Strength check as an action. On its turn, the darkmantle can detach itself from the target by using 5 feet of movement."
  - name: Darkness Aura
    description: A 15-foot radius of magical darkness extends out from the darkmantle, moves with it, and spreads around corners. The darkness lasts as long as the darkmantle maintains concentration, up to 10 minutes (as if concentrating on a spell). Darkvision can't penetrate this darkness, and no natural light can illuminate it. If any of the darkness overlaps with an area of light created by a spell of 2nd level or lower, the spell creating the light is dispelled.

