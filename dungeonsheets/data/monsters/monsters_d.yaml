- class_name: Djinni
  name: Djinni
  creature_type: Large elemental, chaotic good
  challenge_rating: 11
  armor_class: 17
  hp_max: 161
  speed: 30 ft.
  strength: 21
  dexterity: 15
  constitution: 22
  intelligence: 15
  wisdom: 16
  charisma: 20
  senses: Darkvision 120 ft., Passive Perception 13
  languages: Auran
  damage_immunities: lightning, thunder
  description: |
    Elemental Demise.
      If the djinni dies, its body disintegrates into a warm breeze, leaving
      behind only equipment the djinni was wearing or carrying.
    Innate Spellcasting.
      The djinni's innate spellcasting ability is Charisma (spell save DC
      17, +9 to hit with spell attacks). It can innately cast the following
      spells, requiring no material components:



      At will: detect evil and good, detect magic, thunderwave

      3/day each: create food and water (can create wine instead of water),
      tongues, wind walk

      1/day each: conjure elemental (air elemental only), creation, gaseous
      form, invisibility, major image, plane shift
    Variant: Genie Powers.
      Genies have a variety of magical capabilities, including spells. A few
      have even greater powers that allow them to alter their appearance or
      the nature of reality.



      Disguises.

      Some genies can veil themselves in illusion to pass as other similarly
      shaped creatures. Such genies can innately cast the disguise self
      spell at will, often with a longer duration than is normal for that
      spell. Mightier genies can cast the true polymorph spell one to three
      times per day, possibly with a longer duration than normal. Such
      genies can change only their own shape, but a rare few can use the
      spell on other creatures and objects as well.

      Wishes.

      The genie power to grant wishes is legendary among mortals. Only the
      most potent genies, such as those among the nobility, can do so. A
      particular genie that has this power can grant one to three wishes to
      a creature that isn't a genie. Once a genie has granted its limit of
      wishes, it can't grant wishes again for some amount of time (usually 1
      year). and cosmic law dictates that the same genie can expend its
      limit of wishes on a specific creature only once in that creature's
      existence.

      To be granted a wish, a creature within 60 feet of the genie states a
      desired effect to it. The genie can then cast the wish spell on the
      creature's behalf to bring about the effect. Depending on the genie's
      nature, the genie might try to pervert the intent of the wish by
      exploiting the wish's poor wording. The perversion of the wording is
      usually crafted to be to the genie's benefit.

    # Actions

    Multiattack.
      The djinni makes three scimitar attacks.
    Scimitar.
      Melee Weapon Attack: +9 to hit, reach 5 ft., one target. Hit: 12 (2d6
      + 5) slashing damage plus 3 (1d6) lightning or thunder damage
      (djinni's choice).
    Create Whirlwind.
      A 5-foot-radius, 30-foot-tall cylinder of swirling air magically forms
      on a point the djinni can see within 120 feet of it. The whirlwind
      lasts as long as the djinni maintains concentration (as if
      concentrating on a spell). Any creature but the djinni that enters the
      whirlwind must succeed on a DC 18 Strength saving throw or be
      restrained by it. The djinni can move the whirlwind up to 60 feet as
      an action, and creatures restrained by the whirlwind move with it. The
      whirlwind ends if the djinni loses sight of it.

      A creature can use its action to free a creature restrained by the
      whirlwind, including itself, by succeeding on a DC 18 Strength check.
      If the check succeeds, the creature is no longer restrained and moves
      to the nearest space outside the whirlwind.
  traits: 
  - name: Elemental Demise
    description: If the djinni dies, its body disintegrates into a warm breeze, leaving behind only equipment the djinni was wearing or carrying.
  - name: Innate Spellcasting
    description: "The djinni's innate spellcasting ability is Charisma (spell save DC 17, +9 to hit with spell attacks). It can innately cast the following spells, requiring no material components: At will: detect evil and good, detect magic, thunderwave 3/day each: create food and water (can create wine instead of water), tongues, wind walk 1/day each: conjure elemental (air elemental only), creation, gaseous form, invisibility, major image, plane shift"
  - name: "Variant: Genie Powers"
    description: Genies have a variety of magical capabilities, including spells. A few have even greater powers that allow them to alter their appearance or the nature of reality. Disguises. Some genies can veil themselves in illusion to pass as other similarly shaped creatures. Such genies can innately cast the disguise self spell at will, often with a longer duration than is normal for that spell. Mightier genies can cast the true polymorph spell one to three times per day, possibly with a longer duration than normal. Such genies can change only their own shape, but a rare few can use the spell on other creatures and objects as well. Wishes. The genie power to grant wishes is legendary among mortals. Only the most potent genies, such as those among the nobility, can do so. A particular genie that has this power can grant one to three wishes to a creature that isn't a genie. Once a genie has granted its limit of wishes, it can't grant wishes again for some amount of time (usually 1 year). and cosmic law dictates that the same genie can expend its limit of wishes on a specific creature only once in that creature's existence. To be granted a wish, a creature within 60 feet of the genie states a desired effect to it. The genie can then cast the wish spell on the creature's behalf to bring about the effect. Depending on the genie's nature, the genie might try to pervert the intent of the wish by exploiting the wish's poor wording. The perversion of the wording is usually crafted to be to the genie's benefit.
  actions: 
  - name: Multiattack
    description: The djinni makes three scimitar attacks.
  - name: Scimitar
    description: "Melee Weapon Attack: +9 to hit, reach 5 ft., one target. Hit: 12 (2d6 + 5) slashing damage plus 3 (1d6) lightning or thunder damage (djinni's choice)."
  - name: Create Whirlwind
    description: A 5-foot-radius, 30-foot-tall cylinder of swirling air magically forms on a point the djinni can see within 120 feet of it. The whirlwind lasts as long as the djinni maintains concentration (as if concentrating on a spell). Any creature but the djinni that enters the whirlwind must succeed on a DC 18 Strength saving throw or be restrained by it. The djinni can move the whirlwind up to 60 feet as an action, and creatures restrained by the whirlwind move with it. The whirlwind ends if the djinni loses sight of it. A creature can use its action to free a creature restrained by the whirlwind, including itself, by succeeding on a DC 18 Strength check. If the check succeeds, the creature is no longer restrained and moves to the nearest space outside the whirlwind.

- class_name: Doppelganger
  name: Doppelganger
  creature_type: Medium monstrosity, unaligned
  challenge_rating: 3
  armor_class: 14
  hp_max: 52
  speed: 30 ft.
  strength: 11
  dexterity: 18
  constitution: 14
  intelligence: 11
  wisdom: 12
  charisma: 14
  skill_str: Deception +6, Insight +3
  senses: Darkvision 60 ft., Passive Perception 11
  languages: Common
  condition_immunities: charmed
  description: |
    Shapechanger.
      The doppelganger can use its action to polymorph into a Small or
      Medium humanoid it has seen, or back into its true form. Its
      statistics, other than its size, are the same in each form. Any
      equipment it is wearing or carrying isn't transformed. It reverts to
      its true form if it dies.
    Ambusher.
      The doppelganger has advantage on attack rolls against any creature it
      has surprised.
    Surprise Attack.
      If the doppelganger surprises a creature and hits it with an attack
      during the first round of combat, the target takes an extra 10 (3d6)
      damage from the attack.

    # Actions

    Multiattack.
      The doppelganger makes two melee attacks.
    Slam.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 7 (1d6 +
      4) bludgeoning damage.
    Read Thoughts.
      The doppelganger magically reads the surface thoughts of one creature
      within 60 ft. of it. The effect can penetrate barriers, but 3 ft. of
      wood or dirt, 2 ft. of stone, 2 inches of metal, or a thin sheet of
      lead blocks it. While the target is in range, the doppelganger can
      continue reading its thoughts, as long as the doppelganger's
      concentration isn't broken (as if concentrating on a spell). While
      reading the target's mind, the doppelganger has advantage on Wisdom
      (Insight) and Charisma (Deception, Intimidation, and Persuasion)
      checks against the target.
  traits: 
  - name: Shapechanger
    description: The doppelganger can use its action to polymorph into a Small or Medium humanoid it has seen, or back into its true form. Its statistics, other than its size, are the same in each form. Any equipment it is wearing or carrying isn't transformed. It reverts to its true form if it dies.
  - name: Ambusher
    description: The doppelganger has advantage on attack rolls against any creature it has surprised.
  - name: Surprise Attack
    description: If the doppelganger surprises a creature and hits it with an attack during the first round of combat, the target takes an extra 10 (3d6) damage from the attack.
  actions: 
  - name: Multiattack
    description: The doppelganger makes two melee attacks.
  - name: Slam
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 7 (1d6 + 4) bludgeoning damage."
  - name: Read Thoughts
    description: The doppelganger magically reads the surface thoughts of one creature within 60 ft. of it. The effect can penetrate barriers, but 3 ft. of wood or dirt, 2 ft. of stone, 2 inches of metal, or a thin sheet of lead blocks it. While the target is in range, the doppelganger can continue reading its thoughts, as long as the doppelganger's concentration isn't broken (as if concentrating on a spell). While reading the target's mind, the doppelganger has advantage on Wisdom (Insight) and Charisma (Deception, Intimidation, and Persuasion) checks against the target.

