- class_name: Erinyes
  name: Erinyes
  creature_type: Medium fiend, lawful evil
  challenge_rating: 12
  armor_class: 18
  hp_max: 153
  speed: 30 ft.
  strength: 18
  dexterity: 16
  constitution: 18
  intelligence: 14
  wisdom: 14
  charisma: 18
  senses: Truesight 120 ft., Passive Perception 12
  languages: Infernal, telepathy 120 ft.
  damage_immunities: fire, poison
  damage_resistances: cold
  condition_immunities: poisoned
  description: |
    Hellish Weapons.
      The erinyes's weapon attacks are magical and deal an extra 13 (3d8)
      poison damage on a hit (included in the attacks).
    Magic Resistance.
      The erinyes has advantage on saving throws against spells and other
      magical effects.

    # Actions

    Multiattack.
      The erinyes makes three attacks
    Longsword.
      Melee Weapon Attack: +8 to hit, reach 5 ft., one target. Hit: 8 (1d8 +
      4) slashing damage, or 9 (1d10 + 4) slashing damage if used with two
      hands, plus 13 (3d8) poison damage.
    Longbow.
      Ranged Weapon Attack: +7 to hit, range 150/600 ft., one target. Hit: 7
      (1d8 + 3) piercing damage plus 13 (3d8) poison damage, and the target
      must succeed on a DC 14 Constitution saving throw or be poisoned. The
      poison lasts until it is removed by the lesser restoration spell or
      similar magic.
    Variant: Rope of Entanglement.
      Some erinyes carry a rope of entanglement (detailed in the Dungeon
      Master's Guide). When such an erinyes uses its Multiattack, the
      erinyes can use the rope in place of two of the attacks.

    # Reactions

    Parry.
      The erinyes adds 4 to its AC against one melee attack that would hit
      it. To do so, the erinyes must see the attacker and be wielding a
      melee weapon.
  traits: 
  - name: Hellish Weapons
    description: The erinyes's weapon attacks are magical and deal an extra 13 (3d8) poison damage on a hit (included in the attacks).
  - name: Magic Resistance
    description: The erinyes has advantage on saving throws against spells and other magical effects.
  actions: 
  - name: Multiattack
    description: The erinyes makes three attacks
  - name: Longsword
    description: "Melee Weapon Attack: +8 to hit, reach 5 ft., one target. Hit: 8 (1d8 + 4) slashing damage, or 9 (1d10 + 4) slashing damage if used with two hands, plus 13 (3d8) poison damage."
  - name: Longbow
    description: "Ranged Weapon Attack: +7 to hit, range 150/600 ft., one target. Hit: 7 (1d8 + 3) piercing damage plus 13 (3d8) poison damage, and the target must succeed on a DC 14 Constitution saving throw or be poisoned. The poison lasts until it is removed by the lesser restoration spell or similar magic."
  - name: "Variant: Rope of Entanglement"
    description: Some erinyes carry a rope of entanglement (detailed in the Dungeon Master's Guide). When such an erinyes uses its Multiattack, the erinyes can use the rope in place of two of the attacks.
  reactions: 
  - name: Parry
    description: The erinyes adds 4 to its AC against one melee attack that would hit it. To do so, the erinyes must see the attacker and be wielding a melee weapon.

- class_name: Ettercap
  name: Ettercap
  creature_type: Medium monstrosity, neutral evil
  challenge_rating: 2
  armor_class: 13
  hp_max: 44
  speed: 30 ft.
  strength: 14
  dexterity: 15
  constitution: 13
  intelligence: 7
  wisdom: 12
  charisma: 8
  skill_str: Perception +3, Stealth +4, Survival +3
  senses: Darkvision 60 ft., Passive Perception 13
  description: |
    Spider Climb.
      The ettercap can climb difficult surfaces, including upside down on
      ceilings, without needing to make an ability check.
    Web Sense.
      While in contact with a web, the ettercap knows the exact location of
      any other creature in contact with the same web.
    Web Walker.
      The ettercap ignores movement restrictions caused by webbing.

    # Actions

    Multiattack.
      The ettercap makes two attacks: one with its bite and one with its
      claws.
    Bite.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: 6 (1d8
      + 2) piercing damage plus 4 (1d8) poison damage. The target must
      succeed on a DC 11 Constitution saving throw or be poisoned for 1
      minute. The creature can repeat the saving throw at the end of each of
      its turns, ending the effect on itself on a success.
    Claws.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 7 (2d4 +
      2) slashing damage.
    Web.
      Ranged Weapon Attack: +4 to hit, range 30/60 ft., one Large or smaller
      creature. Hit: The creature is restrained by webbing. As an action,
      the restrained creature can make a DC 11 Strength check, escaping from
      the webbing on a success. The effect ends if the webbing is destroyed.
      The webbing has AC 10, 5 hit points, is vulnerable to fire damage and
      immune to bludgeoning damage.
    Variant: Web Garrote.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one Medium or Small
      creature against which the ettercap has advantage on the attack roll.
      Hit: 4 (1d4 + 2) bludgeoning damage, and the target is grappled
      (escape DC 12). Until this grapple ends, the target can't breathe, and
      the ettercap has advantage on attack rolls against it.
  traits: 
  - name: Spider Climb
    description: The ettercap can climb difficult surfaces, including upside down on ceilings, without needing to make an ability check.
  - name: Web Sense
    description: While in contact with a web, the ettercap knows the exact location of any other creature in contact with the same web.
  - name: Web Walker
    description: The ettercap ignores movement restrictions caused by webbing.
  actions: 
  - name: Multiattack
    description: "The ettercap makes two attacks: one with its bite and one with its claws."
  - name: Bite
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: 6 (1d8 + 2) piercing damage plus 4 (1d8) poison damage. The target must succeed on a DC 11 Constitution saving throw or be poisoned for 1 minute. The creature can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success."
  - name: Claws
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 7 (2d4 + 2) slashing damage."
  - name: Web
    description: "Ranged Weapon Attack: +4 to hit, range 30/60 ft., one Large or smaller creature. Hit: The creature is restrained by webbing. As an action, the restrained creature can make a DC 11 Strength check, escaping from the webbing on a success. The effect ends if the webbing is destroyed. The webbing has AC 10, 5 hit points, is vulnerable to fire damage and immune to bludgeoning damage."
  - name: "Variant: Web Garrote"
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one Medium or Small creature against which the ettercap has advantage on the attack roll. Hit: 4 (1d4 + 2) bludgeoning damage, and the target is grappled (escape DC 12). Until this grapple ends, the target can't breathe, and the ettercap has advantage on attack rolls against it."

