    False Appearance.
      While the gargoyle remains motion less, it is indistinguishable from
      an inanimate statue.

    # Actions

    Multiattack.
      The gargoyle makes two attacks: one with its bite and one with its
      claws.
    Bite.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6 +
      2) piercing damage.
    Claws.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6 +
      2) slashing damage.
  traits: 
  - name: False Appearance
    description: While the gargoyle remains motion less, it is indistinguishable from an inanimate statue.
  actions: 
  - name: Multiattack
    description: "The gargoyle makes two attacks: one with its bite and one with its claws."
  - name: Bite
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6 + 2) piercing damage."
  - name: Claws
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6 + 2) slashing damage."

- class_name: GelatinousCube
  name: Gelatinous Cube
  creature_type: Large ooze, unaligned
  challenge_rating: 2
  armor_class: 6
  hp_max: 84
  speed: 15 ft.
  strength: 14
  dexterity: 3
  constitution: 20
  intelligence: 1
  wisdom: 6
  charisma: 1
  senses: Blindsight 60 ft. (blind beyond this radius), Passive Perception 8
  condition_immunities: blinded, charmed, blinded, exhaustion, frightened, prone
  description: |
    Ooze Cube.
      The cube takes up its entire space. Other creatures can enter the
      space, but a creature that does so is subjected to the cube's Engulf
      and has disadvantage on the saving throw.

      Creatures inside the cube can be seen but have total cover.

      A creature within 5 feet of the cube can take an action to pull a
      creature or object out of the cube. Doing so requires a successful DC
      12 Strength check, and the creature making the attempt takes 10 (3d6)
      acid damage.

      The cube can hold only one Large creature or up to four Medium or
      smaller creatures inside it at a time.
    Transparent.
      Even when the cube is in plain sight, it takes a successful DC 15
      Wisdom (Perception) check to spot a cube that has neither moved nor
      attacked. A creature that tries to enter the cube's space while
      unaware of the cube is surprised by the cube.

    # Actions

    Pseudopod.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: 10
      (3d6) acid damage.
    Engulf.
      The cube moves up to its speed. While doing so, it can enter Large or
      smaller creatures' spaces. Whenever the cube enters a creature's
      space, the creature must make a DC 12 Dexterity saving throw.

      On a successful save, the creature can choose to be pushed 5 feet back
      or to the side of the cube. A creature that chooses not to be pushed
      suffers the consequences of a failed saving throw.

      On a failed save, the cube enters the creature's space, and the
      creature takes 10 (3d6) acid damage and is engulfed. The engulfed
      creature can't breathe, is restrained, and takes 21 (6d6) acid damage
      at the start of each of the cube's turns. When the cube moves, the
      engulfed creature moves with it.

      An engulfed creature can try to escape by taking an action to make a
      DC 12 Strength check. On a success, the creature escapes and enters a
      space of its choice within 5 feet of the cube.
  traits: 
  - name: Ooze Cube
    description: The cube takes up its entire space. Other creatures can enter the space, but a creature that does so is subjected to the cube's Engulf and has disadvantage on the saving throw. Creatures inside the cube can be seen but have total cover. A creature within 5 feet of the cube can take an action to pull a creature or object out of the cube. Doing so requires a successful DC 12 Strength check, and the creature making the attempt takes 10 (3d6) acid damage. The cube can hold only one Large creature or up to four Medium or smaller creatures inside it at a time.
  - name: Transparent
    description: Even when the cube is in plain sight, it takes a successful DC 15 Wisdom (Perception) check to spot a cube that has neither moved nor attacked. A creature that tries to enter the cube's space while unaware of the cube is surprised by the cube.
  actions: 
  - name: Pseudopod
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: 10 (3d6) acid damage."
  - name: Engulf
    description: The cube moves up to its speed. While doing so, it can enter Large or smaller creatures' spaces. Whenever the cube enters a creature's space, the creature must make a DC 12 Dexterity saving throw. On a successful save, the creature can choose to be pushed 5 feet back or to the side of the cube. A creature that chooses not to be pushed suffers the consequences of a failed saving throw. On a failed save, the cube enters the creature's space, and the creature takes 10 (3d6) acid damage and is engulfed. The engulfed creature can't breathe, is restrained, and takes 21 (6d6) acid damage at the start of each of the cube's turns. When the cube moves, the engulfed creature moves with it. An engulfed creature can try to escape by taking an action to make a DC 12 Strength check. On a success, the creature escapes and enters a space of its choice within 5 feet of the cube.

- class_name: Ghast
  name: Ghast
  creature_type: Medium undead, chaotic evil
  challenge_rating: 2
  armor_class: 13
  hp_max: 36
  speed: 30 ft.
  strength: 16
  dexterity: 17
  constitution: 10
  intelligence: 11
  wisdom: 10
  charisma: 8
  senses: Darkvision 60 ft., Passive Perception 10
  languages: Common
  damage_immunities: necrotic
  condition_immunities: poisoned
  description: |
    Stench.
      Any creature that starts its turn within 5 ft. of the ghast must
      succeed on a DC 10 Constitution saving throw or be poisoned until the
      start of its next turn. On a successful saving throw, the creature is
      immune to the ghast's Stench for 24 hours.
    Turn Defiance.
      The ghast and any ghouls within 30 ft. of it have advantage on saving
      throws against effects that turn undead.

    # Actions

    Bite.
      Melee Weapon Attack: +3 to hit, reach 5 ft., one creature. Hit: 12
      (2d8 + 3) piercing damage.
    Claws.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6
      + 3) slashing damage. If the target is a creature other than an
      undead, it must succeed on a DC 10 Constitution saving throw or be
      paralyzed for 1 minute. The target can repeat the saving throw at the
      end of each of its turns, ending the effect on itself on a success.
  traits: 
  - name: Stench
    description: Any creature that starts its turn within 5 ft. of the ghast must succeed on a DC 10 Constitution saving throw or be poisoned until the start of its next turn. On a successful saving throw, the creature is immune to the ghast's Stench for 24 hours.
  - name: Turn Defiance
    description: The ghast and any ghouls within 30 ft. of it have advantage on saving throws against effects that turn undead.
  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft., one creature. Hit: 12 (2d8 + 3) piercing damage."
  - name: Claws
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6 + 3) slashing damage. If the target is a creature other than an undead, it must succeed on a DC 10 Constitution saving throw or be paralyzed for 1 minute. The target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success."

- class_name: Ghost
  name: Ghost
  creature_type: Medium undead, any alignment
  challenge_rating: 4
  armor_class: 11
  hp_max: 45
  speed: 0 ft.
  strength: 7
  dexterity: 13
  constitution: 10
  intelligence: 10
  wisdom: 12
  charisma: 17
  senses: Darkvision 60 ft., Passive Perception 11
  languages: any languages it knew in life
  damage_immunities: cold, necrotic, poison
  damage_resistances: acid
  condition_immunities: charmed, exhaustion, frightened, grappled, paralyzed, petrified, poisoned, prone, restrained
  description: |
    Ethereal Sight.
      The ghost can see 60 ft. into the Ethereal Plane when it is on the
      Material Plane, and vice versa.
    Incorporeal Movement.
      The ghost can move through other creatures and objects as if they were
      difficult terrain. It takes 5 (1d10) force damage if it ends its turn
      inside an object.

    # Actions

    Withering Touch.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 17 (4d6
      + 3) necrotic damage.
    Etherealness.
      The ghost enters the Ethereal Plane from the Material Plane, or vice
      versa. It is visible on the Material Plane while it is in the Border
      Ethereal, and vice versa, yet it can't affect or be affected by
      anything on the other plane.
    Horrifying Visage.
      Each non-undead creature within 60 ft. of the ghost that can see it
      must succeed on a DC 13 Wisdom saving throw or be frightened for 1
      minute. If the save fails by 5 or more, the target also ages 1d4 + 10
      years. A frightened target can repeat the saving throw at the end of
      each of its turns, ending the frightened condition on itself on a
      success. If a target's saving throw is successful or the effect ends
      for it, the target is immune to this ghost's Horrifying Visage for the
      next 24 hours. The aging effect can be reversed with a greater
      restoration spell, but only within 24 hours of it occurring.
    Possession (Recharge 6).
      One humanoid that the ghost can see within 5 ft. of it must succeed on
      a DC 13 Charisma saving throw or be possessed by the ghost; the ghost
      then disappears, and the target is incapacitated and loses control of
      its body. The ghost now controls the body but doesn't deprive the
      target of awareness. The ghost can't be targeted by any attack, spell,
      or other effect, except ones that turn undead, and it retains its
      alignment, Intelligence, Wisdom, Charisma, and immunity to being
      charmed and frightened. It otherwise uses the possessed target's
      statistics, but doesn't gain access to the target's knowledge, class
      features, or proficiencies.

      The possession lasts until the body drops to 0 hit points, the ghost
      ends it as a bonus action, or the ghost is turned or forced out by an
      effect like the dispel evil and good spell. When the possession ends,
      the ghost reappears in an unoccupied space within 5 ft. of the body.
      The target is immune to this ghost's Possession for 24 hours after
      succeeding on the saving throw or after the possession ends.
  traits: 
  - name: Ethereal Sight
    description: The ghost can see 60 ft. into the Ethereal Plane when it is on the Material Plane, and vice versa.
  - name: Incorporeal Movement
    description: The ghost can move through other creatures and objects as if they were difficult terrain. It takes 5 (1d10) force damage if it ends its turn inside an object.
  actions: 
  - name: Withering Touch
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 17 (4d6 + 3) necrotic damage."
  - name: Etherealness
    description: The ghost enters the Ethereal Plane from the Material Plane, or vice versa. It is visible on the Material Plane while it is in the Border Ethereal, and vice versa, yet it can't affect or be affected by anything on the other plane.
  - name: Horrifying Visage
    description: Each non-undead creature within 60 ft. of the ghost that can see it must succeed on a DC 13 Wisdom saving throw or be frightened for 1 minute. If the save fails by 5 or more, the target also ages 1d4 + 10 years. A frightened target can repeat the saving throw at the end of each of its turns, ending the frightened condition on itself on a success. If a target's saving throw is successful or the effect ends for it, the target is immune to this ghost's Horrifying Visage for the next 24 hours. The aging effect can be reversed with a greater restoration spell, but only within 24 hours of it occurring.
  - name: Possession (Recharge 6)
    description: One humanoid that the ghost can see within 5 ft. of it must succeed on a DC 13 Charisma saving throw or be possessed by the ghost; the ghost then disappears, and the target is incapacitated and loses control of its body. The ghost now controls the body but doesn't deprive the target of awareness. The ghost can't be targeted by any attack, spell, or other effect, except ones that turn undead, and it retains its alignment, Intelligence, Wisdom, Charisma, and immunity to being charmed and frightened. It otherwise uses the possessed target's statistics, but doesn't gain access to the target's knowledge, class features, or proficiencies. The possession lasts until the body drops to 0 hit points, the ghost ends it as a bonus action, or the ghost is turned or forced out by an effect like the dispel evil and good spell. When the possession ends, the ghost reappears in an unoccupied space within 5 ft. of the body. The target is immune to this ghost's Possession for 24 hours after succeeding on the saving throw or after the possession ends.

