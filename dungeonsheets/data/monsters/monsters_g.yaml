- class_name: GiantFrog
  name: Giant Frog
  creature_type: Medium beast, unaligned
  challenge_rating: 0.25
  armor_class: 11
  hp_max: 18
  speed: 30 ft.
  strength: 12
  dexterity: 13
  constitution: 11
  intelligence: 2
  wisdom: 10
  charisma: 3
  skill_str: Perception +2, Stealth +3
  senses: Darkvision 30 ft., Passive Perception 12
  description: |
    Amphibious.
      The frog can breathe air and water
    Standing Leap.
      The frog's long jump is up to 20 ft. and its high jump is up to 10
      ft., with or without a running start.

    # Actions

    Bite.
      Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 4 (1d6 +
      1) piercing damage, and the target is grappled (escape DC 11). Until
      this grapple ends, the target is restrained, and the frog can't bite
      another target.
    Swallow.
      The frog makes one bite attack against a Small or smaller target it is
      grappling. If the attack hits, the target is swallowed, and the
      grapple ends. The swallowed target is blinded and restrained, it has
      total cover against attacks and other effects outside the frog, and it
      takes 5 (2d4) acid damage at the start of each of the frog's turns.
      The frog can have only one target swallowed at a time. If the frog
      dies, a swallowed creature is no longer restrained by it and can
      escape from the corpse using 5 ft. of movement, exiting prone.
  traits: 
  - name: Amphibious
    description: The frog can breathe air and water
  - name: Standing Leap
    description: The frog's long jump is up to 20 ft. and its high jump is up to 10 ft., with or without a running start.
  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 4 (1d6 + 1) piercing damage, and the target is grappled (escape DC 11). Until this grapple ends, the target is restrained, and the frog can't bite another target."
  - name: Swallow
    description: The frog makes one bite attack against a Small or smaller target it is grappling. If the attack hits, the target is swallowed, and the grapple ends. The swallowed target is blinded and restrained, it has total cover against attacks and other effects outside the frog, and it takes 5 (2d4) acid damage at the start of each of the frog's turns. The frog can have only one target swallowed at a time. If the frog dies, a swallowed creature is no longer restrained by it and can escape from the corpse using 5 ft. of movement, exiting prone.

