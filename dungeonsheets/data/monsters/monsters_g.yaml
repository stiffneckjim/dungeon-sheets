- class_name: GiantOctopus
  name: Giant Octopus
  creature_type: Large beast, unaligned
  challenge_rating: 1
  armor_class: 11
  hp_max: 52
  speed: 10 ft.
  strength: 17
  dexterity: 13
  constitution: 13
  intelligence: 4
  wisdom: 10
  charisma: 4
  skill_str: Perception +4, Stealth +5
  senses: Darkvision 60 ft., Passive Perception 14
  description: |
    Hold Breath.
      While out of water, the octopus can hold its breath for 1 hour.
    Underwater Camouflage.
      The octopus has advantage on Dexterity (Stealth) checks made while
      underwater.
    Water Breathing.
      The octopus can breathe only underwater.

    # Actions

    Tentacles.
      Melee Weapon Attack: +5 to hit, reach 15 ft., one target. Hit: 10 (2d6
      + 3) bludgeoning damage. If the target is a creature, it is grappled
      (escape DC 16). Until this grapple ends, the target is restrained, and
      the octopus can't use its tentacles on another target.
    Ink Cloud.
      A 20-foot-radius cloud of ink extends all around the octopus if it is
      underwater. The area is heavily obscured for 1 minute, although a
      significant current can disperse the ink. After releasing the ink, the
      octopus can use the Dash action as a bonus action.
  traits: 
  - name: Hold Breath
    description: While out of water, the octopus can hold its breath for 1 hour.
  - name: Underwater Camouflage
    description: The octopus has advantage on Dexterity (Stealth) checks made while underwater.
  - name: Water Breathing
    description: The octopus can breathe only underwater.
  actions: 
  - name: Tentacles
    description: "Melee Weapon Attack: +5 to hit, reach 15 ft., one target. Hit: 10 (2d6 + 3) bludgeoning damage. If the target is a creature, it is grappled (escape DC 16). Until this grapple ends, the target is restrained, and the octopus can't use its tentacles on another target."
  - name: Ink Cloud
    description: A 20-foot-radius cloud of ink extends all around the octopus if it is underwater. The area is heavily obscured for 1 minute, although a significant current can disperse the ink. After releasing the ink, the octopus can use the Dash action as a bonus action.

