  creature_type: Huge beast, unaligned
  challenge_rating: 2
  armor_class: 15
  hp_max: 42
  speed: 60 ft.
  strength: 19
  dexterity: 16
  constitution: 14
  intelligence: 7
  wisdom: 14
  charisma: 10
  skill_str: Perception +4
  senses: Passive Perception 14
  languages: Giant Elk, understands Common, Elvish, and Sylvan but can't speak
  description: |
    Charge.
      If the elk moves at least 20 ft. straight toward a target and then
      hits it with a ram attack on the same turn, the target takes an extra
      7 (2d6) damage. If the target is a creature, it must succeed on a DC
      14 Strength saving throw or be knocked prone.

    # Actions

    Ram.
      Melee Weapon Attack: +6 to hit, reach 10 ft., one target. Hit: 11 (2d6
      + 4) bludgeoning damage.
    Hooves.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one prone creature. Hit:
      22 (4d8 + 4) bludgeoning damage.
  traits: 
  - name: Charge
    description: If the elk moves at least 20 ft. straight toward a target and then hits it with a ram attack on the same turn, the target takes an extra 7 (2d6) damage. If the target is a creature, it must succeed on a DC 14 Strength saving throw or be knocked prone.
  actions: 
  - name: Ram
    description: "Melee Weapon Attack: +6 to hit, reach 10 ft., one target. Hit: 11 (2d6 + 4) bludgeoning damage."
  - name: Hooves
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one prone creature. Hit: 22 (4d8 + 4) bludgeoning damage."

