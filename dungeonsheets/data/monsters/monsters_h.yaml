    Devil's Sight.
      Magical darkness doesn't impede the devil's darkvision.
    Magic Resistance.
      The devil has advantage on saving throws against spells and other
      magical effects.

    # Actions

    Multiattack.
      The devil makes three melee attacks: two with its fork and one with
