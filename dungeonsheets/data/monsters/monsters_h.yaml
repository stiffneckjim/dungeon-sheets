  hp_max: 178
  speed: 20 ft.
  strength: 22
  dexterity: 17
  constitution: 21
  intelligence: 12
  wisdom: 16
  charisma: 17
  senses: Darkvision 120 ft., Passive Perception 13
  languages: Infernal, telepathy 120 ft.
  damage_immunities: fire, poison
  damage_resistances: cold
  condition_immunities: poisoned
