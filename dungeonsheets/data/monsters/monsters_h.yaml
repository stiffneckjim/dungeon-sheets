- class_name: HalfRedDragonVeteran
  name: Half-Red Dragon Veteran
  creature_type: Medium humanoid, any alignment
  challenge_rating: 5
  armor_class: 18
  hp_max: 65
  speed: 30 ft.
  strength: 16
  dexterity: 13
  constitution: 14
  intelligence: 10
  wisdom: 11
  charisma: 10
  senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 12
  languages: Common, Draconic
  damage_resistances: fire
  description: |
    # Actions

    Multiattack.
      The veteran makes two longsword attacks. If it has a shortsword drawn,
      it can also make a shortsword attack.
    Longsword.
      Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 7 (1d8 + 3)
      slashing damage, or 8 (1d10 + 3) slashing damage if used with two
      hands.
    Shortsword.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 6 (1d6 +
      3) piercing damage.
    Heavy Crossbow.
      Ranged Weapon Attack: +3 to hit, range 100/400 ft., one target. Hit: 6
      (1d10 + 1) piercing damage.
    Fire Breath.
      The veteran exhales fire in a 15-foot cone. Each creature in that area
      must make a DC 15 Dexterity saving throw, taking 24 (7d6) fire damage
      on a failed save, or half as much damage on a successful one.
  traits: []
  actions: 
  - name: Multiattack
    description: The veteran makes two longsword attacks. If it has a shortsword drawn, it can also make a shortsword attack.
  - name: Longsword
    description: "Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 7 (1d8 + 3) slashing damage, or 8 (1d10 + 3) slashing damage if used with two hands."
  - name: Shortsword
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 6 (1d6 + 3) piercing damage."
  - name: Heavy Crossbow
    description: "Ranged Weapon Attack: +3 to hit, range 100/400 ft., one target. Hit: 6 (1d10 + 1) piercing damage."
  - name: Fire Breath
    description: The veteran exhales fire in a 15-foot cone. Each creature in that area must make a DC 15 Dexterity saving throw, taking 24 (7d6) fire damage on a failed save, or half as much damage on a successful one.

- class_name: Harpy
  name: Harpy
  creature_type: Medium monstrosity, chaotic evil
  challenge_rating: 1
  armor_class: 11
  hp_max: 38
  speed: 20 ft.
  strength: 12
  dexterity: 13
  constitution: 12
  intelligence: 7
  wisdom: 10
  charisma: 13
  senses: Passive Perception 10
  languages: Common
  description: |
    # Actions

    Multiattack.
      The harpy makes two attacks: one with its claws and one with its club.
    Claws.
      Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 6 (2d4 +
      1) slashing damage.
    Club.
      Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 3 (1d4 +
      1) bludgeoning damage.
    Luring Song.
      The harpy sings a magical melody. Every humanoid and giant within 300
      ft. of the harpy that can hear the song must succeed on a DC 11 Wisdom
      saving throw or be charmed until the song ends. The harpy must take a
      bonus action on its subsequent turns to continue singing. It can stop
      singing at any time. The song ends if the harpy is incapacitated.

      While charmed by the harpy, a target is incapacitated and ignores the
      songs of other harpies. If the charmed target is more than 5 ft. away
      from the harpy, the must move on its turn toward the harpy by the most
      direct route. It doesn't avoid opportunity attacks, but before moving
      into damaging terrain, such as lava or a pit, and whenever it takes
      damage from a source other than the harpy, a target can repeat the
      saving throw. A creature can also repeat the saving throw at the end
      of each of its turns. If a creature's saving throw is successful, the
      effect ends on it.

      A target that successfully saves is immune to this harpy's song for
      the next 24 hours.
  traits: []
  actions: 
  - name: Multiattack
    description: "The harpy makes two attacks: one with its claws and one with its club."
  - name: Claws
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 6 (2d4 + 1) slashing damage."
  - name: Club
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 3 (1d4 + 1) bludgeoning damage."
  - name: Luring Song
    description: The harpy sings a magical melody. Every humanoid and giant within 300 ft. of the harpy that can hear the song must succeed on a DC 11 Wisdom saving throw or be charmed until the song ends. The harpy must take a bonus action on its subsequent turns to continue singing. It can stop singing at any time. The song ends if the harpy is incapacitated. While charmed by the harpy, a target is incapacitated and ignores the songs of other harpies. If the charmed target is more than 5 ft. away from the harpy, the must move on its turn toward the harpy by the most direct route. It doesn't avoid opportunity attacks, but before moving into damaging terrain, such as lava or a pit, and whenever it takes damage from a source other than the harpy, a target can repeat the saving throw. A creature can also repeat the saving throw at the end of each of its turns. If a creature's saving throw is successful, the effect ends on it. A target that successfully saves is immune to this harpy's song for the next 24 hours.

