- class_name: Jackal
  name: Jackal
  creature_type: Small beast, unaligned
  challenge_rating: 0
  armor_class: 12
  hp_max: 3
  speed: 40 ft.
  strength: 8
  dexterity: 15
  constitution: 11
  intelligence: 3
  wisdom: 12
  charisma: 6
  skill_str: Perception +3
  senses: Passive Perception 13
  description: |
    Keen Hearing and Smell.
      The jackal has advantage on Wisdom (Perception) checks that rely on
      hearing or smell.
    Pack Tactics.
      The jackal has advantage on an attack roll against a creature if at
      least one of the jackal's allies is within 5 ft. of the creature and
      the ally isn't incapacitated.

    # Actions

    Bite.
      Melee Weapon Attack: +1 to hit, reach 5 ft., one target. Hit: 1 (1d4 -
      1) piercing damage.
  traits: 
