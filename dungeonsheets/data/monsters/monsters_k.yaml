- class_name: Knight
  name: Knight
  creature_type: Medium humanoid, any alignment
  challenge_rating: 3
  armor_class: 18
  hp_max: 52
  speed: 30 ft.
  strength: 16
  dexterity: 11
  constitution: 14
  intelligence: 11
  wisdom: 11
  charisma: 15
  senses: Passive Perception 10
  languages: any one language (usually Common)
  description: |
    Brave.
      The knight has advantage on saving throws against being frightened.

    # Actions

    Multiattack.
      The knight makes two melee attacks.
    Greatsword.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6
      + 3) slashing damage.
    Heavy Crossbow.
      Ranged Weapon Attack: +2 to hit, range 100/400 ft., one target. Hit: 5
      (1d10) piercing damage.
    Leadership.
      For 1 minute, the knight can utter a special command or warning
      whenever a nonhostile creature that it can see within 30 ft. of it
      makes an attack roll or a saving throw. The creature can add a d4 to
      its roll provided it can hear and understand the knight. A creature
      can benefit from only one Leadership die at a time. This effect ends
      if the knight is incapacitated.

    # Reactions

    Parry.
      The knight adds 2 to its AC against one melee attack that would hit
      it. To do so, the knight must see the attacker and be wielding a melee
      weapon.
  traits: 
  - name: Brave
    description: The knight has advantage on saving throws against being frightened.
  actions: 
  - name: Multiattack
    description: The knight makes two melee attacks.
  - name: Greatsword
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6 + 3) slashing damage."
  - name: Heavy Crossbow
    description: "Ranged Weapon Attack: +2 to hit, range 100/400 ft., one target. Hit: 5 (1d10) piercing damage."
  - name: Leadership
    description: For 1 minute, the knight can utter a special command or warning whenever a nonhostile creature that it can see within 30 ft. of it makes an attack roll or a saving throw. The creature can add a d4 to its roll provided it can hear and understand the knight. A creature can benefit from only one Leadership die at a time. This effect ends if the knight is incapacitated.
  reactions: 
  - name: Parry
    description: The knight adds 2 to its AC against one melee attack that would hit it. To do so, the knight must see the attacker and be wielding a melee weapon.

- class_name: Kobold
  name: Kobold
  creature_type: Small humanoid, lawful evil
  challenge_rating: 0.125
  armor_class: 12
  hp_max: 5
  speed: 30 ft.
  strength: 7
  dexterity: 15
  constitution: 9
  intelligence: 8
  wisdom: 7
  charisma: 8
  senses: Darkvision 60 ft., Passive Perception 8
  languages: Common, Draconic
  description: |
    Sunlight Sensitivity.
      While in sunlight, the kobold has disadvantage on attack rolls, as
      well as on Wisdom (Perception) checks that rely on sight.
    Pack Tactics.
      The kobold has advantage on an attack roll against a creature if at
      least one of the kobold's allies is within 5 ft. of the creature and
      the ally isn't incapacitated.

    # Actions

    Dagger.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4 +
      2) piercing damage.
    Sling.
      Ranged Weapon Attack: +4 to hit, range 30/120 ft., one target. Hit: 4
      (1d4 + 2) bludgeoning damage.
  traits: 
  - name: Sunlight Sensitivity
    description: While in sunlight, the kobold has disadvantage on attack rolls, as well as on Wisdom (Perception) checks that rely on sight.
  - name: Pack Tactics
    description: The kobold has advantage on an attack roll against a creature if at least one of the kobold's allies is within 5 ft. of the creature and the ally isn't incapacitated.
  actions: 
  - name: Dagger
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4 + 2) piercing damage."
  - name: Sling
    description: "Ranged Weapon Attack: +4 to hit, range 30/120 ft., one target. Hit: 4 (1d4 + 2) bludgeoning damage."

- class_name: Kraken
  name: Kraken
  creature_type: Gargantuan monstrosity, chaotic evil
  challenge_rating: 23
  armor_class: 18
  hp_max: 472
  speed: 20 ft.
  strength: 30
  dexterity: 11
  constitution: 25
  intelligence: 22
  wisdom: 18
  charisma: 20
  senses: Truesight 120 ft., Passive Perception 14
  languages: understands Abyssal, Celestial, Infernal, and Primordial but can't speak, telepathy 120 ft.
  damage_immunities: lightning, bludgeoning, piercing, and slashing from nonmagical weapons
  condition_immunities: frightened, paralyzed
  description: |
    Amphibious.
      The kraken can breathe air and water.
    Freedom of Movement.
      The kraken ignores difficult terrain, and magical effects can't reduce
      its speed or cause it to be restrained. It can spend 5 feet of
      movement to escape from nonmagical restraints or being grappled.
    Siege Monster.
      The kraken deals double damage to objects and structures.

    # Actions

    Multiattack.
      The kraken makes three tentacle attacks, each of which it can replace
      with one use of Fling.
    Bite.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 23 (3d8
      + 10) piercing damage. If the target is a Large or smaller creature
      grappled by the kraken, that creature is swallowed, and the grapple
      ends. While swallowed, the creature is blinded and restrained, it has
      total cover against attacks and other effects outside the kraken, and
      it takes 42 (12d6) acid damage at the start of each of the kraken's
      turns. If the kraken takes 50 damage or more on a single turn from a
      creature inside it, the kraken must succeed on a DC 25 Constitution
      saving throw at the end of that turn or regurgitate all swallowed
      creatures, which fall prone in a space within 10 feet of the kraken.
      If the kraken dies, a swallowed creature is no longer restrained by it
      and can escape from the corpse using 15 feet of movement, exiting
      prone.
    Tentacle.
      Melee Weapon Attack: +7 to hit, reach 30 ft., one target. Hit: 20 (3d6
      + 10) bludgeoning damage, and the target is grappled (escape DC 18).
      Until this grapple ends, the target is restrained. The kraken has ten
      tentacles, each of which can grapple one target.
    Fling.
      One Large or smaller object held or creature grappled by the kraken is
      thrown up to 60 feet in a random direction and knocked prone. If a
      thrown target strikes a solid surface, the target takes 3 (1d6)
      bludgeoning damage for every 10 feet it was thrown. If the target is
      thrown at another creature, that creature must succeed on a DC 18
      Dexterity saving throw or take the same damage and be knocked prone.
    Lightning Storm.
      The kraken magically creates three bolts of lightning, each of which
      can strike a target the kraken can see within 120 feet of it. A target
      must make a DC 23 Dexterity saving throw, taking 22 (4d10) lightning
      damage on a failed save, or half as much damage on a successful one.

    # Legendary Actions

    Tentacle Attack or Fling.
      The kraken makes one tentacle attack or uses its Fling.
    Lightning Storm (Costs 2 Actions).
      The kraken uses Lightning Storm.
    Ink Cloud (Costs 3 Actions).
      While underwater, the kraken expels an ink cloud in a 60-foot radius.
      The cloud spreads around corners, and that area is heavily obscured to
      creatures other than the kraken. Each creature other than the kraken
      that ends its turn there must succeed on a DC 23 Constitution saving
      throw, taking 16 (3d10) poison damage on a failed save, or half as
      much damage on a successful one. A strong current disperses the cloud,
      which otherwise disappears at the end of the kraken's next turn.
  traits: 
  - name: Amphibious
    description: The kraken can breathe air and water.
  - name: Freedom of Movement
    description: The kraken ignores difficult terrain, and magical effects can't reduce its speed or cause it to be restrained. It can spend 5 feet of movement to escape from nonmagical restraints or being grappled.
  - name: Siege Monster
    description: The kraken deals double damage to objects and structures.
  actions: 
  - name: Multiattack
    description: The kraken makes three tentacle attacks, each of which it can replace with one use of Fling.
  - name: Bite
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 23 (3d8 + 10) piercing damage. If the target is a Large or smaller creature grappled by the kraken, that creature is swallowed, and the grapple ends. While swallowed, the creature is blinded and restrained, it has total cover against attacks and other effects outside the kraken, and it takes 42 (12d6) acid damage at the start of each of the kraken's turns. If the kraken takes 50 damage or more on a single turn from a creature inside it, the kraken must succeed on a DC 25 Constitution saving throw at the end of that turn or regurgitate all swallowed creatures, which fall prone in a space within 10 feet of the kraken. If the kraken dies, a swallowed creature is no longer restrained by it and can escape from the corpse using 15 feet of movement, exiting prone."
  - name: Tentacle
    description: "Melee Weapon Attack: +7 to hit, reach 30 ft., one target. Hit: 20 (3d6 + 10) bludgeoning damage, and the target is grappled (escape DC 18). Until this grapple ends, the target is restrained. The kraken has ten tentacles, each of which can grapple one target."
  - name: Fling
    description: One Large or smaller object held or creature grappled by the kraken is thrown up to 60 feet in a random direction and knocked prone. If a thrown target strikes a solid surface, the target takes 3 (1d6) bludgeoning damage for every 10 feet it was thrown. If the target is thrown at another creature, that creature must succeed on a DC 18 Dexterity saving throw or take the same damage and be knocked prone.
  - name: Lightning Storm
    description: The kraken magically creates three bolts of lightning, each of which can strike a target the kraken can see within 120 feet of it. A target must make a DC 23 Dexterity saving throw, taking 22 (4d10) lightning damage on a failed save, or half as much damage on a successful one.
  legendary_actions: 
  - name: Tentacle Attack or Fling
    description: The kraken makes one tentacle attack or uses its Fling.
  - name: Lightning Storm (Costs 2 Actions)
    description: The kraken uses Lightning Storm.
  - name: Ink Cloud (Costs 3 Actions)
    description: While underwater, the kraken expels an ink cloud in a 60-foot radius. The cloud spreads around corners, and that area is heavily obscured to creatures other than the kraken. Each creature other than the kraken that ends its turn there must succeed on a DC 23 Constitution saving throw, taking 16 (3d10) poison damage on a failed save, or half as much damage on a successful one. A strong current disperses the cloud, which otherwise disappears at the end of the kraken's next turn.

- class_name: KuoToa
  name: Kuo-Toa
  creature_type: Medium humanoid (kuo-toa), neutral evil
  challenge_rating: 0.25
  armor_class: 13
  hp_max: 18
  speed: 30 ft.
  strength: 13
  dexterity: 10
  constitution: 11
  intelligence: 11
  wisdom: 10
  charisma: 8
  skill_str: Perception +4
  senses: darkvision 120 ft., passive Perception 14
  languages: Undercommon
  description: |
    Amphibious.
      The kuo-toa can breathe air and water.

    Otherworldly Perception.
      The kuo-toa can sense the presence of any creature within
      30 feet of it that is invisible or on the Ethereal Plane. It
      can pinpoint such a creature that is moving.

    Slippery.
      The kuo-toa has advantage on ability checks and
      saving throws made to escape a grapple.

    Sunlight Sensitivity.
      While in sunlight, the kuo-toa has disadvantage on attack
      rolls, as well as on Wisdom (Perception) checks that rely on sight.

    # Actions

    Bite.
      Melee Weapon Attack: +3 to hit, reach 5 ft., one target.
      Hit: 3 (1d4 + 1) piercing damage.

    Spear.
      Melee or Ranged Weapon Attack: +3 to hit, reach 5ft. or range
      20/60 ft., one target. Hit: 4 (1d6 + 1) piercing damage, or
      5 (1d8 + 1) piercing damage if used with two hands to make
      a melee attack.

    Net.
      Ranged Weapon Attack: +3 to hit, range 5/15 ft., one Large or
      smaller creature. Hit: The target is restrained. A creature can
      use its action to make a DC 10 Strength check to free itself or
      another creature in a net, ending the effect on a success.
      Dealing 5 slashing damage to the net (AC 10) frees the target
      without harming it and destroys the net.

    # Reactions

    Sticky Shield.
      When a creature misses the kuo-toa with a melee weapon attack,
      the kuo-toa uses its sticky shield to catch the weapon. The
      attacker must succeed on a DC 11 Strength saving throw, or the
      weapon becomes stuck to the kuo-toa's shield. If the weapon's
      wielder can't or won't let go of the weapon, the wielder is
      grappled while the weapon is stuck. While stuck, the weapon
      can't be used. A creature can pull the weapon free by taking
      an action to make a DC 11 Strength check and succeeding.
  traits: 
  - name: Amphibious
    description: The kuo-toa can breathe air and water.
  - name: Otherworldly Perception
    description: The kuo-toa can sense the presence of any creature within 30 feet of it that is invisible or on the Ethereal Plane. It can pinpoint such a creature that is moving.
  - name: Slippery
    description: The kuo-toa has advantage on ability checks and saving throws made to escape a grapple.
  - name: Sunlight Sensitivity
    description: While in sunlight, the kuo-toa has disadvantage on attack rolls, as well as on Wisdom (Perception) checks that rely on sight.
  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 3 (1d4 + 1) piercing damage."
  - name: Spear
    description: "Melee or Ranged Weapon Attack: +3 to hit, reach 5ft. or range 20/60 ft., one target. Hit: 4 (1d6 + 1) piercing damage, or 5 (1d8 + 1) piercing damage if used with two hands to make a melee attack."
  - name: Net
    description: "Ranged Weapon Attack: +3 to hit, range 5/15 ft., one Large or smaller creature. Hit: The target is restrained. A creature can use its action to make a DC 10 Strength check to free itself or another creature in a net, ending the effect on a success. Dealing 5 slashing damage to the net (AC 10) frees the target without harming it and destroys the net."
  reactions: 
  - name: Sticky Shield
    description: When a creature misses the kuo-toa with a melee weapon attack, the kuo-toa uses its sticky shield to catch the weapon. The attacker must succeed on a DC 11 Strength saving throw, or the weapon becomes stuck to the kuo-toa's shield. If the weapon's wielder can't or won't let go of the weapon, the wielder is grappled while the weapon is stuck. While stuck, the weapon can't be used. A creature can pull the weapon free by taking an action to make a DC 11 Strength check and succeeding.

