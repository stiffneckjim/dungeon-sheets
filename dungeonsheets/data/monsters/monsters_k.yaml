- class_name: Kenku
  name: Kenku
  creature_type: Medium humanoid (kenku), chaotic neutral
  challenge_rating: 0.25
  armor_class: 13
  hp_max: 13
  speed: 30 ft.
  strength: 10
  dexterity: 16
  constitution: 10
  intelligence: 11
  wisdom: 10
  charisma: 10
  skill_str: Deception +4, Perception +2, Stealth +5
  senses: passive Perception 12
  languages: understands Auran and Common but speaks only through the use of its Mimicry trait
  description: |
    Ambusher.
      In the first round of a combat, the kenku has advantage on
      attack rolls against any creature it surprised.
    Mimicry.
      The kenku can mimic any sounds it has heard, including voices. A
      creature that hears the sounds can tell they are imitations with
      a successful DC 14 Wisdom (Insight) check.  ACTIONS

    # Actions

    Shortsword.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 6
      (1d6 + 3) piercing damage.
    Shortbow.
      Ranged Weapon Attack: +5 to hit, range 80/320 ft., one
      target. Hit: 6 (1d6 + 3) piercing damage.
  traits: 
  - name: Ambusher
    description: In the first round of a combat, the kenku has advantage on attack rolls against any creature it surprised.
  - name: Mimicry
    description: The kenku can mimic any sounds it has heard, including voices. A creature that hears the sounds can tell they are imitations with a successful DC 14 Wisdom (Insight) check.  ACTIONS
  actions: 
  - name: Shortsword
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 6 (1d6 + 3) piercing damage."
  - name: Shortbow
    description: "Ranged Weapon Attack: +5 to hit, range 80/320 ft., one target. Hit: 6 (1d6 + 3) piercing damage."

