- class_name: Medusa
  name: Medusa
  creature_type: Medium monstrosity, lawful evil
  challenge_rating: 6
  armor_class: 15
  hp_max: 127
  speed: 30 ft.
  strength: 10
  dexterity: 15
  constitution: 16
  intelligence: 12
  wisdom: 13
  charisma: 15
  skill_str: Deception +5, Insight +4, Perception +4, Stealth +5
  senses: Darkvision 60 ft., Passive Perception 14
  languages: Common
  description: |
    Petrifying Gaze.
      When a creature that can see the medusa's eyes starts its turn within
      30 ft. of the medusa, the medusa can force it to make a DC 14
      Constitution saving throw if the medusa isn't incapacitated and can
      see the creature. If the saving throw fails by 5 or more, the creature
      is instantly petrified. Otherwise, a creature that fails the save
      begins to turn to stone and is restrained. The restrained creature
      must repeat the saving throw at the end of its next turn, becoming
      petrified on a failure or ending the effect on a success. The
      petrification lasts until the creature is freed by the greater
      restoration spell or other magic.

      Unless surprised, a creature can avert its eyes to avoid the saving
      throw at the start of its turn. If the creature does so, it can't see
      the medusa until the start of its next turn, when it can avert its
      eyes again. If the creature looks at the medusa in the meantime, it
      must immediately make the save.

      If the medusa sees itself reflected on a polished surface within 30
      ft. of it and in an area of bright light, the medusa is, due to its
      curse, affected by its own gaze.

    # Actions

    Multiattack.
      The medusa makes either three melee attacks--one with its snake hair
      and two with its shortsword--or two ranged attacks with its longbow.
    Snake Hair.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one creature. Hit: 4 (1d4
      + 2) piercing damage plus 14 (4d6) poison damage.
    Shortsword.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 5 (1d6 +
      2) piercing damage.
    Longbow.
      Ranged Weapon Attack: +5 to hit, range 150/600 ft., one target. Hit: 6
      (1d8 + 2) piercing damage plus 7 (2d6) poison damage.
  traits: 
  - name: Petrifying Gaze
    description: When a creature that can see the medusa's eyes starts its turn within 30 ft. of the medusa, the medusa can force it to make a DC 14 Constitution saving throw if the medusa isn't incapacitated and can see the creature. If the saving throw fails by 5 or more, the creature is instantly petrified. Otherwise, a creature that fails the save begins to turn to stone and is restrained. The restrained creature must repeat the saving throw at the end of its next turn, becoming petrified on a failure or ending the effect on a success. The petrification lasts until the creature is freed by the greater restoration spell or other magic. Unless surprised, a creature can avert its eyes to avoid the saving throw at the start of its turn. If the creature does so, it can't see the medusa until the start of its next turn, when it can avert its eyes again. If the creature looks at the medusa in the meantime, it must immediately make the save. If the medusa sees itself reflected on a polished surface within 30 ft. of it and in an area of bright light, the medusa is, due to its curse, affected by its own gaze.
  actions: 
  - name: Multiattack
    description: The medusa makes either three melee attacks--one with its snake hair and two with its shortsword--or two ranged attacks with its longbow.
  - name: Snake Hair
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one creature. Hit: 4 (1d4 + 2) piercing damage plus 14 (4d6) poison damage."
  - name: Shortsword
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 5 (1d6 + 2) piercing damage."
  - name: Longbow
    description: "Ranged Weapon Attack: +5 to hit, range 150/600 ft., one target. Hit: 6 (1d8 + 2) piercing damage plus 7 (2d6) poison damage."

