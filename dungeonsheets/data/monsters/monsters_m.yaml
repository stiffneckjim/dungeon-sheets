- class_name: Marilith
  name: Marilith
  creature_type: Large fiend, chaotic evil
  challenge_rating: 16
  armor_class: 18
  hp_max: 189
  speed: 40 ft.
  strength: 18
  dexterity: 20
  constitution: 20
  intelligence: 18
  wisdom: 16
  charisma: 20
  senses: Truesight 120 ft., Passive Perception 13
  languages: Abyssal, telepathy 120 ft.
  damage_immunities: poison
  damage_resistances: cold
  condition_immunities: poisoned
  description: |
    Magic Resistance.
      The marilith has advantage on saving throws against spells and other
      magical effects.
    Magic Weapons.
      The marilith's weapon attacks are magical.
    Reactive.
      The marilith can take one reaction on every turn in combat.

    # Actions

    Multiattack.
      The marilith can make seven attacks: six with its longswords and one
      with its tail.
    Longsword.
      Melee Weapon Attack: +9 to hit, reach 5 ft., one target. Hit: 13 (2d8
      + 4) slashing damage.
    Tail.
      Melee Weapon Attack: +9 to hit, reach 10 ft., one creature. Hit: 15
      (2d10 + 4) bludgeoning damage. If the target is Medium or smaller, it
      is grappled (escape DC 19). Until this grapple ends, the target is
      restrained, the marilith can automatically hit the target with its
      tail, and the marilith can't make tail attacks against other targets.
    Teleport.
      The marilith magically teleports, along with any equipment it is
      wearing or carrying, up to 120 feet to an unoccupied space it can see.
    Variant: Summon Demon.
      The demon chooses what to summon and attempts a magical summoning.

      A marilith has a 50 percent chance of summoning 1d6 vrocks, 1d4
      hezrous, 1d3 glabrezus, 1d2 nalfeshnees, or one marilith.

      A summoned demon appears in an unoccupied space within 60 feet of its
      summoner, acts as an ally of its summoner, and can't summon other
      demons. It remains for 1 minute, until it or its summoner dies, or
      until its summoner dismisses it as an action.

    # Reactions

    Parry.
      The marilith adds 5 to its AC against one melee attack that would hit
      it. To do so, the marilith must see the attacker and be wielding a
      melee weapon.
  traits: 
  - name: Magic Resistance
    description: The marilith has advantage on saving throws against spells and other magical effects.
  - name: Magic Weapons
    description: The marilith's weapon attacks are magical.
  - name: Reactive
    description: The marilith can take one reaction on every turn in combat.
  actions: 
  - name: Multiattack
    description: "The marilith can make seven attacks: six with its longswords and one with its tail."
  - name: Longsword
    description: "Melee Weapon Attack: +9 to hit, reach 5 ft., one target. Hit: 13 (2d8 + 4) slashing damage."
  - name: Tail
    description: "Melee Weapon Attack: +9 to hit, reach 10 ft., one creature. Hit: 15 (2d10 + 4) bludgeoning damage. If the target is Medium or smaller, it is grappled (escape DC 19). Until this grapple ends, the target is restrained, the marilith can automatically hit the target with its tail, and the marilith can't make tail attacks against other targets."
  - name: Teleport
    description: The marilith magically teleports, along with any equipment it is wearing or carrying, up to 120 feet to an unoccupied space it can see.
  - name: "Variant: Summon Demon"
    description: The demon chooses what to summon and attempts a magical summoning. A marilith has a 50 percent chance of summoning 1d6 vrocks, 1d4 hezrous, 1d3 glabrezus, 1d2 nalfeshnees, or one marilith. A summoned demon appears in an unoccupied space within 60 feet of its summoner, acts as an ally of its summoner, and can't summon other demons. It remains for 1 minute, until it or its summoner dies, or until its summoner dismisses it as an action.
  reactions: 
  - name: Parry
    description: The marilith adds 5 to its AC against one melee attack that would hit it. To do so, the marilith must see the attacker and be wielding a melee weapon.

