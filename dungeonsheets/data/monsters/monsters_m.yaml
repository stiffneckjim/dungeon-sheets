- class_name: Mage
  name: Mage
  creature_type: Medium humanoid, any alignment
  challenge_rating: 6
  armor_class: 12
  hp_max: 40
  speed: 30 ft.
  strength: 9
  dexterity: 14
  constitution: 11
  intelligence: 17
  wisdom: 12
  charisma: 11
  skill_str: Arcana +6, History +6
  senses: Passive Perception 11
  languages: any four languages
  description: |
    Spellcasting.
      The mage is a 9th-level spellcaster. Its spellcasting ability is Intelligence (spell save DC 14, +6 to hit with spell attacks). The mage has the following wizard spells prepared:

    - Cantrips (at will): fire bolt, light, mage hand, prestidigitation
    - 1st level (4 slots): detect magic, mage armor, magic missile, shield
    - 2nd level (3 slots): misty step, suggestion
    - 3rd level (3 slots): counterspell, fireball, fly
    - 4th level (3 slots): greater invisibility, ice storm
    - 5th level (1 slot): cone of cold

    # Actions

    Dagger.
      Melee or Ranged Weapon Attack: +5 to hit, reach 5 ft. or range 20/60
      ft., one target. Hit: 4 (1d4 + 2) piercing damage.
  traits: 
  - name: Spellcasting
    description: "The mage is a 9th-level spellcaster. Its spellcasting ability is Intelligence (spell save DC 14, +6 to hit with spell attacks). The mage has the following wizard spells prepared: - Cantrips (at will): fire bolt, light, mage hand, prestidigitation - 1st level (4 slots): detect magic, mage armor, magic missile, shield - 2nd level (3 slots): misty step, suggestion - 3rd level (3 slots): counterspell, fireball, fly - 4th level (3 slots): greater invisibility, ice storm - 5th level (1 slot): cone of cold"
  actions: 
  - name: Dagger
    description: "Melee or Ranged Weapon Attack: +5 to hit, reach 5 ft. or range 20/60 ft., one target. Hit: 4 (1d4 + 2) piercing damage."

- class_name: MagmaMephit
  name: Magma Mephit
  creature_type: Small elemental, neutral evil
  challenge_rating: 0.5
  armor_class: 11
  hp_max: 22
  speed: 30 ft.
  strength: 8
  dexterity: 12
  constitution: 12
  intelligence: 7
  wisdom: 10
  charisma: 10
  skill_str: Stealth +3
  senses: Darkvision 60 ft., Passive Perception 10
  languages: Ignan, Terran
  damage_immunities: fire, poison
  damage_vulnerabilities: cold
  condition_immunities: poisoned
  description: |
    Death Burst.
      When the mephit dies, it explodes in a burst of lava. Each creature
      within 5 ft. of it must make a DC 11 Dexterity saving throw, taking 7
      (2d6) fire damage on a failed save, or half as much damage on a
      successful one.
    False Appearance.
      While the mephit remains motionless, it is indistinguishable from an
      ordinary mound of magma.
    Innate Spellcasting.
      The mephit can innately cast heat metal (spell save DC 10), requiring
      no material components. Its innate spellcasting ability is Charisma.

    # Actions

    Claws.
      Melee Weapon Attack: +3 to hit, reach 5 ft ., one creature. Hit: 3
      (1d4 + 1) slashing damage plus 2 (1d4) fire damage.
    Fire Breath (Recharge 6).
      The mephit exhales a 15-foot cone of fire. Each creature in that area
      must make a DC 11 Dexterity saving throw, taking 7 (2d6) fire damage
      on a failed save, or half as much damage on a successful one.
    Variant: Summon Mephits.
      The mephit has a 25 percent chance of summoning 1d4 mephits of its
      kind. A summoned mephit appears in an unoccupied space within 60 feet
      of its summoner, acts as an ally of its summoner, and can't summon
      other mephits. It remains for 1 minute, until it or its summoner dies,
      or until its summoner dismisses it as an action.
  traits: 
  - name: Death Burst
    description: When the mephit dies, it explodes in a burst of lava. Each creature within 5 ft. of it must make a DC 11 Dexterity saving throw, taking 7 (2d6) fire damage on a failed save, or half as much damage on a successful one.
  - name: False Appearance
    description: While the mephit remains motionless, it is indistinguishable from an ordinary mound of magma.
  - name: Innate Spellcasting
    description: The mephit can innately cast heat metal (spell save DC 10), requiring no material components. Its innate spellcasting ability is Charisma.
  actions: 
  - name: Claws
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft ., one creature. Hit: 3 (1d4 + 1) slashing damage plus 2 (1d4) fire damage."
  - name: Fire Breath (Recharge 6)
    description: The mephit exhales a 15-foot cone of fire. Each creature in that area must make a DC 11 Dexterity saving throw, taking 7 (2d6) fire damage on a failed save, or half as much damage on a successful one.
  - name: "Variant: Summon Mephits"
    description: The mephit has a 25 percent chance of summoning 1d4 mephits of its kind. A summoned mephit appears in an unoccupied space within 60 feet of its summoner, acts as an ally of its summoner, and can't summon other mephits. It remains for 1 minute, until it or its summoner dies, or until its summoner dismisses it as an action.

