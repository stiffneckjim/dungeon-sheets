- class_name: Nalfeshnee
  name: Nalfeshnee
  creature_type: Large fiend, chaotic evil
  challenge_rating: 13
  armor_class: 18
  hp_max: 184
  speed: 20 ft.
  strength: 21
  dexterity: 10
  constitution: 22
  intelligence: 19
  wisdom: 12
  charisma: 15
  senses: Truesight 120 ft., Passive Perception 11
  languages: Abyssal, telepathy 120 ft.
  damage_immunities: poison
  damage_resistances: cold
  condition_immunities: poisoned
  description: |
    Magic Resistance.
      The nalfeshnee has advantage on saving throws against spells and other
      magical effects.

    # Actions

    Multiattack.
      The nalfeshnee uses Horror Nimbus if it can. It then makes three
      attacks: one with its bite and two with its claws.
    Bite.
      Melee Weapon Attack: +10 to hit, reach 5 ft., one target. Hit: 32
      (5d10 + 5) piercing damage.
    Claw.
      Melee Weapon Attack: +10 to hit, reach 10 ft., one target. Hit: 15
      (3d6 + 5) slashing damage.
    Horror Nimbus.
      The nalfeshnee magically emits scintillating, multicolored light. Each
      creature within 15 feet of the nalfeshnee that can see the light must
      succeed on a DC 15 Wisdom saving throw or be frightened for 1 minute.
      A creature can repeat the saving throw at the end of each of its
      turns, ending the effect on itself on a success. If a creature's
      saving throw is successful or the effect ends for it, the creature is
      immune to the nalfeshnee's Horror Nimbus for the next 24 hours.
    Teleport.
      The nalfeshnee magically teleports, along with any equipment it is
      wearing or carrying, up to 120 feet to an unoccupied space it can see.
    Variant: Summon Demon.
      The demon chooses what to summon and attempts a magical summoning.

      A nalfeshnee has a 50 percent chance of summoning 1d4 vrocks, 1d3
      hezrous, 1d2 glabrezus, or one nalfeshnee.

      A summoned demon appears in an unoccupied space within 60 feet of its
      summoner, acts as an ally of its summoner, and can't summon other
      demons. It remains for 1 minute, until it or its summoner dies, or
      until its summoner dismisses it as an action.
  traits: 
  - name: Magic Resistance
    description: The nalfeshnee has advantage on saving throws against spells and other magical effects.
  actions: 
  - name: Multiattack
    description: "The nalfeshnee uses Horror Nimbus if it can. It then makes three attacks: one with its bite and two with its claws."
  - name: Bite
    description: "Melee Weapon Attack: +10 to hit, reach 5 ft., one target. Hit: 32 (5d10 + 5) piercing damage."
  - name: Claw
    description: "Melee Weapon Attack: +10 to hit, reach 10 ft., one target. Hit: 15 (3d6 + 5) slashing damage."
  - name: Horror Nimbus
    description: The nalfeshnee magically emits scintillating, multicolored light. Each creature within 15 feet of the nalfeshnee that can see the light must succeed on a DC 15 Wisdom saving throw or be frightened for 1 minute. A creature can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success. If a creature's saving throw is successful or the effect ends for it, the creature is immune to the nalfeshnee's Horror Nimbus for the next 24 hours.
  - name: Teleport
    description: The nalfeshnee magically teleports, along with any equipment it is wearing or carrying, up to 120 feet to an unoccupied space it can see.
  - name: "Variant: Summon Demon"
    description: The demon chooses what to summon and attempts a magical summoning. A nalfeshnee has a 50 percent chance of summoning 1d4 vrocks, 1d3 hezrous, 1d2 glabrezus, or one nalfeshnee. A summoned demon appears in an unoccupied space within 60 feet of its summoner, acts as an ally of its summoner, and can't summon other demons. It remains for 1 minute, until it or its summoner dies, or until its summoner dismisses it as an action.

- class_name: NightHag
  name: Night Hag
  creature_type: Medium fiend, neutral evil
  challenge_rating: 5
  armor_class: 17
  hp_max: 112
  speed: 30 ft.
  strength: 18
  dexterity: 15
  constitution: 16
  intelligence: 16
  wisdom: 14
  charisma: 16
  skill_str: Deception +7, Insight +6, Perception +6, Stealth +6
  senses: Darkvision 120 ft., Passive Perception 16
  languages: Abyssal, Common, Infernal, Primordial
  damage_resistances: cold
  condition_immunities: charmed
  description: |
    Innate Spellcasting.
      The hag's innate spellcasting ability is Charisma (spell save DC 14,
      +6 to hit with spell attacks). She can innately cast the following
      spells, requiring no material components:



      At will: detect magic, magic missile

      2/day each: plane shift (self only), ray of enfeeblement, sleep
    Magic Resistance.
      The hag has advantage on saving throws against spells and other
      magical effects.
    Night Hag Items.
      A night hag carries two very rare magic items that she must craft for
      herself If either object is lost, the night hag will go to great
      lengths to retrieve it, as creating a new tool takes time and effort.

      Heartstone: This lustrous black gem allows a night hag to become
      ethereal while it is in her possession. The touch of a heartstone also
      cures any disease. Crafting a heartstone takes 30 days.

      Soul Bag: When an evil humanoid dies as a result of a night hag's
      Nightmare Haunting, the hag catches the soul in this black sack made
      of stitched flesh. A soul bag can hold only one evil soul at a time,
      and only the night hag who crafted the bag can catch a soul with it.
      Crafting a soul bag takes 7 days and a humanoid sacrifice (whose flesh
      is used to make the bag).

    # Actions

    Claws (Hag Form Only).
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8
      + 4) slashing damage.
    Change Shape.
      The hag magically polymorphs into a Small or Medium female humanoid,
      or back into her true form. Her statistics are the same in each form.
      Any equipment she is wearing or carrying isn't transformed. She
      reverts to her true form if she dies.
    Etherealness.
      The hag magically enters the Ethereal Plane from the Material Plane,
      or vice versa. To do so, the hag must have a heartstone in her
      possession.
    Nightmare Haunting.
      While on the Ethereal Plane, the hag magically touches a sleeping
      humanoid on the Material Plane. A protection from evil and good spell
      cast on the target prevents this contact, as does a magic circle. As
      long as the contact persists, the target has dreadful visions. If
      these visions last for at least 1 hour, the target gains no benefit
      from its rest, and its hit point maximum is reduced by 5 (1d10). If
      this effect reduces the target's hit point maximum to 0, the target
      dies, and if the target was evil, its soul is trapped in the hag's
      soul bag. The reduction to the target's hit point maximum lasts until
      removed by the greater restoration spell or similar magic.
  traits: 
  - name: Innate Spellcasting
    description: "The hag's innate spellcasting ability is Charisma (spell save DC 14, +6 to hit with spell attacks). She can innately cast the following spells, requiring no material components: At will: detect magic, magic missile 2/day each: plane shift (self only), ray of enfeeblement, sleep"
  - name: Magic Resistance
    description: The hag has advantage on saving throws against spells and other magical effects.
  - name: Night Hag Items
    description: "A night hag carries two very rare magic items that she must craft for herself If either object is lost, the night hag will go to great lengths to retrieve it, as creating a new tool takes time and effort. Heartstone: This lustrous black gem allows a night hag to become ethereal while it is in her possession. The touch of a heartstone also cures any disease. Crafting a heartstone takes 30 days. Soul Bag: When an evil humanoid dies as a result of a night hag's Nightmare Haunting, the hag catches the soul in this black sack made of stitched flesh. A soul bag can hold only one evil soul at a time, and only the night hag who crafted the bag can catch a soul with it. Crafting a soul bag takes 7 days and a humanoid sacrifice (whose flesh is used to make the bag)."
  actions: 
  - name: Claws (Hag Form Only)
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8 + 4) slashing damage."
  - name: Change Shape
    description: The hag magically polymorphs into a Small or Medium female humanoid, or back into her true form. Her statistics are the same in each form. Any equipment she is wearing or carrying isn't transformed. She reverts to her true form if she dies.
  - name: Etherealness
    description: The hag magically enters the Ethereal Plane from the Material Plane, or vice versa. To do so, the hag must have a heartstone in her possession.
  - name: Nightmare Haunting
    description: While on the Ethereal Plane, the hag magically touches a sleeping humanoid on the Material Plane. A protection from evil and good spell cast on the target prevents this contact, as does a magic circle. As long as the contact persists, the target has dreadful visions. If these visions last for at least 1 hour, the target gains no benefit from its rest, and its hit point maximum is reduced by 5 (1d10). If this effect reduces the target's hit point maximum to 0, the target dies, and if the target was evil, its soul is trapped in the hag's soul bag. The reduction to the target's hit point maximum lasts until removed by the greater restoration spell or similar magic.

- class_name: Nightmare
  name: Nightmare
  creature_type: Large fiend, neutral evil
  challenge_rating: 3
  armor_class: 13
  hp_max: 68
  speed: 60 ft.
  strength: 18
  dexterity: 15
  constitution: 16
  intelligence: 10
  wisdom: 13
  charisma: 15
  senses: Passive Perception 11
  languages: understands Abyssal, Common, and Infernal but can't speak
  damage_immunities: fire
  description: |
    Confer Fire Resistance.
      The nightmare can grant resistance to fire damage to anyone riding it.
    Illumination.
      The nightmare sheds bright light in a 10-foot radius and dim light for
      an additional 10 feet.

    # Actions

    Hooves.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 13 (2d8
      + 4) bludgeoning damage plus 7 (2d6) fire damage.
    Ethereal Stride.
      The nightmare and up to three willing creatures within 5 feet of it
      magically enter the Ethereal Plane from the Material Plane, or vice
      versa.
  traits: 
  - name: Confer Fire Resistance
    description: The nightmare can grant resistance to fire damage to anyone riding it.
  - name: Illumination
    description: The nightmare sheds bright light in a 10-foot radius and dim light for an additional 10 feet.
  actions: 
  - name: Hooves
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 13 (2d8 + 4) bludgeoning damage plus 7 (2d6) fire damage."
  - name: Ethereal Stride
    description: The nightmare and up to three willing creatures within 5 feet of it magically enter the Ethereal Plane from the Material Plane, or vice versa.

- class_name: Noble
  name: Noble
  creature_type: Medium humanoid, any alignment
  challenge_rating: 0.125
  armor_class: 15
  hp_max: 9
  speed: 30 ft.
  strength: 11
  dexterity: 12
  constitution: 11
  intelligence: 12
  wisdom: 14
  charisma: 16
  skill_str: Deception +5, Insight +4, Persuasion +5
  senses: Passive Perception 12
  languages: any two languages
  description: |
    # Actions

    Rapier.
      Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 5 (1d8 +
      1) piercing damage.

    # Reactions

    Parry.
      The noble adds 2 to its AC against one melee attack that would hit it.
      To do so, the noble must see the attacker and be wielding a melee
      weapon.
  traits: []
  actions: 
  - name: Rapier
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 5 (1d8 + 1) piercing damage."
  reactions: 
  - name: Parry
    description: The noble adds 2 to its AC against one melee attack that would hit it. To do so, the noble must see the attacker and be wielding a melee weapon.

- class_name: Nothic
  name: Nothic
  creature_type: Medium aberration, neutral evil
  challenge_rating: 2
  armor_class: 15
  hp_max: 45
  speed: 30 ft.
  strength: 14
  dexterity: 16
  constitution: 16
  intelligence: 13
  wisdom: 10
  charisma: 8
  skill_str: Arcana +3, Insight +4, Perception +2, Stealth +5
  senses: Truesight 120ft., Passive Perception 12
  languages: Undercommon
  description: |
    Keen Sight.
      The nothic has advantage on Wisdom (Perception) checks that rely
      on sight.

    # Actions

    Multiattack.
      The nothic makes two claw attacks.
    Claw.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 6
      (1d6 + 3) slashing damage.
    Rotting Gaze.
      The nothic targets one creature it can see within 30 feet of
      it. The target must succeed on a DC 12 Constitution saving throw
      against this magic or take 10 (3d6) necrotic damage.
    Weird Insight.
      The nothic targets one creature it can see within 30 feet of
      it. The target must contest its Charisma (Deception) check
      against the nothic’s Wisdom (Insight) check. If the nothic wins,
      it magically learns one fact or secret about the target. The
      target automatically wins if it is immune to being charmed.
  traits: 
  - name: Keen Sight
    description: The nothic has advantage on Wisdom (Perception) checks that rely on sight.
  actions: 
  - name: Multiattack
    description: The nothic makes two claw attacks.
  - name: Claw
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 6 (1d6 + 3) slashing damage."
  - name: Rotting Gaze
    description: The nothic targets one creature it can see within 30 feet of it. The target must succeed on a DC 12 Constitution saving throw against this magic or take 10 (3d6) necrotic damage.
  - name: Weird Insight
    description: The nothic targets one creature it can see within 30 feet of it. The target must contest its Charisma (Deception) check against the nothic’s Wisdom (Insight) check. If the nothic wins, it magically learns one fact or secret about the target. The target automatically wins if it is immune to being charmed.

