- class_name: Oni
  name: Oni
  creature_type: Large giant, lawful evil
  challenge_rating: 7
  armor_class: 16
  hp_max: 110
  speed: 30 ft.
  strength: 19
  dexterity: 11
  constitution: 16
  intelligence: 14
  wisdom: 12
  charisma: 15
  skill_str: Arcana +5, Deception +8, Perception +4
  senses: Darkvision 60 ft., Passive Perception 14
  languages: Common, Giant
  description: |
    Innate Spellcasting.
      The oni's innate spellcasting ability is Charisma (spell save DC 13).
      The oni can innately cast the following spells, requiring no material
      components:



      At will: darkness, invisibility

      1/day each: charm person, cone of cold, gaseous form, sleep
    Magic Weapons.
      The oni's weapon attacks are magical.
    Regeneration.
      The oni regains 10 hit points at the start of its turn if it has at
      least 1 hit point.

    # Actions

    Multiattack.
      The oni makes two attacks, either with its claws or its glaive.
    Claw (Oni Form Only).
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 8 (1d8 +
      4) slashing damage.
    Glaive.
      Melee Weapon Attack: +7 to hit, reach 10 ft., one target. Hit: 15
      (2d10 + 4) slashing damage, or 9 (1d10 + 4) slashing damage in Small
      or Medium form.
    Change Shape.
      The oni magically polymorphs into a Small or Medium humanoid, into a
      Large giant, or back into its true form. Other than its size, its
      statistics are the same in each form. The only equipment that is
      transformed is its glaive, which shrinks so that it can be wielded in
      humanoid form. If the oni dies, it reverts to its true form, and its
      glaive reverts to its normal size.
  traits: 
  - name: Innate Spellcasting
    description: "The oni's innate spellcasting ability is Charisma (spell save DC 13). The oni can innately cast the following spells, requiring no material components: At will: darkness, invisibility 1/day each: charm person, cone of cold, gaseous form, sleep"
  - name: Magic Weapons
    description: The oni's weapon attacks are magical.
  - name: Regeneration
    description: The oni regains 10 hit points at the start of its turn if it has at least 1 hit point.
  actions: 
  - name: Multiattack
    description: The oni makes two attacks, either with its claws or its glaive.
  - name: Claw (Oni Form Only)
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 8 (1d8 + 4) slashing damage."
  - name: Glaive
    description: "Melee Weapon Attack: +7 to hit, reach 10 ft., one target. Hit: 15 (2d10 + 4) slashing damage, or 9 (1d10 + 4) slashing damage in Small or Medium form."
  - name: Change Shape
    description: The oni magically polymorphs into a Small or Medium humanoid, into a Large giant, or back into its true form. Other than its size, its statistics are the same in each form. The only equipment that is transformed is its glaive, which shrinks so that it can be wielded in humanoid form. If the oni dies, it reverts to its true form, and its glaive reverts to its normal size.

