- class_name: Otyugh
  name: Otyugh
  creature_type: Large aberration, neutral
  challenge_rating: 5
  armor_class: 14
  hp_max: 114
  speed: 30 ft.
  strength: 16
  dexterity: 11
  constitution: 19
  intelligence: 6
  wisdom: 13
  charisma: 6
  senses: Darkvision 120 ft., Passive Perception 11
  languages: Otyugh
  description: |
    Limited Telepathy.
      The otyugh can magically transmit simple messages and images to any
      creature within 120 ft. of it that can understand a language. This
      form of telepathy doesn't allow the receiving creature to
      telepathically respond.

    # Actions

    Multiattack.
      The otyugh makes three attacks: one with its bite and two with its
      tentacles.
    Bite.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 12 (2d8
      + 3) piercing damage. If the target is a creature, it must succeed on
      a DC 15 Constitution saving throw against disease or become poisoned
      until the disease is cured. Every 24 hours that elapse, the target
      must repeat the saving throw, reducing its hit point maximum by 5
      (1d10) on a failure. The disease is cured on a success. The target
      dies if the disease reduces its hit point maximum to 0. This reduction
      to the target's hit point maximum lasts until the disease is cured.
    Tentacle.
      Melee Weapon Attack: +6 to hit, reach 10 ft., one target. Hit: 7 (1d8
      + 3) bludgeoning damage plus 4 (1d8) piercing damage. If the target is
      Medium or smaller, it is grappled (escape DC 13) and restrained until
      the grapple ends. The otyugh has two tentacles, each of which can
      grapple one target.
    Tentacle Slam.
      The otyugh slams creatures grappled by it into each other or a solid
      surface. Each creature must succeed on a DC 14 Constitution saving
      throw or take 10 (2d6 + 3) bludgeoning damage and be stunned until the
      end of the otyugh's next turn. On a successful save, the target takes
      half the bludgeoning damage and isn't stunned.
  traits: 
  - name: Limited Telepathy
    description: The otyugh can magically transmit simple messages and images to any creature within 120 ft. of it that can understand a language. This form of telepathy doesn't allow the receiving creature to telepathically respond.
  actions: 
  - name: Multiattack
    description: "The otyugh makes three attacks: one with its bite and two with its tentacles."
  - name: Bite
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 12 (2d8 + 3) piercing damage. If the target is a creature, it must succeed on a DC 15 Constitution saving throw against disease or become poisoned until the disease is cured. Every 24 hours that elapse, the target must repeat the saving throw, reducing its hit point maximum by 5 (1d10) on a failure. The disease is cured on a success. The target dies if the disease reduces its hit point maximum to 0. This reduction to the target's hit point maximum lasts until the disease is cured."
  - name: Tentacle
    description: "Melee Weapon Attack: +6 to hit, reach 10 ft., one target. Hit: 7 (1d8 + 3) bludgeoning damage plus 4 (1d8) piercing damage. If the target is Medium or smaller, it is grappled (escape DC 13) and restrained until the grapple ends. The otyugh has two tentacles, each of which can grapple one target."
  - name: Tentacle Slam
    description: The otyugh slams creatures grappled by it into each other or a solid surface. Each creature must succeed on a DC 14 Constitution saving throw or take 10 (2d6 + 3) bludgeoning damage and be stunned until the end of the otyugh's next turn. On a successful save, the target takes half the bludgeoning damage and isn't stunned.

