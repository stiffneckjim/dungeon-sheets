- class_name: OchreJelly
  name: Ochre Jelly
  creature_type: Large ooze, unaligned
  challenge_rating: 2
  armor_class: 8
  hp_max: 45
  speed: 10 ft.
  strength: 15
  dexterity: 6
  constitution: 14
  intelligence: 2
  wisdom: 6
  charisma: 1
  senses: Blindsight 60 ft. (blind beyond this radius), Passive Perception 8
  damage_immunities: lightning, slashing
  damage_resistances: acid
  condition_immunities: blinded, charmed, blinded, exhaustion, frightened, prone
  description: |
    Amorphous.
      The jelly can move through a space as narrow as 1 inch wide without
      squeezing.
    Spider Climb.
      The jelly can climb difficult surfaces, including upside down on
      ceilings, without needing to make an ability check.

    # Actions

    Pseudopod.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 9 (2d6 +
      2) bludgeoning damage plus 3 (1d6) acid damage.

    # Reactions

    Split.
      When a jelly that is Medium or larger is subjected to lightning or
      slashing damage, it splits into two new jellies if it has at least 10
      hit points. Each new jelly has hit points equal to half the original
      jelly's, rounded down. New jellies are one size smaller than the
      original jelly.
  traits: 
  - name: Amorphous
    description: The jelly can move through a space as narrow as 1 inch wide without squeezing.
  - name: Spider Climb
    description: The jelly can climb difficult surfaces, including upside down on ceilings, without needing to make an ability check.
  actions: 
  - name: Pseudopod
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 9 (2d6 + 2) bludgeoning damage plus 3 (1d6) acid damage."
  reactions: 
  - name: Split
    description: When a jelly that is Medium or larger is subjected to lightning or slashing damage, it splits into two new jellies if it has at least 10 hit points. Each new jelly has hit points equal to half the original jelly's, rounded down. New jellies are one size smaller than the original jelly.

- class_name: Octopus
  name: Octopus
  creature_type: Small beast, unaligned
  challenge_rating: 0
  armor_class: 12
  hp_max: 3
  speed: 5 ft.
  strength: 4
  dexterity: 15
  constitution: 11
  intelligence: 3
  wisdom: 10
  charisma: 4
  skill_str: Perception +2, Stealth +4
  senses: Darkvision 30 ft., Passive Perception 12
  description: |
    Hold Breath.
      While out of water, the octopus can hold its breath for 30 minutes.
    Underwater Camouflage.
      The octopus has advantage on Dexterity (Stealth) checks made while
      underwater.
    Water Breathing.
      The octopus can breathe only underwater.

    # Actions

    Tentacles.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 1
      bludgeoning damage, and the target is grappled (escape DC 10). Until
      this grapple ends, the octopus can't use its tentacles on another
      target.
    Ink Cloud.
      A 5-foot-radius cloud of ink extends all around the octopus if it is
      underwater. The area is heavily obscured for 1 minute, although a
      significant current can disperse the ink. After releasing the ink, the
      octopus can use the Dash action as a bonus action.
  traits: 
  - name: Hold Breath
    description: While out of water, the octopus can hold its breath for 30 minutes.
  - name: Underwater Camouflage
    description: The octopus has advantage on Dexterity (Stealth) checks made while underwater.
  - name: Water Breathing
    description: The octopus can breathe only underwater.
  actions: 
  - name: Tentacles
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 1 bludgeoning damage, and the target is grappled (escape DC 10). Until this grapple ends, the octopus can't use its tentacles on another target."
  - name: Ink Cloud
    description: A 5-foot-radius cloud of ink extends all around the octopus if it is underwater. The area is heavily obscured for 1 minute, although a significant current can disperse the ink. After releasing the ink, the octopus can use the Dash action as a bonus action.

