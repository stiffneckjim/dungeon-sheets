- class_name: Panther
  name: Panther
  creature_type: Medium beast, unaligned
  challenge_rating: 0.25
  armor_class: 12
  hp_max: 13
  speed: 50 ft.
  strength: 14
  dexterity: 15
  constitution: 10
  intelligence: 3
  wisdom: 14
  charisma: 7
  skill_str: Perception +4, Stealth +6
  senses: Passive Perception 14
  description: |
    Keen Smell.
      The panther has advantage on Wisdom (Perception) checks that rely on
      smell.
    Pounce.
      If the panther moves at least 20 ft. straight toward a creature and
      then hits it with a claw attack on the same turn, that target must
      succeed on a DC 12 Strength saving throw or be knocked prone. If the
      target is prone, the panther can make one bite attack against it as a
      bonus action.

    # Actions

    Bite.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6 +
      2) piercing damage.
    Claw.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4 +
      2) slashing damage.
  traits: 
  - name: Keen Smell
    description: The panther has advantage on Wisdom (Perception) checks that rely on smell.
  - name: Pounce
    description: If the panther moves at least 20 ft. straight toward a creature and then hits it with a claw attack on the same turn, that target must succeed on a DC 12 Strength saving throw or be knocked prone. If the target is prone, the panther can make one bite attack against it as a bonus action.
  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6 + 2) piercing damage."
  - name: Claw
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4 + 2) slashing damage."

