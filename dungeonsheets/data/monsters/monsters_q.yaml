- class_name: Quasit
  name: Quasit
  creature_type: Tiny fiend, chaotic evil
  challenge_rating: 1
  armor_class: 13
  hp_max: 7
  speed: 40 ft.
  strength: 5
  dexterity: 17
  constitution: 10
  intelligence: 7
  wisdom: 10
  charisma: 10
  skill_str: Stealth +5
  senses: Darkvision 120 ft., Passive Perception 10
  languages: Abyssal, Common
  damage_immunities: poison
  damage_resistances: cold
  condition_immunities: poisoned
  description: |
    Shapechanger.
      The quasit can use its action to polymorph into a beast form that
      resembles a bat (speed 10 ft. fly 40 ft.), a centipede (40 ft., climb
      40 ft.), or a toad (40 ft., swim 40 ft.), or back into its true form .
      Its statistics are the same in each form, except for the speed changes
      noted. Any equipment it is wearing or carrying isn't transformed . It
      reverts to its true form if it dies.
    Magic Resistance.
      The quasit has advantage on saving throws against spells and other
      magical effects.
    Variant: Familiar.
      The quasit can serve another creature as a familiar, forming a
      telepathic bond with its willing master. While the two are bonded, the
      master can sense what the quasit senses as long as they are within 1
      mile of each other. While the quasit is within 10 feet of its master,
      the master shares the quasit's Magic Resistance trait. At any time and
      for any reason, the quasit can end its service as a familiar, ending
      the telepathic bond.

    # Actions

    Claw (Bite in Beast Form).
      Melee Weapon Attack: +4 to hit, reach 5 ft ., one target. Hit: 5 (1d4
      + 3) piercing damage, and the target must succeed on a DC 10
      Constitution saving throw or take 5 (2d4) poison damage and become
      poisoned for 1 minute. The target can repeat the saving throw at the
      end of each of its turns, ending the effect on itself on a success.
    Scare.
      One creature of the quasit's choice within 20 ft. of it must succeed
      on a DC 10 Wisdom saving throw or be frightened for 1 minute. The
      target can repeat the saving throw at the end of each of its turns,
      with disadvantage if the quasit is within line of sight, ending the
      effect on itself on a success.
    Invisibility.
      The quasit magically turns invisible until it attacks or uses Scare,
      or until its concentration ends (as if concentrating on a spell). Any
      equipment the quasit wears or carries is invisible with it.
  traits: 
  - name: Shapechanger
    description: The quasit can use its action to polymorph into a beast form that resembles a bat (speed 10 ft. fly 40 ft.), a centipede (40 ft., climb 40 ft.), or a toad (40 ft., swim 40 ft.), or back into its true form . Its statistics are the same in each form, except for the speed changes noted. Any equipment it is wearing or carrying isn't transformed . It reverts to its true form if it dies.
  - name: Magic Resistance
    description: The quasit has advantage on saving throws against spells and other magical effects.
  - name: "Variant: Familiar"
    description: The quasit can serve another creature as a familiar, forming a telepathic bond with its willing master. While the two are bonded, the master can sense what the quasit senses as long as they are within 1 mile of each other. While the quasit is within 10 feet of its master, the master shares the quasit's Magic Resistance trait. At any time and for any reason, the quasit can end its service as a familiar, ending the telepathic bond.
  actions: 
  - name: Claw (Bite in Beast Form)
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft ., one target. Hit: 5 (1d4 + 3) piercing damage, and the target must succeed on a DC 10 Constitution saving throw or take 5 (2d4) poison damage and become poisoned for 1 minute. The target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success."
  - name: Scare
    description: One creature of the quasit's choice within 20 ft. of it must succeed on a DC 10 Wisdom saving throw or be frightened for 1 minute. The target can repeat the saving throw at the end of each of its turns, with disadvantage if the quasit is within line of sight, ending the effect on itself on a success.
  - name: Invisibility
    description: The quasit magically turns invisible until it attacks or uses Scare, or until its concentration ends (as if concentrating on a spell). Any equipment the quasit wears or carries is invisible with it.

