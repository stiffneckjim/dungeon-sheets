- class_name: Roper
  name: Roper
  creature_type: Large monstrosity, neutral evil
  challenge_rating: 5
  armor_class: 20
  hp_max: 93
  speed: 10 ft.
  strength: 18
  dexterity: 8
  constitution: 17
  intelligence: 7
  wisdom: 16
  charisma: 6
  skill_str: Perception +6, Stealth +5
  senses: Darkvision 60 ft., Passive Perception 16
  description: |
    False Appearance.
      While the roper remains motionless, it is indistinguishable from a
      normal cave formation, such as a stalagmite.
    Grasping Tendrils.
      The roper can have up to six tendrils at a time. Each tendril can be
      attacked (AC 20; 10 hit points; immunity to poison and psychic
      damage). Destroying a tendril deals no damage to the roper, which can
      extrude a replacement tendril on its next turn. A tendril can also be
      broken if a creature takes an action and succeeds on a DC 15 Strength
      check against it.
    Spider Climb.
      The roper can climb difficult surfaces, including upside down on
      ceilings, without needing to make an ability check.

    # Actions

    Multiattack.
      The roper makes four attacks with its tendrils, uses Reel, and makes
      one attack with its bite.
    Bite.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 22 (4d8
      + 4) piercing damage.
    Tendril.
      Melee Weapon Attack: +7 to hit, reach 50 ft., one creature. Hit: The
      target is grappled (escape DC 15). Until the grapple ends, the target
      is restrained and has disadvantage on Strength checks and Strength
      saving throws, and the roper can't use the same tendril on another
      target.
    Reel.
      The roper pulls each creature grappled by it up to 25 ft. straight
      toward it.
  traits: 
  - name: False Appearance
    description: While the roper remains motionless, it is indistinguishable from a normal cave formation, such as a stalagmite.
  - name: Grasping Tendrils
    description: The roper can have up to six tendrils at a time. Each tendril can be attacked (AC 20; 10 hit points; immunity to poison and psychic damage). Destroying a tendril deals no damage to the roper, which can extrude a replacement tendril on its next turn. A tendril can also be broken if a creature takes an action and succeeds on a DC 15 Strength check against it.
  - name: Spider Climb
    description: The roper can climb difficult surfaces, including upside down on ceilings, without needing to make an ability check.
  actions: 
  - name: Multiattack
    description: The roper makes four attacks with its tendrils, uses Reel, and makes one attack with its bite.
  - name: Bite
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 22 (4d8 + 4) piercing damage."
  - name: Tendril
    description: "Melee Weapon Attack: +7 to hit, reach 50 ft., one creature. Hit: The target is grappled (escape DC 15). Until the grapple ends, the target is restrained and has disadvantage on Strength checks and Strength saving throws, and the roper can't use the same tendril on another target."
  - name: Reel
    description: The roper pulls each creature grappled by it up to 25 ft. straight toward it.

- class_name: RugofSmothering
  name: Rug of Smothering
  creature_type: Large construct, unaligned
  challenge_rating: 2
  armor_class: 12
  hp_max: 33
  speed: 10 ft.
  strength: 17
  dexterity: 14
  constitution: 10
  intelligence: 1
  wisdom: 3
  charisma: 1
  senses: Blindsight 60 ft. (blind beyond this radius), Passive Perception 6
  damage_immunities: poison, psychic
  condition_immunities: blinded, charmed, blinded, frightened, paralyzed, petrified, poisoned
  description: |
    Antimagic Susceptibility.
      The rug is incapacitated while in the area of an antimagic field. If
      targeted by dispel magic, the rug must succeed on a Constitution
      saving throw against the caster's spell save DC or fall unconscious
      for 1 minute.
    Damage Transfer.
      While it is grappling a creature, the rug takes only half the damage
      dealt to it, and the creature grappled by the rug takes the other
      half.
    False Appearance.
      While the rug remains motionless, it is indistinguishable from a
      normal rug.

    # Actions

    Smother.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one Medium or smaller
      creature. Hit: The creature is grappled (escape DC 13). Until this
      grapple ends, the target is restrained, blinded, and at risk of
      suffocating, and the rug can't smother another target. In addition, at
      the start of each of the target's turns, the target takes 10 (2d6 + 3)
      bludgeoning damage.
  traits: 
  - name: Antimagic Susceptibility
    description: The rug is incapacitated while in the area of an antimagic field. If targeted by dispel magic, the rug must succeed on a Constitution saving throw against the caster's spell save DC or fall unconscious for 1 minute.
  - name: Damage Transfer
    description: While it is grappling a creature, the rug takes only half the damage dealt to it, and the creature grappled by the rug takes the other half.
  - name: False Appearance
    description: While the rug remains motionless, it is indistinguishable from a normal rug.
  actions: 
  - name: Smother
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one Medium or smaller creature. Hit: The creature is grappled (escape DC 13). Until this grapple ends, the target is restrained, blinded, and at risk of suffocating, and the rug can't smother another target. In addition, at the start of each of the target's turns, the target takes 10 (2d6 + 3) bludgeoning damage."

- class_name: RustMonster
  name: Rust Monster
  creature_type: Medium monstrosity, unaligned
  challenge_rating: 0.5
  armor_class: 14
  hp_max: 27
  speed: 40 ft.
  strength: 13
  dexterity: 12
  constitution: 13
  intelligence: 2
  wisdom: 13
  charisma: 6
  senses: Darkvision 60 ft., Passive Perception 11
  description: |
    Iron Scent.
      The rust monster can pinpoint, by scent, the location of ferrous metal
      within 30 feet of it.
    Rust Metal.
      Any nonmagical weapon made of metal that hits the rust monster
      corrodes. After dealing damage, the weapon takes a permanent and
      cumulative -1 penalty to damage rolls. If its penalty drops to -5, the
      weapon is destroyed. Non magical ammunition made of metal that hits
      the rust monster is destroyed after dealing damage.

    # Actions

    Bite.
      Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 5 (1d8 +
      1) piercing damage.
    Antennae.
      The rust monster corrodes a nonmagical ferrous metal object it can see
      within 5 feet of it. If the object isn't being worn or carried, the
      touch destroys a 1-foot cube of it. If the object is being worn or
      carried by a creature, the creature can make a DC 11 Dexterity saving
      throw to avoid the rust monster's touch.

      If the object touched is either metal armor or a metal shield being
      worn or carried, its takes a permanent and cumulative -1 penalty to
      the AC it offers. Armor reduced to an AC of 10 or a shield that drops
      to a bonus is destroyed. If the object touched is a held metal weapon,
      it rusts as described in the Rust Metal trait.
  traits: 
  - name: Iron Scent
    description: The rust monster can pinpoint, by scent, the location of ferrous metal within 30 feet of it.
  - name: Rust Metal
    description: Any nonmagical weapon made of metal that hits the rust monster corrodes. After dealing damage, the weapon takes a permanent and cumulative -1 penalty to damage rolls. If its penalty drops to -5, the weapon is destroyed. Non magical ammunition made of metal that hits the rust monster is destroyed after dealing damage.
  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 5 (1d8 + 1) piercing damage."
  - name: Antennae
    description: The rust monster corrodes a nonmagical ferrous metal object it can see within 5 feet of it. If the object isn't being worn or carried, the touch destroys a 1-foot cube of it. If the object is being worn or carried by a creature, the creature can make a DC 11 Dexterity saving throw to avoid the rust monster's touch. If the object touched is either metal armor or a metal shield being worn or carried, its takes a permanent and cumulative -1 penalty to the AC it offers. Armor reduced to an AC of 10 or a shield that drops to a bonus is destroyed. If the object touched is a held metal weapon, it rusts as described in the Rust Metal trait.

