- class_name: Rakshasa
  name: Rakshasa
  creature_type: Medium fiend, lawful evil
  challenge_rating: 13
  armor_class: 16
  hp_max: 110
  speed: 40 ft.
  strength: 14
  dexterity: 17
  constitution: 18
  intelligence: 13
  wisdom: 16
  charisma: 20
  skill_str: Deception +10, Insight +8
  senses: Darkvision 60 ft., Passive Perception 13
  languages: Common, Infernal
  damage_immunities: bludgeoning, piercing, and slashing from nonmagical weapons
  damage_vulnerabilities: piercing from magic weapons wielded by good creatures
  description: |
    Limited Magic Immunity.
      The rakshasa can't be affected or detected by spells of 6th level or
      lower unless it wishes to be. It has advantage on saving throws
      against all other spells and magical effects.
    Innate Spellcasting.
      The rakshasa's innate spellcasting ability is Charisma (spell save DC
      18, +10 to hit with spell attacks). The rakshasa can innately cast the
      following spells, requiring no material components:



      At will: detect thoughts, disguise self, mage hand, minor illusion

      3/day each: charm person, detect magic, invisibility, major image,
      suggestion

      1/day each: dominate person, fly, plane shift, true seeing

    # Actions

    Multiattack.
      The rakshasa makes two claw attacks
    Claw.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 9 (2d6 +
      2) slashing damage, and the target is cursed if it is a creature. The
      magical curse takes effect whenever the target takes a short or long
      rest, filling the target's thoughts with horrible images and dreams.
      The cursed target gains no benefit from finishing a short or long
      rest. The curse lasts until it is lifted by a remove curse spell or
      similar magic.
  traits: 
  - name: Limited Magic Immunity
    description: The rakshasa can't be affected or detected by spells of 6th level or lower unless it wishes to be. It has advantage on saving throws against all other spells and magical effects.
  - name: Innate Spellcasting
    description: "The rakshasa's innate spellcasting ability is Charisma (spell save DC 18, +10 to hit with spell attacks). The rakshasa can innately cast the following spells, requiring no material components: At will: detect thoughts, disguise self, mage hand, minor illusion 3/day each: charm person, detect magic, invisibility, major image, suggestion 1/day each: dominate person, fly, plane shift, true seeing"
  actions: 
  - name: Multiattack
    description: The rakshasa makes two claw attacks
  - name: Claw
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 9 (2d6 + 2) slashing damage, and the target is cursed if it is a creature. The magical curse takes effect whenever the target takes a short or long rest, filling the target's thoughts with horrible images and dreams. The cursed target gains no benefit from finishing a short or long rest. The curse lasts until it is lifted by a remove curse spell or similar magic."

