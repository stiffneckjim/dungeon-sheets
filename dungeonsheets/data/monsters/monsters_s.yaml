- class_name: Shadow
  name: Shadow
  creature_type: Medium undead, chaotic evil
  challenge_rating: 0.5
  armor_class: 12
  hp_max: 16
  speed: 40 ft.
  strength: 6
  dexterity: 14
  constitution: 13
  intelligence: 6
  wisdom: 10
  charisma: 8
  skill_str: Stealth +4
  senses: Darkvision 60 ft., Passive Perception 10
  damage_immunities: necrotic, poison
  damage_resistances: acid
  damage_vulnerabilities: radiant
  condition_immunities: exhaustion, frightened, grappled, paralyzed, petrified, poisoned, prone, restrained
  description: |
    Amorphous.
      The shadow can move through a space as narrow as 1 inch wide without
      squeezing.
    Shadow Stealth.
      While in dim light or darkness, the shadow can take the Hide action as
      a bonus action. Its stealth bonus is also improved to +6.
    Sunlight Weakness.
      While in sunlight, the shadow has disadvantage on attack rolls,
      ability checks, and saving throws.

    # Actions

    Strength Drain.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: 9 (2d6
      + 2) necrotic damage, and the target's Strength score is reduced by
      1d4. The target dies if this reduces its Strength to 0. Otherwise, the
      reduction lasts until the target finishes a short or long rest.

      If a non-evil humanoid dies from this attack, a new shadow rises from
      the corpse 1d4 hours later.
