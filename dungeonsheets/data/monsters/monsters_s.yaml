- class_name: ShamblingMound
  name: Shambling Mound
  creature_type: Large plant, unaligned
  challenge_rating: 5
  armor_class: 15
  hp_max: 136
  speed: 20 ft.
  strength: 18
  dexterity: 8
  constitution: 16
  intelligence: 5
  wisdom: 10
  charisma: 5
  skill_str: Stealth +2
  senses: Blindsight 60 ft. (blind beyond this radius), Passive Perception 10
  damage_immunities: lightning
  damage_resistances: cold
  condition_immunities: blinded, blinded, exhaustion
  description: |
    Lightning Absorption.
      Whenever the shambling mound is subjected to lightning damage, it
      takes no damage and regains a number of hit points equal to the
      lightning damage dealt.

    # Actions

    Multiattack.
      The shambling mound makes two slam attacks. If both attacks hit a
      Medium or smaller target, the target is grappled (escape DC 14), and
      the shambling mound uses its Engulf on it.
    Slam.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8
      + 4) bludgeoning damage.
    Engulf.
      The shambling mound engulfs a Medium or smaller creature grappled by
      it. The engulfed target is blinded, restrained, and unable to breathe,
      and it must succeed on a DC 14 Constitution saving throw at the start
      of each of the mound's turns or take 13 (2d8 + 4) bludgeoning damage.
      If the mound moves, the engulfed target moves with it. The mound can
      have only one creature engulfed at a time.
  traits: 
  - name: Lightning Absorption
    description: Whenever the shambling mound is subjected to lightning damage, it takes no damage and regains a number of hit points equal to the lightning damage dealt.
  actions: 
  - name: Multiattack
    description: The shambling mound makes two slam attacks. If both attacks hit a Medium or smaller target, the target is grappled (escape DC 14), and the shambling mound uses its Engulf on it.
  - name: Slam
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8 + 4) bludgeoning damage."
  - name: Engulf
    description: The shambling mound engulfs a Medium or smaller creature grappled by it. The engulfed target is blinded, restrained, and unable to breathe, and it must succeed on a DC 14 Constitution saving throw at the start of each of the mound's turns or take 13 (2d8 + 4) bludgeoning damage. If the mound moves, the engulfed target moves with it. The mound can have only one creature engulfed at a time.

- class_name: ShieldGuardian
  name: Shield Guardian
  creature_type: Large construct, unaligned
  challenge_rating: 7
  armor_class: 17
  hp_max: 142
  speed: 30 ft.
  strength: 18
  dexterity: 8
  constitution: 18
  intelligence: 7
  wisdom: 10
  charisma: 3
  senses: Blindsight 10 ft., Darkvision 60 ft., Passive Perception 10
  languages: understands commands given in any language but can't speak
  damage_immunities: poison
  condition_immunities: charmed, exhaustion, frightened, paralyzed, poisoned
  description: |
    Bound.
      The shield guardian is magically bound to an amulet. As long as the
      guardian and its amulet are on the same plane of existence, the
      amulet's wearer can telepathically call the guardian to travel to it,
      and the guardian knows the distance and direction to the amulet. If
      the guardian is within 60 feet of the amulet's wearer, half of any
      damage the wearer takes (rounded up) is transferred to the guardian.
    Regeneration.
      The shield guardian regains 10 hit points at the start of its turn if
      it has at least 1 hit. point.
    Spell Storing.
      A spellcaster who wears the shield guardian's amulet can cause the
      guardian to store one spell of 4th level or lower. To do so, the
      wearer must cast the spell on the guardian. The spell has no effect
      but is stored within the guardian. When commanded to do so by the
      wearer or when a situation arises that was predefined by the
      spellcaster, the guardian casts the stored spell with any parameters
      set by the original caster, requiring no components. When the spell is
      cast or a new spell is stored, any previously stored spell is lost.

    # Actions

    Multiattack.
      The guardian makes two fist attacks.
    Fist.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 11 (2d6
      + 4) bludgeoning damage.

    # Reactions

    Shield.
      When a creature makes an attack against the wearer of the guardian's
      amulet, the guardian grants a +2 bonus to the wearer's AC if the
      guardian is within 5 feet of the wearer.
  traits: 
  - name: Bound
    description: The shield guardian is magically bound to an amulet. As long as the guardian and its amulet are on the same plane of existence, the amulet's wearer can telepathically call the guardian to travel to it, and the guardian knows the distance and direction to the amulet. If the guardian is within 60 feet of the amulet's wearer, half of any damage the wearer takes (rounded up) is transferred to the guardian.
  - name: Regeneration
    description: The shield guardian regains 10 hit points at the start of its turn if it has at least 1 hit. point.
  - name: Spell Storing
    description: A spellcaster who wears the shield guardian's amulet can cause the guardian to store one spell of 4th level or lower. To do so, the wearer must cast the spell on the guardian. The spell has no effect but is stored within the guardian. When commanded to do so by the wearer or when a situation arises that was predefined by the spellcaster, the guardian casts the stored spell with any parameters set by the original caster, requiring no components. When the spell is cast or a new spell is stored, any previously stored spell is lost.
  actions: 
  - name: Multiattack
    description: The guardian makes two fist attacks.
  - name: Fist
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 11 (2d6 + 4) bludgeoning damage."
  reactions: 
  - name: Shield
    description: When a creature makes an attack against the wearer of the guardian's amulet, the guardian grants a +2 bonus to the wearer's AC if the guardian is within 5 feet of the wearer.

