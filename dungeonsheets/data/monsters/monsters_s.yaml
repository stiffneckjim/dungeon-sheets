- class_name: SaberToothedTiger
  name: Saber-Toothed Tiger
  creature_type: Large beast, unaligned
  challenge_rating: 2
  armor_class: 12
  hp_max: 52
  speed: 40 ft.
  strength: 18
  dexterity: 14
  constitution: 15
  intelligence: 3
  wisdom: 12
  charisma: 8
  skill_str: Perception +3, Stealth +6
  senses: Passive Perception 13
  description: |
    Keen Smell.
      The tiger has advantage on Wisdom (Perception) checks that rely on
      smell.
    Pounce.
      If the tiger moves at least 20 ft. straight toward a creature and then
      hits it with a claw attack on the same turn, that target must succeed
      on a DC 14 Strength saving throw or be knocked prone. If the target is
      prone, the tiger can make one bite attack against it as a bonus
      action.

    # Actions

    Bite.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 10 (1d10
      + 5) piercing damage.
    Claw.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 12 (2d6
      + 5) slashing damage.
  traits: 
  - name: Keen Smell
    description: The tiger has advantage on Wisdom (Perception) checks that rely on smell.
  - name: Pounce
    description: If the tiger moves at least 20 ft. straight toward a creature and then hits it with a claw attack on the same turn, that target must succeed on a DC 14 Strength saving throw or be knocked prone. If the target is prone, the tiger can make one bite attack against it as a bonus action.
  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 10 (1d10 + 5) piercing damage."
  - name: Claw
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 12 (2d6 + 5) slashing damage."

