- class_name: Treant
  name: Treant
  creature_type: Huge plant, chaotic good
  challenge_rating: 9
  armor_class: 16
  hp_max: 138
  speed: 30 ft.
  strength: 23
  dexterity: 8
  constitution: 21
  intelligence: 12
  wisdom: 16
  charisma: 12
  senses: Passive Perception 13
  languages: Common, Druidic, Elvish, Sylvan
  damage_resistances: bludgeoning
  damage_vulnerabilities: fire
  description: |
    False Appearance.
      While the treant remains motionless, it is indistinguishable from a
      normal tree.
    Siege Monster.
      The treant deals double damage to objects and structures.

    # Actions

    Multiattack.
      The treant makes two slam attacks.
    Slam.
      Melee Weapon Attack: +10 to hit, reach 5 ft., one target. Hit: 16 (3d6
      + 6) bludgeoning damage.
    Rock.
      Ranged Weapon Attack: +10 to hit, range 60/180 ft., one target. Hit:
      28 (4d10 + 6) bludgeoning damage.
    Animate Trees.
      The treant magically animates one or two trees it can see within 60
      feet of it. These trees have the same statistics as a treant, except
      they have Intelligence and Charisma scores of 1, they can't speak, and
      they have only the Slam action option. An animated tree acts as an
      ally of the treant. The tree remains animate for 1 day or until it
      dies; until the treant dies or is more than 120 feet from the tree; or
      until the treant takes a bonus action to turn it back into an
      inanimate tree. The tree then takes root if possible.
  traits: 
  - name: False Appearance
    description: While the treant remains motionless, it is indistinguishable from a normal tree.
  - name: Siege Monster
    description: The treant deals double damage to objects and structures.
  actions: 
  - name: Multiattack
    description: The treant makes two slam attacks.
  - name: Slam
    description: "Melee Weapon Attack: +10 to hit, reach 5 ft., one target. Hit: 16 (3d6 + 6) bludgeoning damage."
  - name: Rock
    description: "Ranged Weapon Attack: +10 to hit, range 60/180 ft., one target. Hit: 28 (4d10 + 6) bludgeoning damage."
  - name: Animate Trees
    description: The treant magically animates one or two trees it can see within 60 feet of it. These trees have the same statistics as a treant, except they have Intelligence and Charisma scores of 1, they can't speak, and they have only the Slam action option. An animated tree acts as an ally of the treant. The tree remains animate for 1 day or until it dies; until the treant dies or is more than 120 feet from the tree; or until the treant takes a bonus action to turn it back into an inanimate tree. The tree then takes root if possible.

