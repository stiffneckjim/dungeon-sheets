    description: The tarrasque makes one bite attack or uses its Swallow.

- class_name: Thug
  name: Thug
  creature_type: Medium humanoid, any non-good alignment
  challenge_rating: 0.5
  armor_class: 11
  hp_max: 32
  speed: 30 ft.
  strength: 15
  dexterity: 11
  constitution: 14
  intelligence: 10
  wisdom: 10
  charisma: 11
  skill_str: Intimidation +2
  senses: Passive Perception 10
  languages: any one language (usually Common)
  description: |
    Pack Tactics.
      The thug has advantage on an attack roll against a creature if at
      least one of the thug's allies is within 5 ft. of the creature and the
      ally isn't incapacitated.

    # Actions

    Multiattack.
      The thug makes two melee attacks.
    Mace.
      Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: 5 (1d6
      + 2) bludgeoning damage.
    Heavy Crossbow.
      Ranged Weapon Attack: +2 to hit, range 100/400 ft., one target. Hit: 5
      (1d10) piercing damage.
  traits: 
  - name: Pack Tactics
    description: The thug has advantage on an attack roll against a creature if at least one of the thug's allies is within 5 ft. of the creature and the ally isn't incapacitated.
  actions: 
  - name: Multiattack
    description: The thug makes two melee attacks.
  - name: Mace
    description: "Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: 5 (1d6 + 2) bludgeoning damage."
  - name: Heavy Crossbow
    description: "Ranged Weapon Attack: +2 to hit, range 100/400 ft., one target. Hit: 5 (1d10) piercing damage."

