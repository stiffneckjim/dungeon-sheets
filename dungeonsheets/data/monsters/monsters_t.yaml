- class_name: Tarrasque
  name: Tarrasque
  creature_type: Gargantuan monstrosity, unaligned
  challenge_rating: 30
  armor_class: 25
  hp_max: 676
  speed: 40 ft.
  strength: 30
  dexterity: 11
  constitution: 30
  intelligence: 3
  wisdom: 11
  charisma: 11
  senses: Blindsight 120 ft., Passive Perception 10
  damage_immunities: fire, poison, bludgeoning, piercing, and slashing from nonmagical weapons
  condition_immunities: charmed, frightened, paralyzed, poisoned
  description: |
    Legendary Resistance.
      If the tarrasque fails a saving throw, it can choose to succeed
      instead.
    Magic Resistance.
      The tarrasque has advantage on saving throws against spells and other
      magical effects.
    Reflective Carapace.
      Any time the tarrasque is targeted by a magic missile spell, a line
      spell, or a spell that requires a ranged attack roll, roll a d6. On a
      1 to 5, the tarrasque is unaffected. On a 6, the tarrasque is
      unaffected, and the effect is reflected back at the caster as though
      it originated from the tarrasque, turning the caster into the target.
    Siege Monster.
      The tarrasque deals double damage to objects and structures.

    # Actions

    Multiattack.
      The tarrasque can use its Frightful Presence. It then makes five
      attacks: one with its bite, two with its claws, one with its horns,
      and one with its tail. It can use its Swallow instead of its bite.
    Bite.
      Melee Weapon Attack: +19 to hit, reach 10 ft., one target. Hit: 36
      (4d12 + 10) piercing damage. If the target is a creature, it is
      grappled (escape DC 20). Until this grapple ends, the target is
      restrained, and the tarrasque can't bite another target.
    Claw.
      Melee Weapon Attack: +19 to hit, reach 15 ft., one target. Hit: 28
      (4d8 + 10) slashing damage.
    Horns.
      Melee Weapon Attack: +19 to hit, reach 10 ft., one target. Hit: 32
      (4d10 + 10) piercing damage.
    Tail.
      Melee Weapon Attack: +19 to hit, reach 20 ft., one target. Hit: 24
      (4d6 + 10) bludgeoning damage. If the target is a creature, it must
      succeed on a DC 20 Strength saving throw or be knocked prone.
    Frightful Presence.
      Each creature of the tarrasque's choice within 120 feet of it and
      aware of it must succeed on a DC 17 Wisdom saving throw or become
      frightened for 1 minute. A creature can repeat the saving throw at the
      end of each of its turns, with disadvantage if the tarrasque is within
      line of sight, ending the effect on itself on a success. If a
      creature's saving throw is successful or the effect ends for it, the
      creature is immune to the tarrasque's Frightful Presence for the next
      24 hours.
    Swallow.
      The tarrasque makes one bite attack against a Large or smaller
      creature it is grappling. If the attack hits, the target takes the
      bite's damage, the target is swallowed, and the grapple ends. While
      swallowed, the creature is blinded and restrained, it has total cover
      against attacks and other effects outside the tarrasque, and it takes
      56 (16d6) acid damage at the start of each of the tarrasque's turns.

      If the tarrasque takes 60 damage or more on a single turn from a
      creature inside it, the tarrasque must succeed on a DC 20 Constitution
      saving throw at the end of that turn or regurgitate all swallowed
      creatures, which fall prone in a space within 10 feet of the
      tarrasque. If the tarrasque dies, a swallowed creature is no longer
      restrained by it and can escape from the corpse by using 30 feet of
      movement, exiting prone.

    # Legendary Actions

    Attack.
      The tarrasque makes one claw attack or tail attack.
    Move.
      The tarrasque moves up to half its speed.
    Chomp (Costs 2 Actions).
      The tarrasque makes one bite attack or uses its Swallow.
  traits: 
  - name: Legendary Resistance
    description: If the tarrasque fails a saving throw, it can choose to succeed instead.
  - name: Magic Resistance
    description: The tarrasque has advantage on saving throws against spells and other magical effects.
  - name: Reflective Carapace
    description: Any time the tarrasque is targeted by a magic missile spell, a line spell, or a spell that requires a ranged attack roll, roll a d6. On a 1 to 5, the tarrasque is unaffected. On a 6, the tarrasque is unaffected, and the effect is reflected back at the caster as though it originated from the tarrasque, turning the caster into the target.
  - name: Siege Monster
    description: The tarrasque deals double damage to objects and structures.
  actions: 
  - name: Multiattack
    description: "The tarrasque can use its Frightful Presence. It then makes five attacks: one with its bite, two with its claws, one with its horns, and one with its tail. It can use its Swallow instead of its bite."
  - name: Bite
    description: "Melee Weapon Attack: +19 to hit, reach 10 ft., one target. Hit: 36 (4d12 + 10) piercing damage. If the target is a creature, it is grappled (escape DC 20). Until this grapple ends, the target is restrained, and the tarrasque can't bite another target."
  - name: Claw
    description: "Melee Weapon Attack: +19 to hit, reach 15 ft., one target. Hit: 28 (4d8 + 10) slashing damage."
  - name: Horns
    description: "Melee Weapon Attack: +19 to hit, reach 10 ft., one target. Hit: 32 (4d10 + 10) piercing damage."
  - name: Tail
    description: "Melee Weapon Attack: +19 to hit, reach 20 ft., one target. Hit: 24 (4d6 + 10) bludgeoning damage. If the target is a creature, it must succeed on a DC 20 Strength saving throw or be knocked prone."
  - name: Frightful Presence
    description: Each creature of the tarrasque's choice within 120 feet of it and aware of it must succeed on a DC 17 Wisdom saving throw or become frightened for 1 minute. A creature can repeat the saving throw at the end of each of its turns, with disadvantage if the tarrasque is within line of sight, ending the effect on itself on a success. If a creature's saving throw is successful or the effect ends for it, the creature is immune to the tarrasque's Frightful Presence for the next 24 hours.
  - name: Swallow
    description: The tarrasque makes one bite attack against a Large or smaller creature it is grappling. If the attack hits, the target takes the bite's damage, the target is swallowed, and the grapple ends. While swallowed, the creature is blinded and restrained, it has total cover against attacks and other effects outside the tarrasque, and it takes 56 (16d6) acid damage at the start of each of the tarrasque's turns. If the tarrasque takes 60 damage or more on a single turn from a creature inside it, the tarrasque must succeed on a DC 20 Constitution saving throw at the end of that turn or regurgitate all swallowed creatures, which fall prone in a space within 10 feet of the tarrasque. If the tarrasque dies, a swallowed creature is no longer restrained by it and can escape from the corpse by using 30 feet of movement, exiting prone.
  legendary_actions: 
  - name: Attack
    description: The tarrasque makes one claw attack or tail attack.
  - name: Move
    description: The tarrasque moves up to half its speed.
