- class_name: Vrock
  name: Vrock
  creature_type: Large fiend, chaotic evil
  challenge_rating: 6
  armor_class: 15
  hp_max: 104
  speed: 40 ft.
  strength: 17
  dexterity: 15
  constitution: 18
  intelligence: 8
  wisdom: 13
  charisma: 8
  senses: Darkvision 120 ft., Passive Perception 11
  languages: Abyssal, telepathy 120 ft.
  damage_immunities: poison
  damage_resistances: cold
  condition_immunities: poisoned
  description: |
    Magic Resistance.
      The vrock has advantage on saving throws against spells and other
      magical effects.

    # Actions

    Multiattack.
      The vrock makes two attacks: one with its beak and one with its
      talons.
    Beak.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 10 (2d6
      + 3) piercing damage.
    Talons.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 14 (2d10
      + 3) slashing damage.
    Spores (Recharge 6).
      A 15-foot-radius cloud of toxic spores extends out from the vrock. The
      spores spread around corners. Each creature in that area must succeed
      on a DC 14 Constitution saving throw or become poisoned. While
      poisoned in this way, a target takes 5 (1d10) poison damage at the
      start of each of its turns. A target can repeat the saving throw at
      the end of each of its turns, ending the effect on itself on a
      success. Emptying a vial of holy water on the target also ends the
      effect on it.
    Stunning Screech.
      The vrock emits a horrific screech. Each creature within 20 feet of it
      that can hear it and that isn't a demon must succeed on a DC 14
      Constitution saving throw or be stunned until the end of the vrock's
      next turn .
    Variant: Summon Demon.
      The demon chooses what to summon and attempts a magical summoning.

      A vrock has a 30 percent chance of summoning 2d4 dretches or one
      vrock.

      A summoned demon appears in an unoccupied space within 60 feet of its
      summoner, acts as an ally of its summoner, and can't summon other
      demons. It remains for 1 minute, until it or its summoner dies, or
      until its summoner dismisses it as an action.
  traits: 
  - name: Magic Resistance
    description: The vrock has advantage on saving throws against spells and other magical effects.
  actions: 
  - name: Multiattack
    description: "The vrock makes two attacks: one with its beak and one with its talons."
  - name: Beak
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 10 (2d6 + 3) piercing damage."
  - name: Talons
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 14 (2d10 + 3) slashing damage."
  - name: Spores (Recharge 6)
    description: A 15-foot-radius cloud of toxic spores extends out from the vrock. The spores spread around corners. Each creature in that area must succeed on a DC 14 Constitution saving throw or become poisoned. While poisoned in this way, a target takes 5 (1d10) poison damage at the start of each of its turns. A target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success. Emptying a vial of holy water on the target also ends the effect on it.
  - name: Stunning Screech
    description: The vrock emits a horrific screech. Each creature within 20 feet of it that can hear it and that isn't a demon must succeed on a DC 14 Constitution saving throw or be stunned until the end of the vrock's next turn .
  - name: "Variant: Summon Demon"
    description: The demon chooses what to summon and attempts a magical summoning. A vrock has a 30 percent chance of summoning 2d4 dretches or one vrock. A summoned demon appears in an unoccupied space within 60 feet of its summoner, acts as an ally of its summoner, and can't summon other demons. It remains for 1 minute, until it or its summoner dies, or until its summoner dismisses it as an action.

