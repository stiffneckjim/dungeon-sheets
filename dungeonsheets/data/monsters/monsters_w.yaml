- class_name: Warhorse
  name: Warhorse
  creature_type: Large beast, unaligned
  challenge_rating: 0.5
  armor_class: 11
  hp_max: 19
  speed: 60 ft.
  strength: 18
  dexterity: 12
  constitution: 13
  intelligence: 2
  wisdom: 12
  charisma: 7
  senses: Passive Perception 11
  description: |
    Trampling Charge.
      If the horse moves at least 20 ft. straight toward a creature and then
      hits it with a hooves attack on the same turn, that target must
      succeed on a DC 14 Strength saving throw or be knocked prone. If the
      target is prone, the horse can make another attack with its hooves
      against it as a bonus action.

    # Actions

    Hooves.
      Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 11 (2d6
      + 4) bludgeoning damage.
  traits: 
  - name: Trampling Charge
    description: If the horse moves at least 20 ft. straight toward a creature and then hits it with a hooves attack on the same turn, that target must succeed on a DC 14 Strength saving throw or be knocked prone. If the target is prone, the horse can make another attack with its hooves against it as a bonus action.
  actions: 
  - name: Hooves
    description: "Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: 11 (2d6 + 4) bludgeoning damage."

