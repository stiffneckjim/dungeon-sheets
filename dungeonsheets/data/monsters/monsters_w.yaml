- class_name: WereboarBoarForm
  name: Wereboar, Boar Form
  creature_type: Medium humanoid, neutral evil
  challenge_rating: 4
  armor_class: 10
  hp_max: 78
  speed: 40 ft.
  strength: 17
  dexterity: 10
  constitution: 15
  intelligence: 10
  wisdom: 11
  charisma: 8
  skill_str: Perception +2
  senses: Passive Perception 12
  damage_immunities: bludgeoning, piercing, and slashing damage from nonmagical weapons that aren't silvered
  description: |
    Shapechanger.
      The wereboar can use its action to polymorph into a boar-humanoid
      hybrid or into a boar, or back into its true form, which is humanoid.
      Its statistics, other than its AC, are the same in each form. Any
      equipment it is wearing or carrying isn't transformed. It reverts to
      its true form if it dies.
    Charge (Boar or Hybrid Form Only).
      If the wereboar moves at least 15 feet straight toward a target and
      then hits it with its tusks on the same turn, the target takes an
      extra 7 (2d6) slashing damage. If the target is a creature, it must
      succeed on a DC 13 Strength saving throw or be knocked prone.
    Relentless.
      If the wereboar takes 14 damage or less that would reduce it to 0 hit
      points, it is reduced to 1 hit point instead.

    # Actions

    Tusks.
      Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6
      + 3) slashing damage. If the target is a humanoid, it must succeed on
      a DC 12 Constitution saving throw or be cursed with wereboar
      lycanthropy.
  traits: 
  - name: Shapechanger
    description: The wereboar can use its action to polymorph into a boar-humanoid hybrid or into a boar, or back into its true form, which is humanoid. Its statistics, other than its AC, are the same in each form. Any equipment it is wearing or carrying isn't transformed. It reverts to its true form if it dies.
  - name: Charge (Boar or Hybrid Form Only)
    description: If the wereboar moves at least 15 feet straight toward a target and then hits it with its tusks on the same turn, the target takes an extra 7 (2d6) slashing damage. If the target is a creature, it must succeed on a DC 13 Strength saving throw or be knocked prone.
  - name: Relentless
    description: If the wereboar takes 14 damage or less that would reduce it to 0 hit points, it is reduced to 1 hit point instead.
  actions: 
  - name: Tusks
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6 + 3) slashing damage. If the target is a humanoid, it must succeed on a DC 12 Constitution saving throw or be cursed with wereboar lycanthropy."

