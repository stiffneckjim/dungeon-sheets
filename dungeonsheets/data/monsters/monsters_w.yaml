- class_name: WaterElemental
  name: Water Elemental
  creature_type: Large elemental, neutral
  challenge_rating: 5
  armor_class: 14
  hp_max: 114
  speed: 30 ft.
  strength: 18
  dexterity: 14
  constitution: 18
  intelligence: 5
  wisdom: 10
  charisma: 8
  senses: Darkvision 60 ft., Passive Perception 10
  languages: Aquan
  damage_immunities: poison
  damage_resistances: acid
  condition_immunities: exhaustion, grappled, paralyzed, petrified, poisoned, prone, restrained, unconscious
  description: |
    Water Form.
      The elemental can enter a hostile creature's space and stop there. It
      can move through a space as narrow as 1 inch wide without squeezing.
    Freeze.
      If the elemental takes cold damage, it partially freezes; its speed is
      reduced by 20 ft. until the end of its next turn.

    # Actions

    Multiattack.
      The elemental makes two slam attacks.
    Slam.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8
      + 4) bludgeoning damage.
    Whelm.
      Each creature in the elemental's space must make a DC 15 Strength
      saving throw. On a failure, a target takes 13 (2d8 + 4) bludgeoning
      damage. If it is Large or smaller, it is also grappled (escape DC 14).
      Until this grapple ends, the target is restrained and unable to
      breathe unless it can breathe water. If the saving throw is
      successful, the target is pushed out of the elemental's space.

      The elemental can grapple one Large creature or up to two Medium or
      smaller creatures at one time. At the start of each of the elemental's
      turns, each target grappled by it takes 13 (2d8 + 4) bludgeoning
      damage. A creature within 5 feet of the elemental can pull a creature
      or object out of it by taking an action to make a DC 14 Strength and
      succeeding.
  traits: 
  - name: Water Form
    description: The elemental can enter a hostile creature's space and stop there. It can move through a space as narrow as 1 inch wide without squeezing.
  - name: Freeze
    description: If the elemental takes cold damage, it partially freezes; its speed is reduced by 20 ft. until the end of its next turn.
  actions: 
  - name: Multiattack
    description: The elemental makes two slam attacks.
  - name: Slam
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8 + 4) bludgeoning damage."
  - name: Whelm
    description: Each creature in the elemental's space must make a DC 15 Strength saving throw. On a failure, a target takes 13 (2d8 + 4) bludgeoning damage. If it is Large or smaller, it is also grappled (escape DC 14). Until this grapple ends, the target is restrained and unable to breathe unless it can breathe water. If the saving throw is successful, the target is pushed out of the elemental's space. The elemental can grapple one Large creature or up to two Medium or smaller creatures at one time. At the start of each of the elemental's turns, each target grappled by it takes 13 (2d8 + 4) bludgeoning damage. A creature within 5 feet of the elemental can pull a creature or object out of it by taking an action to make a DC 14 Strength and succeeding.

- class_name: Weasel
  name: Weasel
  creature_type: Tiny beast, unaligned
  challenge_rating: 0
  armor_class: 13
  hp_max: 1
  speed: 30 ft.
  strength: 3
  dexterity: 16
  constitution: 8
  intelligence: 2
  wisdom: 12
  charisma: 3
  skill_str: Perception +3, Stealth +5
  senses: Passive Perception 13
