  actions: 
  - name: Bite
    description: "Melee Weapon Attack: +5 to hit, reach 5 ft., one creature. Hit: 1 piercing damage."

- class_name: WerebearBearForm
  name: Werebear, Bear Form
  creature_type: Medium humanoid, neutral good
  challenge_rating: 5
  armor_class: 10
  hp_max: 135
  speed: 40 ft.
  strength: 19
  dexterity: 10
  constitution: 17
  intelligence: 11
  wisdom: 12
  charisma: 12
  skill_str: Perception +7
  senses: Passive Perception 17
  damage_immunities: bludgeoning, piercing, and slashing from nonmagical attacks not made with silvered weapons
  description: |
    Shapechanger.
      The werebear can use its action to polymorph into a Large bear-
      humanoid hybrid or into a Large bear, or back into its true form,
      which is humanoid. Its statistics, other than its size and AC, are the
      same in each form. Any equipment it is wearing or carrying isn't
      transformed. It reverts to its true form if it dies.
    Keen Smell.
      The werebear has advantage on Wisdom (Perception) checks that rely on
      smell.

    # Actions

    Multiattack.
      In bear form, the werebear makes two claw attacks. In humanoid form,
      it makes two greataxe attacks. In hybrid form, it can attack like a
      bear or a humanoid.
    Bite.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 15 (2d10
      + 4) piercing damage. If the target is a humanoid, it must succeed on
      a DC 14 Constitution saving throw or be cursed with werebear
      lycanthropy.
    Claw.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8
      + 4) slashing damage.
  traits: 
  - name: Shapechanger
    description: The werebear can use its action to polymorph into a Large bear- humanoid hybrid or into a Large bear, or back into its true form, which is humanoid. Its statistics, other than its size and AC, are the same in each form. Any equipment it is wearing or carrying isn't transformed. It reverts to its true form if it dies.
  - name: Keen Smell
    description: The werebear has advantage on Wisdom (Perception) checks that rely on smell.
  actions: 
  - name: Multiattack
    description: In bear form, the werebear makes two claw attacks. In humanoid form, it makes two greataxe attacks. In hybrid form, it can attack like a bear or a humanoid.
  - name: Bite
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 15 (2d10 + 4) piercing damage. If the target is a humanoid, it must succeed on a DC 14 Constitution saving throw or be cursed with werebear lycanthropy."
  - name: Claw
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 13 (2d8 + 4) slashing damage."

