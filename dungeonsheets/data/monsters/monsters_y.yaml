- class_name: YoungBlackDragon
  name: Young Black Dragon
  creature_type: Large dragon, chaotic evil
  challenge_rating: 7
  armor_class: 18
  hp_max: 127
  speed: 40 ft.
  strength: 19
  dexterity: 14
  constitution: 17
  intelligence: 12
  wisdom: 11
  charisma: 15
  skill_str: Perception +6, Stealth +5
  senses: Blindsight 30 ft., Darkvision 120 ft., Passive Perception 16
  languages: Common, Draconic
  damage_immunities: acid
  description: |
    Amphibious.
      The dragon can breathe air and water.

    # Actions

    Multiattack.
      The dragon makes three attacks: one with its bite and two with its
      claws.
    Bite.
      Melee Weapon Attack: +7 to hit, reach 10 ft., one target. Hit: 15
      (2d10 + 4) piercing damage plus 4 (1d8) acid damage.
    Claw.
      Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 11 (2d6
      + 4) slashing damage.
    Acid Breath.
      The dragon exhales acid in a 30-foot line that is 5 feet wide. Each
      creature in that line must make a DC 14 Dexterity saving throw, taking
      49 (11d8) acid damage on a failed save, or half as much damage on a
      successful one.
  traits: 
  - name: Amphibious
    description: The dragon can breathe air and water.
  actions: 
  - name: Multiattack
    description: "The dragon makes three attacks: one with its bite and two with its claws."
  - name: Bite
    description: "Melee Weapon Attack: +7 to hit, reach 10 ft., one target. Hit: 15 (2d10 + 4) piercing damage plus 4 (1d8) acid damage."
  - name: Claw
    description: "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 11 (2d6 + 4) slashing damage."
  - name: Acid Breath
    description: The dragon exhales acid in a 30-foot line that is 5 feet wide. Each creature in that line must make a DC 14 Dexterity saving throw, taking 49 (11d8) acid damage on a failed save, or half as much damage on a successful one.

