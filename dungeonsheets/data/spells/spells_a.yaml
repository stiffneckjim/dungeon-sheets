- class_name: AntimagicField
  description: "A 10-foot-radius invisible sphere of antimagic surrounds you.  This\n    area is divorced from the magical energy that suffeses the\n    multiverse. Within the sphere, spells can't be cast, summoned\n    creatures disappear, and even magic items become mundane. Until\n    the spell ends, the spere moves with you, centered on you.\n\n    Spells and other magical effects, except those created by an\n    artifact or a deity, are suppressed in the sphere and can't\n    protrude into it. A slot expended to cast a suppressed spell is\n    consumed. While an effect is suppressed, it doesn't function, but\n    the time it spends suppressed counts against its duration.\n\n    Targeted Effects.\n      Spells and other magical effects, such as magic missle and charm\n      person, that target a creature or an object in the sphere have\n      no effect on that target.\n    Areas of Magic.\n      The area of another spell or magical effect, such as fireball,\n      can't extend into the\
    \ sphere. If the sphere overlaps an area of\n      magic, the part of the area that is covered by the sphere is\n      suppressed. For example, the flames created by a wall of fire\n      are suppressed within the sphere, creating a gap in the wall if\n      the overlap is large enough.\n    Spells.\n      Any active spell or other magical effect on a creature or an\n      object in the sphere is suppressed while the creature or object\n      is in it.\n    Magic Items.\n      The properties and powers of magic items are suppressed in the\n      sphere. Forexample, a +1 longsword in the sphere functions as a\n      nonmagical longsword. A magic weapon's properties and powers are\n      suppressed if it is used against a target in the sphere or\n      wielded by an attacker in the sphere. If a magic weapon or piece\n      of magic ammunition fully leaves the sphere (For example, if you\n      fire a magic arrow or throw a magic spear at a target outside\n      the sphere), the magic of\
    \ the item ceases to be supressed as\n      soon as it exits.\n    Magical Travel.\n      Teleportation and planar travel fail to work in the sphere,\n      whether the sphere is the destination or the departure point for\n      such magical travel. A portal to another location, world, or\n      plane of existence, as well as an opening to an extradimensional\n      space such as that created by the rope trick spells, temporarily\n      closes while in the sphere.\n    Creatures and Objects.\n      A creature or object summoned or created by magic temporarily\n      winks out of existence in the sphere. Such a creature instantly\n      reappears once the space the creature occupied is no longer\n      withinthe sphere.\n    Dispel Magic.\n      Spells and magical effects such as dispel magic have no effect\n      on the sphere. Likewise, the spheres created by different\n      antimagic field spells don't nullify each other.\n\n    "
  name: Antimagic Field
  level: 8
  casting_time: 1 action
  casting_range: Self (10-foot-radius sphere)
  components:
  - V
  - SM
  materials: A pinch of powdered iron or iron filings
  duration: Concentration, up to 1 hour
  ritual: false
  magic_school: Abjuration
  classes:
  - Cleric
  - Wizard
- class_name: Antipathysympathy
  description: "This spell attracts or repels creatures of your choice.\n    You target something\n    within range, either a Huge or smaller object or creature or an area that is no\n    larger than a 200-foot cube. Then specify a kind of intelligent creature, such\n    as red dragons, goblins, or vampires. You invest the target with an aura that\n    either attracts or repels the specified creatures for the duration. Choose\n    antipathy or sympathy as the aura's effect.\n\n    Antipathy.\n    The enchantment causes\n    creatures of the kind you designated to feel an intense urge to leave the area\n    and avoid the target. When such a creature can see the target or comes within 60\n    feet of it, the creature must succeed on a Wisdom saving throw or\n    become frightened. The creature remains frightened while it can see the target\n    or is within 60 feet of it. While frightened by the target, the creature must\n    use its movement to move to the nearest safe spot from which it\
    \ can't see the\n    target. If the creature moves more than 60 feet from the target and can't see\n    it, the creature is no longer frightened, but the creature becomes frightened\n    again if it regains sight of the target or moves within 60 feet of it.\n\n\n    Sympathy.\n    The enchantment causes the specified creatures to feel an intense\n    urge to approach the target while within 60 feet of it or able to see it. When\n    such a creature can see the target or comes within 60 feet o fit, the creature\n    must succeed on a Wisdom saving throw or use its movement on each of its turns\n    to enter the area or move within reach of the target. When the creature has done\n    so, it can't willingly move away from the target. If the target damages or\n    otherwise harms an affected creature, the affected creature can make a\n    Wisdom saving throw to end the effect, as described below.\n\n    Ending the Effect.\n\n    If an affected creature ends its turn while not within 60 feet\
    \ of the target\n    or able to see it, the creature makes a Wisdom saving throw. On a successful\n    save, the creature is no longer affected by the target and recognizes the\n    feeling of repugnance or attraction as magical. In addition, a creature affected\n    by the spell is allowed another Wisdom saving throw every 24 hours while the\n    spell persists.\n    A creature that successfully saves against this effect is\n    immune to it for 1 minute, after which time it can be affected again.\n    "
  name: Antipathysympathy
  level: 8
  casting_time: 1 hour
  casting_range: 60 feet
  components:
  - V
  - S
  - M
  materials: Either a lump of alum soaked in vinegar for the antipathy effect or a drop of honey for the sympathy effect
  duration: 10 days
  ritual: false
  magic_school: Enchantment
  classes:
  - Druid
  - Wizard
