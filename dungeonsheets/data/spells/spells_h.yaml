- class_name: HailOfThorns
  description: "The next time you hit a creature with a ranged weapon attack before the spell\n    ends, this spell creates a rain of thorns that sprouts from your ranged weapon\n    or ammunition. In addition to the normal effect of the attack, the target of the\n    attack and each creature within 5 feet of it must make a Dexterity saving\n    throw. A creature takes 1d10 piercing damage on a failed save, or half as much\n    damage on a successful one.\n\n    **At Higher Levels:** If you cast this spell using a\n    spell slot of 2nd level or higher, the damage increases by 1d10 for each slot\n    level above 1st (to a maximum of 6d10).\n    "
  name: Hail Of Thorns
  level: 1
  casting_time: 1 bonus action
  casting_range: Self
  components:
  - V
  materials: ''
  duration: Concentration, up to 1 minute
  ritual: false
  magic_school: Conjuration
