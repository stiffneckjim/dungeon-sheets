- class_name: LegendLore
  description: "Name or describe a person, place, or object. The spell brings to your mind a\n    brief summary of the significant lore about the thing you named. The lore might\n    consist of current tales, forgotten stories, or even secret lore that has never\n    been widely known. If the thing you named isn't of legendary importance, you\n    gain no information. The more information you already have about the thing, the\n    more precise and detailed the information you receive is.\n\n    The information you\n    learn is accurate but might be couched in figurative language. For example, if\n    you have a mysterious magic axe on hand, the spell might yield this information:\n    Woe to the evildoer whose hand touches the axe, for even the haft slices the\n    hand of the evil ones. Only a true Child of Stone, lover and beloved of Moradin,\n    may awaken the true powers of the axe, and only with the sacred word Rudnogg on\n    the lips.\n    "
  name: Legend Lore
  level: 5
  casting_time: 10 minutes
  casting_range: Self
  components:
  - V
  - S
  - M
  materials: Incense worth at least 250 gp, which the spell consumes, and four ivory strips worth at least 50 gp each
  duration: Instantaneous
  ritual: false
  magic_school: Divination
  classes:
  - Bard
  - Cleric
  - Wizard
- class_name: LeomundsSecretChest
  description: "You hide a chest, and all its contents, on the Ethereal Plane.\n    You must touch\n    the chest and the miniature replica that serves as a material component for the\n    spell. The chest can contain up to 12 cubic feet of nonliving material (3 feet\n    by 2 feet by 2 feet).\n\n    While the chest remains on the Ethereal Plane, you can\n    use an action and touch the replica to recall the chest. It appears in an\n    unoccupied space on the ground within 5 feet of you. You can send the chest back\n    to the Ethereal Plane by using an action and touching both the chest and the\n    replica.\n\n    After 60 days, there is a cumulative 5 percent chance per day that the\n    spell's effect ends. This effect ends if you cast this spell again, if the\n    smaller replica chest is destroyed, or if you choose to end the spell as an\n    action. If the spell ends and the larger chest is on the Ethereal Plane, it is\n    irretrievably lost.\n    "
  name: Leomunds Secret Chest
  level: 4
  casting_time: 1 action
  casting_range: Touch
  components:
  - V
  - S
  - M
  materials: An exquisite chest, 3 feet by 2 feet by 2 feet, constructed from rare materials worth at least 5,000 gp, and a tiny replica made from the same materials worth at least 50 gp
  duration: Instantaneous
  ritual: false
  magic_school: Conjuration
  classes:
  - Wizard
- class_name: LeomundsTinyHut
  description: "A 10-foot-radius immobile dome of force springs into existence around and above\n    you and remains stationary for the duration. The spell ends if you leave its\n    area.\n\n    Nine creatures of Medium size or smaller can fit inside the dome with\n    you. The spell fails if its area includes a larger creature or more than nine\n    creatures. Creatures and objects within the dome when you cast this spell can\n    move through it freely. All other creatures and objects are barred from passing\n    through it. Spells and other magical effects can't extend through the dome or be\n    cast through it. The atmosphere inside the space is comfortable and dry,\n    regardless of the weather outside.\n\n    Until the spell ends, you can command the\n    interior to become dimly lit or dark. The dome is opaque from the outside, of\n    any color you choose, but it is transparent from the inside.\n    "
  name: Leomunds Tiny Hut
  level: 3
  casting_time: 1 minute
  casting_range: Self (10-foot-radius hemisphere)
  components:
  - V
  - S
  - M
  materials: A small crystal bead
  duration: 8 hours
  ritual: true
  magic_school: Evocation
  classes:
  - Bard
  - Wizard
