  - Sorcerer
  - Wizard
- class_name: LightningArrow
  description: "The next time you make a ranged weapon attack during the spell's duration, the\n    weapon's ammunition, or the weapon itself if it's a thrown weapon, transforms\n    into a bolt of lightning. Make the attack roll as normal, The target takes 4d8\n    lightning damage on a hit, or half as much damage on a miss, instead of the\n    weapon's normal damage.\n\n    Whether you hit or miss, each creature within 10 feet\n    of the target must make a Dexterity saving throw. Each of these creatures takes\n    2d8 lightning damage on a failed save, or half as much damage on a successful\n    one.\n\n    The piece of ammunition or weapon then returns to its normal form.\n\n    At\n    Higher Levels: When you cast this spell using a spell slot of 4th level or\n    higher, the damage for both effects of the spell increases by 1d8 for each slot\n    level above 3rd.\n    "
  name: Lightning Arrow
  level: 3
  casting_time: 1 bonus action
  casting_range: Self
  components:
  - V
  - S
  materials: ''
  duration: Concentration, up to 1 minute
  ritual: false
  magic_school: Transmutation
  classes:
  - Ranger
- class_name: LightningBolt
  description: "A stroke of lightning forming a line of 100 feet long and 5 feet wide blasts out\n    from you in a direction you choose. Each creature in the line must make a\n    Dexterity saving throw. A creature takes 8d6 lightning damage on a failed save,\n    or half as much damage on a successful one.\n\n    The lightning ignites flammable\n    objects in the area that aren't being worn or carried.\n\n    **At Higher Levels:** When\n    you cast this spell using a spell slot of 4th level or higher, the damage\n    increases by 1d6 for each slot level above 3rd.\n    "
  name: Lightning Bolt
  level: 3
  casting_time: 1 action
  casting_range: Self (100-foot line)
  components:
  - V
  - S
  - M
  materials: A bit of fur and a rod of amber, crystal, or glass
  duration: Instantaneous
  ritual: false
  magic_school: Evocation
  classes:
  - Sorcerer
  - Wizard
- class_name: LightningLure
  description: "You create a lash of lightning energy that strikes at one creature of your\n    choice that you can see within range.\n    The target must succeed on a Strength\n    saving throw or be pulled up to 10 feet in a straight line toward you and then\n    take 1d8 lightning damage if it is within 5 feet of you.\n\n    **At Higher Levels:** This\n    spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level\n    (3d8), and 17th level (4d8).\n    "
  name: Lightning Lure
