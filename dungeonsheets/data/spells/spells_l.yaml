- class_name: Levitate
  description: "One creature or object of your choice that you can see within range rises\n    vertically, up to 20 feet, and remains suspended there for the duration. The\n    spell can levitate a target that weighs up to 500 pounds. An unwilling creature\n    that succeeds on a Constitution saving throw is unaffected.\n\n    The target can move\n    only by pushing or pulling against a fixed object or surface within reach (such\n    as a wall or a ceiling), which allows it to move as if it were climbing. You\n    can change the target's altitude by up to 20 feet in either direction on your\n    turn. If you are the target, you can move up or down as part of your move.\n    Otherwise, you can use your action to move the target, which must remain within\n    the spell's range.\n\n    When the spell ends, the target floats gently to the ground\n    if it is still aloft.\n    "
  name: Levitate
  level: 2
  casting_time: 1 action
  casting_range: 60 feet
  components:
  - V
  - S
  - M
  materials: Either a small leather loop or a piece of golden wire bent into a cup shape with a long shank on one end
  duration: Concentration, up to 10 minutes
  ritual: false
  magic_school: Transmutation
  classes:
  - Sorcerer
  - Wizard
- class_name: LifeTransference
  description: "You sacrifice some of your health to mend another creature's injuries. You take\n    4d8 necrotic damage, and one creature of your choice that you can see within\n    range regains a number of hit points equal to twice the necrotic damage you\n    take.\n\n    **At Higher Levels:** When you cast this spell using a spell slot of 4th\n    level or higher, the damage increases by 1d8 for each slot level above 3rd.\n    "
  name: Life Transference
  level: 3
  casting_time: 1 action
  casting_range: 30 feet
  components:
  - V
  - S
  materials: ''
  duration: Instantaneous
  ritual: false
  magic_school: Necromancy
  classes:
  - Cleric
  - Wizard
- class_name: Light
  description: "You touch one object that is no larger than 10 feet in any dimension. Until the\n    spell ends, the object sheds bright light in a 20-foot radius and dim light for\n    an additional 20 feet. The light can be colored as you like. Completely covering\n    the object with something opaque blocks the light. The spell ends if you cast\n    it again or dismiss it as an action.\n\n    If you target an object held or worn by a\n    hostile creature, that creature must succeed on a Dexterity saving throw to\n    avoid the spell.\n    "
  name: Light
  level: 0
  casting_time: 1 action
  casting_range: Touch
  components:
  - V
  - M
  materials: A firefly or phosphorescent moss
  duration: 1 hour
  ritual: false
  magic_school: Evocation
  classes:
