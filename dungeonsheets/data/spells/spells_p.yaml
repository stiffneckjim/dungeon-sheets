- class_name: PhantomSteed
  description: "A Large quasi-real, horselike creature appears on the ground in an unoccupied\n    space of your choice within range. You decide the creature's appearance, but it\n    is equipped with a saddle, bit, and bridle. Any of the equipment created by the\n    spell vanishes in a puff of smoke if it is carried more than 10 feet away from\n    the steed.\n\n    For the duration, you or a creature you choose can ride the steed.\n    The creature uses the statistics for a riding horse, except it has a speed of\n    100 feet and can travel 10 miles in an hour, or 13 miles at a fast pace. When\n    the spell ends, the steed gradually fades, giving the rider 1 minute to\n    dismount. The spell ends if you use an action to dismiss it or if the steed\n    takes any damage.\n    "
  name: Phantom Steed
  level: 3
  casting_time: 1 minute
  casting_range: 30 feet
  components:
  - V
  - S
  materials: ''
  duration: 1 hour
  ritual: true
