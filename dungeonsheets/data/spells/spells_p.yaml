- class_name: PassWithoutTrace
  description: "A veil of shadows and silence radiates from you, masking you and your companions\n    from detection.\n    For the duration, each creature you choose within 30 feet of\n    you (including you) has a +10 bonus to Dexterity (Stealth) checks and can't be\n    tracked except by magical means. A creature that receives this bonus leaves\n    behind no tracks or other traces of its passage.\n    "
  name: Pass Without Trace
  level: 2
  casting_time: 1 action
  casting_range: Self
  components:
