  - M
  materials: Ashes from a burned leaf of mistletoe and a sprig of spruce
  duration: Concentration, up to 1 hour
  ritual: false
  magic_school: Abjuration
  classes:
  - Druid
  - Ranger
- class_name: Passwall
  description: "A passage appears at a point of your choice that you can see on a wooden,\n    plaster, or stone surface (such as a wall, a ceiling, or a floor) within range,\n    and lasts for the duration. You choose the opening's dimensions: up to 5 feet\n    wide, 8 feet tall, and 20 feet deep. The passage creates no instability in a\n    structure surrounding it.\n\n    When the opening disappears, any creatures or objects\n    still in the passage created by the spell are safely ejected to an unoccupied\n    space nearest to the surface on which you cast the spell.\n    "
  name: Passwall
  level: 5
