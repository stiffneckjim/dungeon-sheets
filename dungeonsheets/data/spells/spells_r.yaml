  materials: ''
  duration: Concentration, up to 1 minute
  ritual: false
  magic_school: Necromancy
  classes:
  - Warlock
  - Wizard
- class_name: RayOfFrost
  description: "A frigid beam of blue-white light streaks toward a creature within range. Make a\n    ranged spell attack against the target. On a hit, it takes 1d8 cold damage, and\n    its speed is reduced by 10 feet until the start of your next turn.\n\n    At Higher\n    Levels: The spell's damage increases by 1d8 when you reach 5th level (2d8), 11th\n    level (3d8), and 17th level (4d8).\n    "
  name: Ray Of Frost
  level: 0
