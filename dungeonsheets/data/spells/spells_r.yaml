- class_name: RaiseDead
  description: "You return a dead creature you touch to life, provided that it has been dead no\n    longer than 10 days. If the creature's soul is both willing and at liberty to\n    rejoin the body, the creature returns to life with 1 hit point.\n\n    This spell also\n    neutralizes any poison and cures nonmagical diseases that affected the creature\n    at the time it died. This spell doesn't, however, remove magical diseases,\n    curses, or similar effects; if these aren't first removed prior to casting the\n    spell, they take effect when the creature returns to life. The spell can't\n    return an undead creature to life.\n\n    This spell closes all mortal wounds, but it\n    doesn't restore missing body parts. If the creature is lacking body parts or\n    organs integral for its survival \u2013 its head, for instance \u2013 the spell\n    automatically fails.\n\n    Coming back from the dead is an ordeal. The target takes a\n    -4 penalty to all attack rolls, saving throws,\
    \ and ability checks. Every time\n    the target finishes a long rest, the penalty is reduced by 1 until it\n    disappears.\n    "
  name: Raise Dead
  level: 5
  casting_time: 1 hour
  casting_range: Touch
  components:
  - V
  - S
  - M
  materials: A diamond worth at least 500 gp, which the spell consumes
  duration: Instantaneous
  ritual: false
  magic_school: Necromancy
  classes:
  - Bard
  - Cleric
  - Paladin
- class_name: RarysTelepathicBond
  description: "You forge a telepathic link among up to eight willing creatures of your choice\n    within range, psychically linking each creature to all the others for the\n    duration. Creatures with Intelligence scores of 2 or less aren't affected by\n    this spell.\n\n    Until the spell ends, the targets can communicated telepathically\n    through the bond whether or not they have a common language. The communication\n    is possible over any distance, though it can't extend to other planes of\n    existence.\n    "
  name: Rarys Telepathic Bond
  level: 5
  casting_time: 1 action
  casting_range: 30 feet
  components:
  - V
  - S
  - M
  materials: Pieces of eggshell from two different kinds of creatures
  duration: 1 hour
  ritual: true
  magic_school: Divination
  classes:
  - Wizard
- class_name: RayOfEnfeeblement
  description: "A black beam of enervating energy springs from your finger toward a creature\n    within range.\n    Make a ranged spell attack against the target. On a hit, the\n    target deals only half damage with weapon attacks that use Strength until the\n    spell ends.\n\n    At the end of each of the target's turns, it can make a\n    Constitution saving throw against the spell. On a success, the spell ends.\n    "
  name: Ray Of Enfeeblement
  level: 2
  casting_time: 1 action
  casting_range: 60 feet
  components:
  - V
