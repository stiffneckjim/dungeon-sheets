- class_name: RopeTrick
  description: "You touch a length of rope that is up to 60 feet long. One end of the rope then\n    rises into the air until the whole rope hangs perpendicular to the ground. At\n    the upper end of the rope, an invisible entrance opens to an extradimensional\n    space that lasts until the spell ends.\n\n    The extradimensional space can be\n    reached by climbing to the top of the rope. The space can hold as many as eight\n    Medium or smaller creatures. The rope can be pulled into the space, making the\n    rope disappear from view outside the space.\n\n    Attacks and spells can't cross\n    through the entrance into or out of the extradimensional space, but those inside\n    can see out of it as if through a 3-foot-by-5-foot window centered on the rope.\n\n\n    Anything inside the extradimensional space drops out when the spell ends.\n    "
  name: Rope Trick
  level: 2
  casting_time: 1 action
  casting_range: Touch
  components:
  - V
  - S
  - M
  materials: Powdered corn extract and a twisted loop of parchment
  duration: 1 hour
  ritual: false
  magic_school: Transmutation
  classes:
  - Wizard
