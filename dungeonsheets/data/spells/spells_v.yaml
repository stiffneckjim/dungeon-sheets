- class_name: VampiricTouch
  description: "The touch of your shadow-wreathed hand can siphon force from others to heal your\n    wounds. Make a melee spell attack against a creature within your reach. On a\n    hit, the target takes 3d6 necrotic damage, and you regain hit points equal to\n    half the amount of necrotic damage dealt. Until the spell ends, you can make the\n    attack again on each of your turns as an action.\n\n    **At Higher Levels:** When you\n    cast this spell using a spell slot of 4th level or higher, the damage increases\n    by 1d6 for each slot level above 3rd.\n    "
  name: Vampiric Touch
  level: 3
  casting_time: 1 action
  casting_range: Self
  components:
  - V
  - S
  materials: ''
  duration: Concentration, up to 1 minute
  ritual: false
  magic_school: Necromancy
  classes:
  - Warlock
  - Wizard
- class_name: ViciousMockery
  description: "You unleash a string of insults laced with subtle enchantments at a creature you\n    can see within range.\n    If the target can hear you (thought it need not\n    understand you), it must succeed on a Wisdom saving throw or take 1d4 psychic\n    damage and have disadvantage on the next attack roll it makes before the end of\n    its next turn.\n\n    **At Higher Levels:** This spell's damage increases by 1d4 when you\n    reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).\n    "
  name: Vicious Mockery
  level: 0
  casting_time: 1 action
  casting_range: 60 feet
  components:
  - V
  materials: ''
  duration: Instantaneous
  ritual: false
  magic_school: Enchantment
  classes:
  - Bard
- class_name: VitriolicSphere
  description: "You point at a location within range, and a glowing, 1-foot-diameter ball of\n    emerald acid streaks there and explodes in a 20-foot-radius sphere. Each\n    creature in that area must make a Dexterity saving throw. On a failed save, a\n    creature takes 10d4 acid damage and another 5d4 acid damage at the end of its\n    next turn. On a successful save, a creature takes half the initial damage and no\n    damage at the end of its next turn.\n\n    **At Higher Levels:** When you cast this spell\n    using a spell slot of 5th level or higher, the initial damage increases by 2d4\n    for each slot level above 4th.\n    "
  name: Vitriolic Sphere
  level: 4
  casting_time: 1 action
  casting_range: 150 feet
  components:
  - V
  - S
  - M
  materials: A drop of giant slug bile
  duration: Instantaneous
  ritual: false
  magic_school: Evocation
  classes:
  - Sorcerer
  - Wizard
