- class_name: ZephyrStrike
  description: "You move like the wind. Until the spell ends, your movement doesn't provoke\n    opportunity attacks.\n    Once before the spell ends, you can give yourself advantage\n    on one weapon attack roll on your turn. That attack deals an extra 1d8 force\n    damage on a hit. Whether you hit or miss, your walking speed increases by 30\n    feet until the end of that turn.\n    "
  name: Zephyr Strike
  level: 1
  casting_time: 1 bonus action
  casting_range: Self
  components:
  - V
  materials: ''
  duration: Concentration, up to 1 minute
  ritual: false
  magic_school: Transmutation
  classes:
  - Ranger
- class_name: ZoneOfTruth
  description: "You create a magical zone that guards against deception in a 15-foot-radius\n    sphere centered on a point of your choice within range.\n    Until the spell ends, a\n    creature that enters the spell's area for the first time on a turn or starts its\n    turn there must make a Charisma saving throw. On a failed save, a creature\n    can't speak a deliberate lie while in the radius. You know whether each creature\n    succeeds or fails on its saving throw.\n\n    An affected creature is aware of the\n    spell and can thus avoid answering questions to which it would normally respond\n    with a lie. Such creatures can be evasive in its answers as long as it remains\n    within the boundaries of the truth.\n    "
  name: Zone Of Truth
  level: 2
  casting_time: 1 action
  casting_range: 60 feet
  components:
  - V
  - S
  materials: ''
  duration: 10 minutes
  ritual: false
  magic_school: Enchantment
  classes:
  - Bard
  - Cleric
  - Paladin
