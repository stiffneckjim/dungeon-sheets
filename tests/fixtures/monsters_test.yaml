- class_name: TestAncientDragon
  name: Ancient Red Dragon
  description: Gargantuan dragon, chaotic evil
  challenge_rating: 24
  armor_class: 22
  hp_max: 546
  speed: "40 ft., climb 40 ft., fly 80 ft."
  strength: 30
  dexterity: 10
  constitution: 29
  intelligence: 18
  wisdom: 15
  charisma: 23
  skill_str: "Perception +16, Stealth +7"
  saving_throws: "Dex +7, Con +16, Wis +9, Cha +13"
  damage_immunities: "fire"
  senses: "Blindsight 60 ft., Darkvision 120 ft., Passive Perception 26"
  languages: "Common, Draconic"
  traits:
    - name: Legendary Resistance (3/Day)
      description: If the dragon fails a saving throw, it can choose to succeed instead.
    - name: Fire Breath Aura
      description: >
        Creatures that start their turn within 10 ft. of the dragon take 10 (3d6) fire damage.
  actions:
    - name: Multiattack
      description: The dragon can use its Frightful Presence. It then makes three attacks; one with its bite and two with its claws.
    - name: Bite
      description: "Melee Weapon Attack: +17 to hit, reach 15 ft., one target. Hit: 21 (2d10 + 10) piercing damage plus 14 (4d6) fire damage."
  legendary_actions:
    - name: Detect
      description: The dragon makes a Wisdom (Perception) check.
    - name: Tail Attack
      description: "The dragon makes a tail attack."
    - name: Wing Attack (Costs 2 Actions)
      description: >
        The dragon beats its wings. Each creature within 15 ft. must succeed on a DC 25
        Dexterity saving throw or take 17 (2d6 + 10) bludgeoning damage and be knocked prone.
  reactions:
    - name: Tail Lash
      description: When a creature hits the dragon with a melee attack, the dragon can make one tail attack against that creature.
